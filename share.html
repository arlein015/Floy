<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partager - Floy</title>
    <style>
        body { background: rgba(0,0,0,0.9); color: white; font-family: sans-serif; display: flex; align-items: flex-end; height: 100vh; margin: 0; }
        .share-panel { background: #1a1a1a; width: 100%; padding: 20px; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .share-grid { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0; }
        .share-item { text-align: center; min-width: 70px; }
        .icon-circle { width: 50px; height: 50px; border-radius: 50%; background: #333; margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>
    <div class="share-panel">
        <h4 style="text-align:center; margin-top:0;">Partager à</h4>
        <div class="share-grid">
            <div class="share-item"><div class="icon-circle">💬</div><span>Message</span></div>
            <div class="share-item"><div class="icon-circle">🔗</div><span>Lien</span></div>
            <div class="share-item"><div class="icon-circle">📲</div><span>WhatsApp</span></div>
        </div>
        <button onclick="window.history.back()" style="width:100%; padding:15px; background:#222; border:none; color:white; border-radius:10px; margin-top:10px;">Annuler</button>
    </div>
</body>
</html>
