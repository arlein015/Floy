<div style="display: flex; border-top: 1px solid #1a1a1a;">
    <div id="t-posts" onclick="switchTab('posts')" style="flex:1; text-align:center; padding:15px; cursor:pointer; color:white; border-top:2px solid white;">
        <i class="fas fa-th"></i>
    </div>
    <div id="t-reels" onclick="switchTab('reels')" style="flex:1; text-align:center; padding:15px; cursor:pointer; color:#888;">
        <i class="fas fa-play-circle"></i>
    </div>
</div>

<script>
    window.switchTab = (type) => {
        const posts = document.getElementById('t-posts');
        const reels = document.getElementById('t-reels');
        posts.style.color = type === 'posts' ? 'white' : '#888';
        posts.style.borderTop = type === 'posts' ? '2px solid white' : 'none';
        reels.style.color = type === 'reels' ? 'white' : '#888';
        reels.style.borderTop = type === 'reels' ? '2px solid white' : 'none';
        
        const uid = new URLSearchParams(window.location.search).get('id') || "TON_UID_PAR_DEFAUT";
        if(window.loadGrid) window.loadGrid(type, uid);
    };
</script>
