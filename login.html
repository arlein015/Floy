<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="glass-card p-10 rounded-3xl w-full max-w-md shadow-2xl">
        <h1 class="text-3xl font-bold mb-8 text-center tracking-tighter">NETWORK<span class="text-blue-500">.</span></h1>
        
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest opacity-50 mb-2">Nom d'utilisateur</label>
                <input type="text" name="username" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-blue-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest opacity-50 mb-2">Mot de passe</label>
                <input type="password" name="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-blue-500 outline-none transition" required>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-900/20">
                Se connecter
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm opacity-40">
            Nouveau ici ? <a href="/register" class="text-blue-400 hover:underline">Créer un compte</a>
        </p>
    </div>

</body>
</html>
