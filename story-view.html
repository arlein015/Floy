<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Story</title>
    <style>
        body { background: black; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #content { width: 100vw; height: 100vh; object-fit: cover; }
        .progress-container { position: absolute; top: 10px; width: 95%; display: flex; gap: 5px; }
        .progress-bar { height: 2px; background: rgba(255,255,255,0.3); flex-grow: 1; position: relative; overflow: hidden; }
        .progress-fill { height: 100%; background: white; width: 0%; transition: linear; }
        .user-info { position: absolute; top: 25px; left: 15px; display: flex; align-items: center; gap: 10px; color: white; font-family: sans-serif; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid white; }
    </style>
</head>
<body>

    <div class="progress-container"><div class="progress-bar"><div class="progress-fill" id="fill"></div></div></div>
    
    <div class="user-info">
        <img id="story-avatar" src="">
        <b id="story-user"></b>
    </div>

    <div id="media-container"></div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Récupérer l'ID de la story dans l'URL (ex: story-view.html?id=123)
        const urlParams = new URLSearchParams(window.location.search);
        const storyId = urlParams.get('id');

        async function loadStory() {
            const snap = await getDoc(doc(db, "stories", storyId));
            if (snap.exists()) {
                const s = snap.data();
                document.getElementById('story-user').innerText = s.username;
                document.getElementById('story-avatar').src = s.userAvatar;
                
                const container = document.getElementById('media-container');
                if (s.type === 'image') {
                    container.innerHTML = `<img src="${s.mediaUrl}" id="content">`;
                    startProgress(5000); // 5 secondes pour une image
                } else {
                    container.innerHTML = `<video src="${s.mediaUrl}" id="content" autoplay playsinline></video>`;
                    const vid = document.getElementById('content');
                    vid.onloadedmetadata = () => startProgress(vid.duration * 1000);
                }
            }
        }

        function startProgress(duration) {
            const fill = document.getElementById('fill');
            fill.style.transitionDuration = duration + 'ms';
            setTimeout(() => { fill.style.width = '100%'; }, 50);
            setTimeout(() => { history.back(); }, duration);
        }

        loadStory();
    </script>
</body>
</html>
