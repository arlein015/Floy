<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Transactions - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; --vert: #2ecc71; --rouge: #e74c3c; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 30px; }
        
        .header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--bordure); background: var(--noir); position: sticky; top: 0; }
        .back-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; }

        .history-container { padding: 10px 20px; }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid var(--bordure); }
        
        .trans-info { display: flex; flex-direction: column; gap: 4px; }
        .trans-title { font-weight: bold; font-size: 15px; }
        .trans-date { font-size: 12px; color: #666; }

        .trans-amount { font-weight: 800; font-size: 16px; }
        .amount-plus { color: var(--vert); }
        .amount-minus { color: var(--rouge); }

        .empty-state { text-align: center; color: #444; margin-top: 50px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='./shop.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <span style="font-weight: bold; font-size: 18px;">Historique</span>
    </div>

    <div class="history-container">
        <div class="transaction-item">
            <div class="trans-info">
                <span class="trans-title">Pack Moyen acheté</span>
                <span class="trans-date">Aujourd'hui, 14:20</span>
            </div>
            <div class="trans-amount amount-plus">+500 F</div>
        </div>

        <div class="transaction-item">
            <div class="trans-info">
                <span class="trans-title">Boost de Post</span>
                <span class="trans-date">Hier, 21:05</span>
            </div>
            <div class="trans-amount amount-minus">-50 F</div>
        </div>

        <div class="transaction-item">
            <div class="trans-info">
                <span class="trans-title">Badge Certification</span>
                <span class="trans-date">12 Mars 2026</span>
            </div>
            <div class="trans-amount amount-minus">-1000 F</div>
        </div>

        <div class="transaction-item">
            <div class="trans-info">
                <span class="trans-title">Petit Pack acheté</span>
                <span class="trans-date">10 Mars 2026</span>
            </div>
            <div class="trans-amount amount-plus">+100 F</div>
        </div>
    </div>

    <div class="empty-state">Fin de l'historique</div>

</body>
</html>
