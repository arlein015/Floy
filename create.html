<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Nouveau Post</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; overflow: hidden; height: 100vh; }

        /* HEADER */
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--bordure); background: var(--noir); }
        .btn-post { color: var(--orange); font-weight: bold; background: none; border: none; font-size: 16px; cursor: pointer; display: none; }

        /* ZONE D'UPLOAD */
        .main-container { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .upload-zone { width: 100%; aspect-ratio: 1/1; background: #0a0a0a; border: 1px dashed var(--bordure); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        /* LÉGENDE */
        .caption-area { margin-top: 20px; width: 100%; display: none; }
        textarea { width: 100%; background: #111; border: 1px solid var(--bordure); color: white; padding: 15px; border-radius: 12px; resize: none; font-family: inherit; box-sizing: border-box; outline: none; }

        /* MENU BAS AVEC BRILLANCE BLANCHE */
        .creation-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #050505; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--bordure); z-index: 1000; }
        .nav-create-item { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; cursor: pointer; transition: 0.3s; opacity: 0.5; position: relative; }
        
        /* L'effet brillant que tu voulais */
        .nav-create-item.active { color: #ffffff; opacity: 1; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
        .nav-create-item.active::after { content:''; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--orange); border-radius: 50%; }

        /* LOADER */
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader" id="loader"><div class="spinner"></div><p style="margin-top:15px;">Publication du post...</p></div>

    <div class="header">
        <i class="fas fa-times" onclick="location.href='index.html'" style="font-size: 20px; cursor: pointer;"></i>
        <b style="font-size: 16px;">Nouveau Post</b>
        <button class="btn-post" id="btn-share" onclick="window.uploadPostReal()">Partager</button>
    </div>

    <div class="main-container">
        <div class="upload-zone" onclick="document.getElementById('file-post').click()">
            <div id="placeholder" style="text-align: center;">
                <i class="fas fa-images" style="font-size:40px; color:var(--orange)"></i>
                <p style="margin-top:10px; color: #888;">Choisir une photo</p>
            </div>
            <img id="preview-img">
        </div>

        <div class="caption-area" id="caption-box">
            <textarea id="caption" rows="4" placeholder="Écris une légende pour tes abonnés..."></textarea>
        </div>
    </div>

    <input type="file" id="file-post" accept="image/*" style="display:none" onchange="window.previewPost()">

    <nav class="creation-nav">
        <div class="nav-create-item active">Publier</div>
        <div class="nav-create-item" onclick="location.href='story-creator.html'">Story</div>
        <div class="nav-create-item" onclick="location.href='reel-creator.html'">Reel</div>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 CONFIGURATION CLOUDINARY (Remplace par tes infos)
        const CLOUD_NAME = "TON_CLOUD_NAME";
        const UPLOAD_PRESET = "floy_unsigned";

        let selectedFile = null;
        let userData = null;

        // Charger l'utilisateur
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                userData = snap.data();
            } else { location.href = 'login.html'; }
        });

        // 1. Prévisualisation
        window.previewPost = () => {
            const file = document.getElementById('file-post').files[0];
            if(file) {
                selectedFile = file;
                document.getElementById('preview-img').src = URL.createObjectURL(file);
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('btn-share').style.display = 'block'; // Fait apparaître le bouton partager
                document.getElementById('caption-box').style.display = 'block'; // Fait apparaître la légende
            }
        };

        // 2. Publication Réelle
        window.uploadPostReal = async () => {
            if (!selectedFile || !userData) return;
            document.getElementById('loader').style.display = 'flex';

            try {
                // Upload Cloudinary
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('upload_preset', UPLOAD_PRESET);

                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const cloudData = await res.json();

                // Enregistrement Firebase
                await addDoc(collection(db, "posts"), {
                    userId: auth.currentUser.uid,
                    username: userData.username,
                    userAvatar: userData.avatarUrl || "",
                    isVerified: userData.isVerified || false, // Badge certifié
                    imageUrl: cloudData.secure_url,
                    caption: document.getElementById('caption').value,
                    likes: [],
                    createdAt: serverTimestamp()
                });

                location.href = 'index.html'; // Succès ! Retour à l'accueil
            } catch (error) {
                alert("Erreur de publication : " + error.message);
                document.getElementById('loader').style.display = 'none';
            }
        };
    </script>
</body>
</html>
