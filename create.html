<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:,">
    <title>Créer - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); font-family: -apple-system, sans-serif; overflow: hidden; color: white; }

        /* --- MODE PUBLIER (CAMÉRA) --- */
        #page-publier { position: absolute; width: 100%; height: 100%; z-index: 1; }
        #video-preview { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .camera-overlay { position: relative; z-index: 5; height: 100%; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent 20%, transparent 80%, rgba(0,0,0,0.8)); }

        /* --- MODE CRÉER (MODÈLES) --- */
        #page-creer { position: absolute; width: 100%; height: 100%; z-index: 2; background: var(--noir); overflow-y: auto; display: none; padding-bottom: 150px; }
        .create-header { padding: 20px; text-align: center; font-weight: 800; font-size: 18px; color: var(--orange); letter-spacing: 2px; }
        
        .tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; text-align: center; font-size: 11px; }
        .tool-item { display: flex; flex-direction: column; align-items: center; gap: 8px; color: #888; }
        .tool-icon-svg { width: 45px; height: 45px; background: var(--gris); border-radius: 12px; display: flex; align-items: center; justify-content: center; fill: var(--orange); border: 1px solid var(--bordure); }

        .banner-new { margin: 0 20px; background: var(--orange); color: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 122, 26, 0.3); }
        
        /* --- MODE LIVE (SETUP) --- */
        #page-live { position: absolute; width: 100%; height: 100%; z-index: 3; display: none; background: radial-gradient(circle at center, #1a0a00 0%, #000 100%); }
        .live-setup-container { padding: 80px 30px; text-align: center; }
        .live-status { color: var(--orange); font-weight: bold; font-size: 14px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .live-input { background: none; border: none; border-bottom: 2px solid var(--orange); width: 100%; color: white; font-size: 24px; text-align: center; outline: none; padding: 10px 0; margin-bottom: 40px; }
        .btn-start-live { background: var(--orange); color: white; border: none; padding: 18px 40px; border-radius: 30px; font-weight: bold; font-size: 16px; box-shadow: 0 0 20px rgba(255, 122, 26, 0.4); }

        /* --- NAVIGATION BAS --- */
        .bottom-ui { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(to top, rgba(0,0,0,1) 80%, transparent); padding-bottom: env(safe-area-inset-bottom); }
        .capture-area { display: flex; justify-content: center; padding: 20px 0; }
        .capture-btn { width: 75px; height: 75px; border-radius: 50%; border: 4px solid white; display: flex; align-items: center; justify-content: center; padding: 4px; }
        .capture-btn-inner { width: 100%; height: 100%; border-radius: 50%; background: white; transition: 0.3s; }
        .capture-btn.live-active { border-color: var(--orange); }
        .capture-btn.live-active .capture-btn-inner { background: var(--orange); }

        .mode-tabs { display: flex; justify-content: center; gap: 30px; padding: 15px 0; font-size: 13px; font-weight: 800; }
        .tab { color: #555; transition: 0.3s; cursor: pointer; }
        .tab.active { color: white; transform: scale(1.1); }

        .close-btn { position: absolute; top: 45px; left: 20px; z-index: 110; fill: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="close-btn" onclick="window.location.href='./index.html'">
        <svg width="28" height="28" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </div>

    <div id="page-publier">
        <video id="video-preview" autoplay playsinline></video>
        <div class="camera-overlay"></div>
    </div>

    <div id="page-creer">
        <div class="create-header">FLOY STUDIO</div>
        <div class="tools-grid">
            <div class="tool-item">
                <div class="tool-icon-svg"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg></div>
                Éditer
            </div>
            <div class="tool-item">
                <div class="tool-icon-svg"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 6c.55 0 1 .45 1 1v10c0 .55-.45 1-1 1s-1-.45-1-1V7c0-.55.45-1 1-1zm10 0c.55 0 1 .45 1 1v10c0 .55-.45 1-1 1s-1-.45-1-1V7c0-.55.45-1 1-1zM10 7v10l7-5-7-5z"/></svg></div>
                AutoCut
            </div>
            <div class="tool-item">
                <div class="tool-icon-svg"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M21 4H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM7 15H5v-2h2v2zm0-4H5V9h2v2zm12 4H9v-2h10v2zm0-4H9V9h10v2z"/></svg></div>
                Légendes
            </div>
            <div class="tool-item">
                <div class="tool-icon-svg"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></div>
                Retouche
            </div>
        </div>
        <div class="banner-new">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Nouvelle vidéo
        </div>
    </div>

    <div id="page-live">
        <div class="live-setup-container">
            <div class="live-status">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="12"/></svg>
                CONFIGURATION LIVE
            </div>
            <input type="text" class="live-input" placeholder="Titre de votre direct...">
            <button class="btn-start-live" onclick="window.location.href='./live-stream.html'">DÉMARRER LE LIVE</button>
        </div>
    </div>

    <div class="bottom-ui">
        <div class="capture-area">
            <div class="capture-btn" id="main-btn">
                <div class="capture-btn-inner"></div>
            </div>
        </div>
        <div class="mode-tabs">
            <span class="tab active" onclick="switchMode('publier', this)">PUBLIER</span>
            <span class="tab" onclick="switchMode('creer', this)">CRÉER</span>
            <span class="tab" onclick="switchMode('live', this)">LIVE</span>
        </div>
    </div>

    <script>
        async function initCam() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video-preview').srcObject = s;
            } catch(e) {}
        }

        function switchMode(mode, el) {
            // Reset pages
            document.getElementById('page-publier').style.display = 'none';
            document.getElementById('page-creer').style.display = 'none';
            document.getElementById('page-live').style.display = 'none';
            
            // Reset tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            const mainBtn = document.getElementById('main-btn');

            if(mode === 'publier') {
                document.getElementById('page-publier').style.display = 'block';
                mainBtn.classList.remove('live-active');
            } else if(mode === 'creer') {
                document.getElementById('page-creer').style.display = 'block';
                mainBtn.classList.remove('live-active');
            } else if(mode === 'live') {
                document.getElementById('page-live').style.display = 'block';
                mainBtn.classList.add('live-active');
            }
        }

        initCam();
    </script>
</body>
</html>
