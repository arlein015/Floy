<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Créer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: sticky; top: 0; background: #000; }
        .main-preview { width: 100%; aspect-ratio: 1/1; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        #config-view { display: none; padding: 20px; }
        .mini { width: 60px; height: 60px; border-radius: 5px; object-fit: cover; }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader" class="loader"><p>Publication en cours...</p></div>

    <div id="gallery-view">
        <div class="header">
            <i class="fas fa-times" onclick="location.href='index.html'"></i>
            <b>Nouvelle publication</b>
            <button id="btn-next" style="color:#0095f6; background:none; border:none; font-weight:bold; display:none;" onclick="showConfig()">Suivant</button>
        </div>
        <div class="main-preview" onclick="document.getElementById('file-input').click()">
            <i id="cam-icon" class="fas fa-camera" style="font-size: 40px; color: #333;"></i>
            <img id="preview-img">
        </div>
    </div>

    <div id="config-view">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="location.reload()"></i>
            <b>Légende</b>
            <button style="color:#0095f6; background:none; border:none; font-weight:bold;" onclick="publishNow()">Partager</button>
        </div>
        <div style="display:flex; gap:15px; margin-top:20px;">
            <img id="mini-img" class="mini">
            <textarea id="caption" placeholder="Écrire une légende..." style="background:none; border:none; color:white; flex:1; outline:none;"></textarea>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImage(event)">

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const CLOUD_NAME = "ds79k3f9g"; //
        const UPLOAD_PRESET = "floy_preset"; //
        let selectedFile = null;

        window.handleImage = (event) => {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('preview-img').src = URL.createObjectURL(file);
                document.getElementById('preview-img').style.display = "block";
                document.getElementById('cam-icon').style.display = "none";
                document.getElementById('btn-next').style.display = "block";
            }
        };

        window.showConfig = () => {
            document.getElementById('gallery-view').style.display = "none";
            document.getElementById('config-view').style.display = "block";
            document.getElementById('mini-img').src = document.getElementById('preview-img').src;
        };

        window.publishNow = async () => {
            document.getElementById('loader').style.display = "flex";
            try {
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('upload_preset', UPLOAD_PRESET);

                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST', body: formData
                });
                const data = await res.json();

                if (data.secure_url) {
                    await addDoc(collection(db, "posts"), {
                        username: auth.currentUser?.displayName || "Utilisateur",
                        imageUrl: data.secure_url,
                        caption: document.getElementById('caption').value,
                        createdAt: serverTimestamp()
                    });
                    location.href = 'index.html';
                }
            } catch (e) {
                alert("Erreur : " + e.message);
                document.getElementById('loader').style.display = "none";
            }
        };
    </script>
</body>
</html>
