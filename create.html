<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Créer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .btn-next { color: #0095f6; background: none; border: none; font-weight: bold; font-size: 16px; display: none; }
        
        /* Zone Preview Noire */
        .main-preview { width: 100%; aspect-ratio: 1/1; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .gallery-area { padding: 15px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #1a1a1a; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Page de configuration cachée */
        #config-view { display: none; padding: 20px; }
        .mini { width: 60px; height: 60px; border-radius: 5px; object-fit: cover; }
    </style>
</head>
<body>

    <div id="gallery-view">
        <div class="header">
            <i class="fas fa-times" onclick="location.href='index.html'"></i>
            <b>Nouvelle publication</b>
            <button id="btn-next" class="btn-next" onclick="showConfig()">Suivant</button>
        </div>

        <div class="main-preview" onclick="document.getElementById('file-input').click()">
            <i id="cam-icon" class="fas fa-camera" style="font-size: 40px; color: #333;"></i>
            <img id="preview-img">
        </div>

        <div class="gallery-area">Récent <i class="fas fa-chevron-down"></i></div>
        
        <div class="grid">
            <div class="grid-item" onclick="document.getElementById('file-input').click()"><i class="fas fa-camera"></i></div>
            <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
        </div>
    </div>

    <div id="config-view">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="location.reload()"></i>
            <b>Nouvelle publication</b>
            <button style="color:#0095f6; background:none; border:none; font-weight:bold;" onclick="alert('Post lancé !')">Partager</button>
        </div>
        <div style="display:flex; gap:15px; margin-top:20px;">
            <img id="mini-img" class="mini">
            <textarea placeholder="Écrire une légende..." style="background:none; border:none; color:white; flex:1; outline:none;"></textarea>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImage(event)">

    <script>
        function handleImage(event) {
            const file = event.target.files[0];
            if (file) {
                const preview = document.getElementById('preview-img');
                const icon = document.getElementById('cam-icon');
                const next = document.getElementById('btn-next');
                
                // On crée le lien de l'image
                const url = URL.createObjectURL(file);
                preview.src = url;
                
                // On affiche l'image et on cache l'icône
                preview.style.display = "block";
                icon.style.display = "none";
                next.style.display = "block";
            }
        }

        function showConfig() {
            document.getElementById('gallery-view').style.display = "none";
            document.getElementById('config-view').style.display = "block";
            // Copie l'image vers la miniature
            document.getElementById('mini-img').src = document.getElementById('preview-img').src;
        }
    </script>
</body>
</html>
