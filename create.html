<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
    <title>Créer - Floy</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        
        /* APPAREIL PHOTO (FLUX VIDÉO) */
        #video-preview { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }

        /* INTERFACE OVERLAY */
        .overlay { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.8) 100%); }

        .top-icons { padding: 40px 20px; display: flex; justify-content: space-between; }
        .close-btn { font-size: 28px; background: none; border: none; color: white; cursor: pointer; }

        /* BOUTON CAPTURE CENTRAL */
        .capture-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .capture-btn { width: 75px; height: 75px; border-radius: 50%; border: 5px solid white; background: none; padding: 5px; cursor: pointer; margin-bottom: 30px; }
        .capture-btn-inner { width: 100%; height: 100%; border-radius: 50%; background: white; transition: 0.2s; }
        .capture-btn.live-mode .capture-btn-inner { background: #FF0000; }

        /* SÉLECTEUR DE MODE (PUBLIER / CRÉER / LIVE) */
        .mode-selector { display: flex; justify-content: center; gap: 30px; padding-bottom: 30px; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .mode { opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .mode.active { opacity: 1; color: white; }

        /* ÉCRAN DE LANCEMENT LIVE (CACHÉ PAR DÉFAUT) */
        #live-setup { position: absolute; bottom: 150px; left: 0; right: 0; text-align: center; display: none; animation: fadeIn 0.3s; }
        .btn-start-live { background: #FF0000; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video id="video-preview" autoplay playsinline></video>

    <div class="overlay">
        <div class="top-icons">
            <button class="close-btn" onclick="window.location.href='index.html'">✕</button>
            <div style="font-size: 20px;">⚡ ⚙️</div>
        </div>

        <div class="bottom-controls">
            <div id="live-setup">
                <h2 style="margin-bottom: 20px;">Prêt à passer en direct ?</h2>
                <button class="btn-start-live" onclick="window.location.href='live-stream.html'">DÉMARRER LE LIVE</button>
            </div>

            <div class="capture-container">
                <div class="capture-btn" id="mainBtn">
                    <div class="capture-btn-inner"></div>
                </div>
            </div>

            <div class="mode-selector">
                <span class="mode active" onclick="switchMode(this, 'publier')">Publier</span>
                <span class="mode" onclick="switchMode(this, 'creer')">Créer</span>
                <span class="mode" onclick="switchMode(this, 'live')">Live</span>
            </div>
        </div>
    </div>

    <script>
        // Activation de la caméra au chargement
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                document.getElementById('video-preview').srcObject = stream;
            } catch (err) {
                console.log("Caméra bloquée ou non disponible");
            }
        }

        function switchMode(element, mode) {
            // Mise à jour visuelle des textes
            document.querySelectorAll('.mode').forEach(m => m.classList.remove('active'));
            element.classList.add('active');

            const liveSetup = document.getElementById('live-setup');
            const mainBtn = document.getElementById('mainBtn');

            if (mode === 'live') {
                liveSetup.style.display = 'block';
                mainBtn.classList.add('live-mode');
            } else {
                liveSetup.style.display = 'none';
                mainBtn.classList.remove('live-mode');
            }
        }

        initCamera();
    </script>
</body>
</html>
