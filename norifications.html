<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Notifications</title>
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; }
        .header { padding: 20px; border-bottom: 1px solid #222; display: flex; align-items: center; }
        .notif-item { 
            padding: 15px 20px; border-bottom: 1px solid #111; display: flex; gap: 15px;
            animation: fadeIn 0.5s ease;
        }
        .notif-icon { font-size: 20px; background: #1a1a1a; padding: 10px; border-radius: 50%; }
        .notif-content { flex: 1; }
        .notif-title { font-weight: bold; font-size: 14px; margin-bottom: 3px; }
        .notif-body { font-size: 12px; color: #888; }
        .notif-time { font-size: 10px; color: #444; margin-top: 5px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <div onclick="window.history.back()" style="cursor:pointer; margin-right:20px; font-size:24px;">‹</div>
        <span style="font-weight:bold;">NOTIFICATIONS</span>
    </div>

    <div id="notifContainer">
        </div>

    <script>
        function loadNotifs() {
            const container = document.getElementById('notifContainer');
            const data = JSON.parse(localStorage.getItem('floy_notifications')) || [];
            
            if(data.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#444; margin-top:50px;">Aucune notification</div>';
                return;
            }

            container.innerHTML = data.map(n => `
                <div class="notif-item">
                    <div class="notif-icon">${n.icon}</div>
                    <div class="notif-content">
                        <div class="notif-title">${n.title}</div>
                        <div class="notif-body">${n.body}</div>
                        <div class="notif-time">${n.time}</div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadNotifs;
    </script>
</body>
</html>
