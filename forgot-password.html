<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Récupération</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { width: 90%; max-width: 400px; padding: 25px; text-align: center; background: #111; border-radius: 20px; border: 1px solid #222; }
        input { width: 100%; padding: 14px; margin: 15px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn-reset { width: 100%; padding: 14px; background: var(--orange); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .link { color: #888; font-size: 14px; margin-top: 20px; display: block; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 style="color:var(--orange)">Mot de passe oublié ?</h2>
        <p style="color:#888; font-size: 14px;">Entre ton email pour recevoir un lien de réinitialisation.</p>
        
        <input type="email" id="reset-email" placeholder="Ton adresse email">
        
        <button class="btn-reset" id="btn-send-email">Envoyer le lien</button>
        
        <a href="login.html" class="link">Retour à la connexion</a>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        document.getElementById('btn-send-email').onclick = async () => {
            const email = document.getElementById('reset-email').value;

            if(!email) {
                alert("S'il te plaît, entre ton email.");
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                alert("Lien envoyé ! Vérifie tes e-mails (et tes spams).");
                window.location.href = "login.html";
            } catch (error) {
                alert("Erreur : " + error.message);
            }
        };
    </script>
</body>
</html>
