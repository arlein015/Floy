<style>
    .share-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        display: none;
        z-index: 2000;
        backdrop-filter: blur(5px);
    }

    .share-popup {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        width: 280px;
        background: #111;
        border: 1px solid #333;
        border-radius: 25px;
        padding: 30px 20px;
        text-align: center;
        z-index: 2001;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .share-popup.active {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1);
    }

    .qr-box {
        background: white;
        padding: 12px;
        border-radius: 15px;
        display: inline-block;
        margin: 20px 0;
    }

    .qr-box img {
        width: 160px;
        height: 160px;
        display: block;
    }

    .share-title { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
    .share-handle { color: #888; font-size: 14px; margin-bottom: 20px; }

    .btn-copy {
        background: #FF7A1A; /* Orange Floy */
        color: black;
        border: none;
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn-copy:active { transform: scale(0.95); }

    .close-share {
        position: absolute;
        top: 15px; right: 20px;
        font-size: 28px;
        color: #444;
        cursor: pointer;
    }
</style>

<div id="shareOverlay" class="share-overlay" onclick="closeSharePopup()"></div>

<div id="sharePopup" class="share-popup">
    <span class="close-share" onclick="closeSharePopup()">&times;</span>
    <div class="share-title">Partager mon profil</div>
    <div class="share-handle">@arlein_off</div>
    
    <div class="qr-box">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://floy.app/arlein_off" alt="QR Code Floy">
    </div>

    <button class="btn-copy" onclick="copyFloyLink()">
        🔗 Copier le lien
    </button>
</div>

<script>
    function openSharePopup() {
        document.getElementById('shareOverlay').style.display = 'block';
        setTimeout(() => {
            document.getElementById('sharePopup').classList.add('active');
        }, 10);
    }

    function closeSharePopup() {
        document.getElementById('sharePopup').classList.remove('active');
        setTimeout(() => {
            document.getElementById('shareOverlay').style.display = 'none';
        }, 300);
    }

    function copyFloyLink() {
        const profileUrl = "https://floy.app/arlein_off";
        navigator.clipboard.writeText(profileUrl).then(() => {
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ Copié !";
            btn.style.background = "#28a745"; // Vert temporaire
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = "#FF7A1A";
                closeSharePopup();
            }, 1500);
        });
    }
</script>
