<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Threndly - Analytics</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stat-card { background: #111; margin: 20px; padding: 20px; border-radius: 15px; border-left: 4px solid var(--threndly-blue); }
        .stat-num { font-size: 28px; font-weight: 700; color: var(--threndly-violet); }
        .chart-dummy { width: 100%; height: 150px; background: linear-gradient(90deg, #111 10%, #222 50%, #111 90%); border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="padding: 20px;">Tableau de bord</h2>
    <div class="stat-card"><span>Vues totales</span><div class="stat-num">1.2M</div><div class="chart-dummy"></div></div>
    <div class="stat-card"><span>Gains estimés</span><div class="stat-num">450.00 €</div></div>
</body>
</html>
