<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Floy - Chat Fix</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ZONE MESSAGES */
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .bubble { max-width: 75%; padding: 12px; border-radius: 18px; font-size: 15px; position: relative; }
        .sent { align-self: flex-end; background: var(--orange); color: black; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #1a1a1a; border-bottom-left-radius: 2px; }

        /* BARRE DE SAISIE BOOSTÉE */
        .input-area { 
            background: #080808; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-top: 1px solid #1a1a1a;
            z-index: 999;
            /* On s'assure qu'elle est au dessus de la navbar */
            margin-bottom: 60px; 
        }

        .message-input { 
            flex: 1; 
            background: #151515; 
            border: 1px solid #222; 
            padding: 14px; 
            border-radius: 30px; 
            color: white; 
            font-size: 16px; /* TAILLE CRITIQUE POUR LE CLAVIER */
            outline: none;
            -webkit-appearance: none;
        }

        .btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-plus { background: #222; color: white; font-size: 24px; }
        .btn-send { background: var(--orange); }

        /* MENU CONTEXTUEL */
        #contextMenu { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .menu-box { background: #1a1a1a; width: 280px; border-radius: 15px; overflow: hidden; }
        .menu-opt { padding: 15px; text-align: center; border-bottom: 1px solid #222; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div style="padding: 15px; border-bottom: 1px solid #111; display: flex; align-items: center;">
        <div onclick="history.back()" style="margin-right: 15px; font-size: 20px;">←</div>
        <b id="chatTitle">Alexandre Dupont</b>
    </div>

    <div id="chatBox"></div>

    <div id="contextMenu" onclick="this.style.display='none'">
        <div class="menu-box" onclick="event.stopPropagation()">
            <div class="menu-opt" onclick="copyAction()">📋 Copier</div>
            <div class="menu-opt" onclick="deleteAction()" style="color: #ff4444;">🗑️ Supprimer</div>
            <div class="menu-opt" onclick="document.getElementById('contextMenu').style.display='none'">Annuler</div>
        </div>
    </div>

    <div class="input-area">
        <button class="btn btn-plus" onclick="document.getElementById('fileIn').click()">+</button>
        <input type="file" id="fileIn" hidden onchange="uploadFile(this)">
        
        <input type="text" id="msgInput" 
               class="message-input" 
               placeholder="Écrire un message..." 
               inputmode="text" 
               enterkeyhint="send">
        
        <button class="btn btn-send" onclick="send()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        let selectedIdx = null;
        let holdTimer;

        // CHARGEMENT & AFFICHAGE
        function load() {
            chatBox.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem('floy_chat')) || [];
            logs.forEach((m, i) => {
                const b = document.createElement('div');
                b.className = `bubble ${m.type}`;
                b.innerText = m.content;
                
                // LONG PRESS
                b.onmousedown = b.ontouchstart = () => {
                    holdTimer = setTimeout(() => {
                        selectedIdx = i;
                        document.getElementById('contextMenu').style.display = 'flex';
                    }, 600);
                };
                b.onmouseup = b.ontouchend = () => clearTimeout(holdTimer);
                
                chatBox.appendChild(b);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function send() {
            const val = msgInput.value.trim();
            if(!val) return;
            const logs = JSON.parse(localStorage.getItem('floy_chat')) || [];
            logs.push({content: val, type: 'sent'});
            localStorage.setItem('floy_chat', JSON.stringify(logs));
            msgInput.value = "";
            load();
            // Garder le focus après envoi
            msgInput.focus();
        }

        // FORCE LE CLAVIER AU CLIC
        msgInput.onclick = function() {
            this.focus();
        };

        function deleteAction() {
            let logs = JSON.parse(localStorage.getItem('floy_chat'));
            logs.splice(selectedIdx, 1);
            localStorage.setItem('floy_chat', JSON.stringify(logs));
            document.getElementById('contextMenu').style.display = 'none';
            load();
        }

        function copyAction() {
            const logs = JSON.parse(localStorage.getItem('floy_chat'));
            navigator.clipboard.writeText(logs[selectedIdx].content);
            document.getElementById('contextMenu').style.display = 'none';
        }

        msgInput.onkeypress = (e) => { if(e.key === "Enter") send(); };
        window.onload = load;
    </script>

    <script src="navbar.js"></script>
</body>
</html>
