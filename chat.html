<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Discussion - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #1a1a1a; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER */
        .chat-header { display: flex; align-items: center; padding: 15px 20px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #222; z-index: 10; }
        .back-btn { background: none; border: none; color: var(--orange); font-size: 28px; cursor: pointer; padding-right: 15px; text-decoration: none; }
        .user-profile { display: flex; align-items: center; gap: 12px; flex: 1; }
        .chat-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--orange); }
        .chat-user-name { font-weight: bold; font-size: 16px; }

        /* ZONE DES MESSAGES */
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #000; }
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .msg.received { align-self: flex-start; background: var(--gris); border-bottom-left-radius: 4px; }
        .msg.sent { align-self: flex-end; background: var(--orange); color: black; border-bottom-right-radius: 4px; font-weight: 500; }
        
        /* STYLE POUR LES PHOTOS DANS LE CHAT */
        .msg-img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; cursor: pointer; }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 5px; display: block; text-align: right; }

        /* BARRE D'ENVOI */
        .input-bar { padding: 15px 20px; background: #0a0a0a; border-top: 1px solid #222; display: flex; align-items: center; gap: 12px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        
        /* Bouton média */
        .media-btn { background: #222; border: none; width: 40px; height: 40px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .input-wrapper { flex: 1; background: #1c1c1c; border-radius: 25px; padding: 10px 15px; display: flex; align-items: center; }
        .input-wrapper input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 15px; }
        .send-btn { background: var(--orange); border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="messages.html" class="back-btn">‹</a>
        <div class="user-profile">
            <img id="headerAvatar" src="" class="chat-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User'">
            <span class="chat-user-name" id="headerName">Chargement...</span>
        </div>
    </div>

    <div class="messages-container" id="msgBox">
        <div class="msg received">
            Salut ! Envoie-moi une photo pour tester.
            <span class="msg-time">12:00</span>
        </div>
    </div>

    <div class="input-bar">
        <input type="file" id="imgInput" hidden accept="image/*" onchange="sendPhoto(this)">
        
        <button class="media-btn" onclick="document.getElementById('imgInput').click()">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>

        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Message..." onkeypress="if(event.key==='Enter') sendText()">
        </div>

        <button class="send-btn" onclick="sendText()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');
        const msgBox = document.getElementById('msgBox');

        // Charger infos utilisateur
        function loadChat() {
            const contacts = JSON.parse(localStorage.getItem('floy_contacts') || "[]");
            const user = contacts.find(c => c.id === userId);
            if (user) {
                document.getElementById('headerName').textContent = user.name;
                document.getElementById('headerAvatar').src = user.img;
            }
        }

        // Envoyer du texte
        function sendText() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            addMessage(input.value, 'sent');
            input.value = "";
        }

        // Envoyer une photo
        function sendPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgHtml = `<img src="${e.target.result}" class="msg-img">`;
                    addMessage(imgHtml, 'sent');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Fonction générique pour ajouter un message à l'écran
        function addMessage(content, type) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const html = `
                <div class="msg ${type}">
                    ${content}
                    <span class="msg-time">${time}</span>
                </div>
            `;
            msgBox.insertAdjacentHTML('beforeend', html);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        window.onload = loadChat;
    </script>
</body>
</html>
