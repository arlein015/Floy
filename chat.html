<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --bg: #000; --dark-gray: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* Header du Chat */
        .chat-header { padding: 10px 15px; display: flex; align-items: center; border-bottom: 1px solid #222; background: #000; z-index: 10; }
        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; }
        .recipient-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; margin-right: 10px; background: #222; }
        .recipient-name { font-weight: bold; font-size: 16px; }

        /* Zone des messages (Bulles) */
        #messages-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .sent { align-self: flex-end; background: var(--orange); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--dark-gray); color: white; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.6; display: block; margin-top: 5px; text-align: right; }

        /* Barre d'envoi fixe en bas */
        .input-area { padding: 10px 15px; background: #000; border-top: 1px solid #222; display: flex; align-items: center; gap: 10px; }
        .chat-input { flex: 1; background: #121212; border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 25px; outline: none; font-size: 14px; }
        .send-btn { background: none; border: none; color: var(--orange); font-size: 20px; cursor: pointer; padding: 5px; }
        .send-btn:disabled { color: #444; }
    </style>
</head>
<body>

    <div class="chat-header">
        <i class="fas fa-arrow-left back-btn" onclick="location.href='message-list.html'"></i>
        <img id="header-img" class="recipient-img" src="https://via.placeholder.com/50">
        <span id="header-name" class="recipient-name">Chargement...</span>
    </div>

    <div id="messages-container">
        </div>

    <div class="input-area">
        <input type="text" id="message-input" class="chat-input" placeholder="Écris un message..." autocomplete="off">
        <button id="send-btn" class="send-btn" disabled><i class="fas fa-paper-plane"></i></button>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 1. Récupérer l'ID de la discussion dans l'URL (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('id');

        if (!chatId) {
            location.href = 'message-list.html';
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 2. Charger les infos de l'autre utilisateur (Header)
                const chatRef = doc(db, "chats", chatId);
                const chatSnap = await getDoc(chatRef);
                
                if (chatSnap.exists()) {
                    const otherUserId = chatSnap.data().users.find(id => id !== user.uid);
                    onSnapshot(doc(db, "users", otherUserId), (uSnap) => {
                        if (uSnap.exists()) {
                            document.getElementById('header-name').innerText = uSnap.data().username || "Utilisateur";
                            if (uSnap.data().avatarUrl) document.getElementById('header-img').src = uSnap.data().avatarUrl;
                        }
                    });
                }

                // 3. Écouter les messages en TEMPS RÉEL
                const msgsQuery = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
                onSnapshot(msgsQuery, (snapshot) => {
                    const container = document.getElementById('messages-container');
                    container.innerHTML = "";
                    
                    snapshot.forEach((d) => {
                        const msg = d.data();
                        const isMine = msg.senderId === user.uid;
                        
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `message ${isMine ? 'sent' : 'received'}`;
                        msgDiv.innerHTML = `
                            ${msg.text}
                            <span class="msg-time">${msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                        `;
                        container.appendChild(msgDiv);
                    });
                    
                    // Scroller automatiquement vers le bas
                    container.scrollTop = container.scrollHeight;
                });

                // 4. Gérer l'envoi de message
                const input = document.getElementById('message-input');
                const btn = document.getElementById('send-btn');

                input.oninput = () => btn.disabled = !input.value.trim();

                const sendMessage = async () => {
                    const text = input.value.trim();
                    if (!text) return;

                    input.value = "";
                    btn.disabled = true;

                    try {
                        // Ajouter le message dans la sous-collection
                        await addDoc(collection(db, "chats", chatId, "messages"), {
                            text: text,
                            senderId: user.uid,
                            createdAt: serverTimestamp()
                        });

                        // Mettre à jour le dernier message dans la liste (chats)
                        await setDoc(doc(db, "chats", chatId), {
                            lastMessage: text,
                            lastUpdate: serverTimestamp()
                        }, { merge: true });

                    } catch (e) {
                        console.error("Erreur d'envoi :", e);
                    }
                };

                btn.onclick = sendMessage;
                input.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

            } else {
                location.href = 'connexion.html';
            }
        });
    </script>
</body>
</html>
