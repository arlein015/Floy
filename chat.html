<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Floy - Discussion Vocal</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .chat-header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; background: var(--noir); }
        .back-btn { cursor: pointer; margin-right: 15px; font-size: 24px; }

        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 12px; border-radius: 18px; font-size: 15px; position: relative; }
        .sent { align-self: flex-end; background: var(--orange); color: black; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #1a1a1a; border-bottom-left-radius: 2px; }

        .chat-img { max-width: 220px; border-radius: 10px; display: block; }
        
        /* STYLE VOCAL */
        .vocal-player { display: flex; align-items: center; gap: 10px; min-width: 150px; }
        audio { height: 30px; width: 100%; filter: invert(1); }

        /* BARRE DE SAISIE */
        .input-area { 
            background: #080808; padding: 10px 15px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #1a1a1a;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .message-input { flex: 1; background: #151515; border: 1px solid #222; padding: 12px 18px; border-radius: 25px; color: white; font-size: 16px; outline: none; }
        .btn-icon { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 5px; color: white; }
        .btn-send { width: 42px; height: 42px; background: var(--orange); border-radius: 50%; display: none; align-items: center; justify-content: center; }

        /* Timer vocal */
        #vocalTimer { display: none; color: #ff4444; font-weight: bold; margin-right: 10px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        #contextMenu { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .menu-box { background: #1a1a1a; width: 260px; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        .menu-opt { padding: 15px; text-align: center; border-bottom: 1px solid #222; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-header">
        <div class="back-btn" onclick="history.back()">←</div>
        <b>Alexandre Dupont</b>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <button class="btn-icon" onclick="document.getElementById('fileIn').click()">+</button>
        <input type="file" id="fileIn" accept="image/*" hidden onchange="uploadMedia(this)">
        
        <span id="vocalTimer">0:00</span>
        <input type="text" id="msgInput" class="message-input" placeholder="Message..." oninput="toggleButtons()">

        <button id="micBtn" class="btn-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>

        <button id="sendBtn" class="btn-icon btn-send" onclick="send()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const micBtn = document.getElementById('micBtn');
        const sendBtn = document.getElementById('sendBtn');
        const timerLabel = document.getElementById('vocalTimer');

        let mediaRecorder;
        let audioChunks = [];
        let startTime;
        let timerInterval;

        window.onload = load;

        function toggleButtons() {
            const hasText = msgInput.value.trim() !== "";
            micBtn.style.display = hasText ? "none" : "flex";
            sendBtn.style.display = hasText ? "flex" : "none";
        }

        // --- LOGIQUE VOCALE ---
        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });

        window.addEventListener('mouseup', stopRecording);
        window.addEventListener('touchend', stopRecording);

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = saveVocal;

                mediaRecorder.start();
                
                // UI
                startTime = Date.now();
                timerLabel.style.display = "block";
                msgInput.style.display = "none";
                timerInterval = setInterval(updateTimer, 1000);
            } catch (err) { alert("Accès micro refusé ou non supporté."); }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                timerLabel.style.display = "none";
                msgInput.style.display = "block";
            }
        }

        function updateTimer() {
            const sec = Math.floor((Date.now() - startTime) / 1000);
            timerLabel.innerText = `0:${sec < 10 ? '0' : ''}${sec}`;
        }

        function saveVocal() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
            const reader = new FileReader();
            reader.onload = (e) => save({ content: e.target.result, type: 'sent', isVocal: true });
            reader.readAsDataURL(audioBlob);
        }

        // --- ENVOI SIMPLE ---
        function send() {
            const val = msgInput.value.trim();
            if(!val) return;
            save({content: val, type: 'sent', isImg: false, isVocal: false});
            msgInput.value = "";
            toggleButtons();
        }

        function uploadMedia(input) {
            if(input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => save({content: e.target.result, type: 'sent', isImg: true});
                reader.readAsDataURL(input.files[0]);
            }
        }

        function save(msg) {
            const logs = JSON.parse(localStorage.getItem('floy_chat_history')) || [];
            logs.push(msg);
            localStorage.setItem('floy_chat_history', JSON.stringify(logs));
            load();
        }

        function load() {
            chatBox.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem('floy_chat_history')) || [];
            logs.forEach((m) => {
                const b = document.createElement('div');
                b.className = `bubble ${m.type}`;
                if(m.isVocal) {
                    b.innerHTML = `<div class="vocal-player"><audio controls src="${m.content}"></audio></div>`;
                } else if(m.isImg) {
                    b.innerHTML = `<img src="${m.content}" class="chat-img">`;
                } else {
                    b.innerText = m.content;
                }
                chatBox.appendChild(b);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
