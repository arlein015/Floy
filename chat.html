<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; img-src * data: blob:; media-src * data: blob:; connect-src *;">
    <link rel="icon" href="data:,">
    
    <style>
        :root {
            --bg: #000000;
            --card: #0d0d0d;
            --primary: linear-gradient(135deg, #7F00FF, #007BFF);
            --accent: #00FFFF;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Premium */
        header {
            padding: 15px 20px;
            background: var(--card);
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: -1px; background: var(--primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .call-btns button {
            background: rgba(255,255,255,0.03);
            border: 1px solid #333;
            color: #fff;
            width: 40px; height: 40px;
            border-radius: 12px;
            cursor: pointer;
            margin-left: 8px;
            transition: 0.3s;
        }
        .call-btns button:hover { border-color: var(--accent); color: var(--accent); }

        /* Messages */
        #messages-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg {
            max-width: 70%; padding: 12px 16px; border-radius: 18px;
            font-size: 15px; position: relative;
        }
        .sent { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #1a1a1a; border: 1px solid #222; border-bottom-left-radius: 4px; }

        /* Barre d'envoi style iOS/Modern */
        .input-area {
            padding: 15px 20px;
            background: var(--card);
            display: flex; align-items: center; gap: 12px;
            border-top: 1px solid #222;
        }

        .icon-btn {
            background: none; border: none; color: #666;
            font-size: 20px; cursor: pointer; transition: 0.2s;
        }
        .icon-btn:hover { color: var(--accent); }

        #msg-input {
            flex: 1; background: #181818; border: 1px solid #333;
            color: #fff; padding: 12px 18px; border-radius: 25px;
            outline: none; font-size: 15px;
        }

        #send-btn {
            background: var(--primary); border: none; color: #fff;
            width: 45px; height: 45px; border-radius: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .recording-active { color: #ff4d4d !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        img.media { max-width: 100%; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div class="logo">THRENDLY</div>
    <div class="call-btns">
        <button><i class="fa-solid fa-phone"></i></button>
        <button><i class="fa-solid fa-video"></i></button>
    </div>
</header>

<div id="messages-container"></div>

<div class="input-area">
    <input type="file" id="file-input" style="display:none">
    <button class="icon-btn" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-paperclip"></i></button>
    <button class="icon-btn" id="vocal-btn"><i class="fa-solid fa-microphone"></i></button>
    <input type="text" id="msg-input" placeholder="Message..." autocomplete="off">
    <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // --- CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "TON_API_KEY",
        authDomain: "floy-9f9a1.firebaseapp.com",
        projectId: "floy-9f9a1",
        storageBucket: "floy-9f9a1.firebasestorage.app",
        messagingSenderId: "TON_ID",
        appId: "TON_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const chatId = new URLSearchParams(window.location.search).get('id') || "chat_general";

    // --- RÉCEPTION DES MESSAGES ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${d.senderId === user.uid ? 'sent' : 'received'}`;
                    
                    if(d.type === "image") div.innerHTML += `<img src="${d.url}" class="media">`;
                    if(d.text) div.innerHTML += `<div>${d.text}</div>`;
                    if(d.type === "vocal") div.innerHTML += `<audio src="${d.url}" controls></audio>`;
                    
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }
    });

    // --- FONCTION ENVOI (LA CORRECTION EST ICI) ---
    async function handleSend() {
        console.log("Tentative d'envoi..."); // Pour vérifier dans la console
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        const user = auth.currentUser;

        if (!user) {
            alert("Tu n'es pas connecté !");
            return;
        }

        if (text === "") return; // Ne rien envoyer si c'est vide

        // On vide l'input tout de suite pour l'effet "pro"
        input.value = "";

        try {
            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: text,
                senderId: user.uid,
                type: "text",
                timestamp: serverTimestamp()
            });
            console.log("Message envoyé !");
        } catch (error) {
            console.error("Erreur Firestore :", error);
            alert("Erreur lors de l'envoi");
        }
    }

    // Écouteur sur le bouton
    document.getElementById('send-btn').addEventListener('click', (e) => {
        e.preventDefault();
        handleSend();
    });

    // Écouteur sur la touche Entrée
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            handleSend();
        }
    });

    // --- GESTION DES FICHIERS ---
    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !auth.currentUser) return;

        const fRef = ref(storage, `chats/${chatId}/${Date.now()}_${file.name}`);
        await uploadBytes(fRef, file);
        const url = await getDownloadURL(fRef);

        await addDoc(collection(db, "chats", chatId, "messages"), {
            url: url,
            type: file.type.includes("image") ? "image" : "video",
            senderId: auth.currentUser.uid,
            timestamp: serverTimestamp()
        });
    };
</script>
</body>
</html>
