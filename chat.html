<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Threndly - Discussion</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --blue: #2D9CDB; --purple: #BB6BD9; --black: #000000;
            --grad: linear-gradient(135deg, #2D9CDB 0%, #BB6BD9 100%); 
        }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--black); height: 100vh; display: flex; overflow: hidden; color: white; }

        /* --- BARRE LATÉRALE --- */
        #sidebar { 
            width: 70px; border-right: 1px solid #1a1a1a; display: flex; 
            flex-direction: column; align-items: center; padding-top: 25px; 
            background: #050505;
        }
        .nav-icon { font-size: 1.5rem; color: #444; margin-bottom: 30px; cursor: pointer; transition: 0.3s; }
        .nav-icon.active { color: var(--blue); }
        .avatar-circle { width: 45px; height: 45px; background: var(--grad); border-radius: 14px; margin-bottom: 30px; }

        /* --- ZONE DE CHAT --- */
        #chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        header { 
            padding: 15px 25px; border-bottom: 1px solid #1a1a1a; 
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .status { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 1.1rem; }
        .dot { width: 8px; height: 8px; background: #27AE60; border-radius: 50%; box-shadow: 0 0 10px #27AE60; }

        #msg-list { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; 
            flex-direction: column; gap: 15px; background-image: radial-gradient(#111 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- BULLES DE MESSAGE --- */
        .msg-container { display: flex; flex-direction: column; max-width: 80%; }
        .sender-name { font-size: 0.7rem; color: #666; margin-bottom: 4px; margin-left: 10px; }
        
        .bubble { padding: 12px 18px; border-radius: 22px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        
        .me { align-self: flex-end; }
        .me .bubble { background: var(--grad); color: white; border-bottom-right-radius: 4px; }
        
        .other { align-self: flex-start; }
        .other .bubble { background: #1a1a1a; color: #eee; border: 1px solid #222; border-bottom-left-radius: 4px; }

        /* --- SAISIE MESSAGE --- */
        footer { 
            padding: 20px; display: flex; gap: 12px; align-items: center; 
            background: #050505; border-top: 1px solid #1a1a1a;
        }
        #msg-in { 
            flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #222; 
            background: #111; color: white; outline: none; transition: 0.3s;
        }
        #msg-in:focus { border-color: var(--blue); background: #151515; }
        
        .send-btn { 
            width: 50px; height: 50px; border-radius: 50%; border: none; 
            background: var(--grad); color: white; font-size: 1.2rem; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="avatar-circle"></div>
        <i class="fas fa-comment-alt nav-icon active"></i>
        <i class="fas fa-users nav-icon"></i>
        <i class="fas fa-cog nav-icon"></i>
        <div style="margin-top: auto; padding-bottom: 20px;">
            <i class="fas fa-sign-out-alt nav-icon" onclick="logout()"></i>
        </div>
    </nav>

    <main id="chat-main">
        <header>
            <div class="status">
                <div class="dot"></div>
                <span>Threndly Network</span>
            </div>
            <i class="fas fa-ellipsis-h" style="color:#444; cursor:pointer;"></i>
        </header>

        <div id="msg-list">
            </div>

        <footer>
            <button class="nav-icon" style="margin:0; font-size:1.2rem;"><i class="fas fa-image"></i></button>
            <input type="text" id="msg-in" placeholder="Écrire un message intelligent..." onkeypress="handleEnter(event)">
            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
