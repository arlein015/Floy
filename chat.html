<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Chat Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #000000;
            --accent-violet: #a456f0;
            --accent-blue: #3a55d1;
            --floy-cyan: #00e5ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            background: linear-gradient(180deg, #1a0033 0%, var(--bg-dark) 100%); 
            font-family: 'Poppins', sans-serif; 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- Header --- */
        .chat-header { 
            padding: 45px 20px 15px; 
            background: rgba(0,0,0,0.85); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            z-index: 10;
        }
        .header-user { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent-violet); }

        /* --- Chat Container --- */
        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: transparent;
        }

        .msg { 
            max-width: 75%; 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: 14px; 
            position: relative; 
            transition: 0.2s;
        }
        .msg-sent { 
            align-self: flex-end; 
            background: linear-gradient(135deg, var(--accent-violet) 0%, var(--accent-blue) 100%); 
            border-radius: 20px 20px 5px 20px; 
            box-shadow: 0 4px 15px rgba(164, 86, 240, 0.2);
        }
        .msg-received { 
            align-self: flex-start; 
            background: var(--glass); 
            border-radius: 20px 20px 20px 5px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        /* --- Recording & Waves --- */
        #recordingStatus { 
            display: none; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            padding: 10px; 
            background: rgba(255, 59, 48, 0.15); 
            border-radius: 50px; 
            margin: 10px 20px; 
        }
        .wave { width: 3px; height: 15px; background: #ff3b30; border-radius: 3px; animation: waveAnim 0.6s infinite ease-in-out; }
        @keyframes waveAnim { 0%, 100% { height: 5px; } 50% { height: 20px; } }

        /* --- Input Area --- */
        .input-area { 
            padding: 15px 20px 35px; 
            background: var(--bg-dark); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .message-input { 
            flex: 1; 
            background: var(--glass); 
            border: none; 
            padding: 14px 22px; 
            border-radius: 30px; 
            color: white; 
            outline: none; 
            font-family: 'Poppins';
        }
        .icon-btn { font-size: 20px; opacity: 0.7; cursor: pointer; transition: 0.3s; }
        .icon-btn:hover { opacity: 1; color: var(--floy-cyan); }
        .recording-on { color: #ff3b30 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        .delete-btn { font-size: 9px; color: #ff3b30; display: block; margin-top: 5px; text-align: right; cursor: pointer; opacity: 0.7; }
    </style>
</head>
<body>

    <header class="chat-header">
        <i class="fas fa-chevron-left" onclick="window.history.back()"></i>
        <div class="header-user">
            <img src="logo.png" class="user-avatar">
            <div>
                <div style="font-weight:700; font-size:14px">@bouta <i class="fas fa-check-circle" style="color:var(--floy-cyan); font-size:10px"></i></div>
                <div style="font-size:10px; opacity:0.5">En ligne</div>
            </div>
        </div>
        <i class="fas fa-video icon-btn" id="videoCallBtn" style="color:var(--floy-cyan)"></i>
    </header>

    <div class="chat-container" id="chatContainer"></div>

    <div id="recordingStatus">
        <div class="wave"></div><div class="wave" style="animation-delay:0.1s"></div><div class="wave" style="animation-delay:0.2s"></div>
        <span style="font-size:11px; color:#ff3b30; font-weight:700">ENREGISTREMENT EN COURS...</span>
    </div>

    <div class="input-area">
        <label for="fileInput"><i class="fas fa-plus icon-btn"></i></label>
        <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
        
        <input type="text" id="messageInput" class="message-input" placeholder="Écris à Threndly...">
        
        <i class="fas fa-microphone icon-btn" id="micBtn"></i>
        <i class="fas fa-paper-plane" id="sendBtn" style="color:var(--accent-violet); font-size:22px; cursor:pointer"></i>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDimaKVWWObrRRR83OjVBJJbFtsNjXphXI",
            authDomain: "trendly-fca7c.firebaseapp.com",
            projectId: "trendly-fca7c",
            storageBucket: "trendly-fca7c.firebasestorage.app",
            messagingSenderId: "1070458426638",
            appId: "1:1070458426638:web:6a7dd8dadc78e45019735f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const chatContainer = document.getElementById('chatContainer');
        const currentUser = localStorage.getItem('floy_username') || "Utilisateur";

        // --- SUPPRESSION ---
        window.deleteMsg = async (id) => {
            if(confirm("Supprimer ce message ?")) await deleteDoc(doc(db, "chats", id));
        };

        // --- APPEL VIDÉO ---
        document.getElementById('videoCallBtn').onclick = async () => {
            const roomId = "Threndly-" + Math.floor(Math.random() * 10000);
            const url = `https://meet.jit.si/${roomId}`;
            if(confirm("Démarrer un appel vidéo ?")) {
                await addDoc(collection(db, "chats"), { callLink: url, sender: currentUser, timestamp: serverTimestamp() });
                window.open(url, '_blank');
            }
        };

        // --- TEXTE ---
        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('messageInput');
            if(input.value.trim()) {
                await addDoc(collection(db, "chats"), { text: input.value, sender: currentUser, timestamp: serverTimestamp() });
                input.value = "";
            }
        };

        // --- FICHIERS ---
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const sRef = ref(storage, `media/${Date.now()}_${file.name}`);
            await uploadBytes(sRef, file);
            const url = await getDownloadURL(sRef);
            await addDoc(collection(db, "chats"), { fileUrl: url, fileType: file.type, sender: currentUser, timestamp: serverTimestamp() });
        };

        // --- VOCAL ---
        let mr; let chunks = [];
        document.getElementById('micBtn').onclick = async function() {
            if(!mr || mr.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mr = new MediaRecorder(stream);
                mr.onstart = () => { document.getElementById('recordingStatus').style.display = "flex"; this.classList.add('recording-on'); };
                mr.ondataavailable = e => chunks.push(e.data);
                mr.onstop = async () => {
                    document.getElementById('recordingStatus').style.display = "none";
                    this.classList.remove('recording-on');
                    const blob = new Blob(chunks, { type: 'audio/mp3' });
                    const sRef = ref(storage, `vocaux/${Date.now()}.mp3`);
                    await uploadBytes(sRef, blob);
                    const url = await getDownloadURL(sRef);
                    await addDoc(collection(db, "chats"), { fileUrl: url, fileType: 'audio/mp3', sender: currentUser, timestamp: serverTimestamp() });
                    chunks = [];
                };
                mr.start();
            } else { mr.stop(); }
        };

        // --- TEMPS RÉEL (onSnapshot) ---
        onSnapshot(query(collection(db, "chats"), orderBy("timestamp", "asc")), (snap) => {
            chatContainer.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const isMe = data.sender === currentUser;
                const div = document.createElement('div');
                div.classList.add('msg', isMe ? 'msg-sent' : 'msg-received');

                let html = "";
                if(data.callLink) {
                    html = `<div style="text-align:center"><i class="fas fa-video"></i><br><a href="${data.callLink}" target="_blank" style="color:white;font-weight:700;font-size:11px">REJOINDRE L'APPEL</a></div>`;
                } else if(data.fileUrl) {
                    if(data.fileType.includes('image')) html = `<img src="${data.fileUrl}" style="width:100%;border-radius:12px">`;
                    else if(data.fileType.includes('audio')) html = `<audio src="${data.fileUrl}" controls style="width:100%"></audio>`;
                } else {
                    html = `<div>${data.text}</div>`;
                }

 * @param {string} currentUserId - Ton ID Firebase

async function startChat(currentUserId, otherUserId) {
    // 1. Créer un ID unique pour ce duo (ex: "abc_xyz")
    // On les trie pour que l'ID soit le même que ce soit A qui parle à B ou B à A
    const chatId = currentUserId < otherUserId 
        ? `${currentUserId}_${otherUserId}` 
        : `${otherUserId}_${currentUserId}`;

    const chatRef = doc(db, "chats", chatId);

        console.log("Création d'une nouvelle discussion...");

            await setDoc(chatRef, {

            });
            console.log("Discussion créée !");
        } catch (error) {
            console.error("Erreur lors de la création :", error);
        }
    } else {
        console.log("La discussion existe déjà.");

                chatContainer.appendChild(div);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });
    </script>
</body>
</html>
