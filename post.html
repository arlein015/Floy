<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .badge-glow { box-shadow: 0 0 10px #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <div class="max-w-md mx-auto bg-white mb-4 shadow-sm border-b md:rounded-xl md:mt-4 overflow-hidden">
        
        <div class="flex items-center justify-between p-3">
            <div class="flex items-center space-x-3">
                <img src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full border-2 border-blue-500" alt="Avatar">
                <div>
                    <div class="flex items-center">
                        <span class="font-bold text-sm">NomUtilisateur</span>
                        <span class="ml-1 text-blue-500 badge-glow rounded-full bg-blue-100 p-0.5 text-[10px]">
                            <i class="fas fa-check-circle"></i>
                        </span>
                    </div>
                    <p class="text-gray-500 text-xs">Il y a 2h</p>
                </div>
            </div>
            <button class="text-gray-400"><i class="fas fa-ellipsis-h"></i></button>
        </div>

        <div class="relative bg-black flex items-center justify-center min-h-[300px]">
            <img src="https://via.placeholder.com/600x800" class="w-full object-contain" alt="Post Content">
