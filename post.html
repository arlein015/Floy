<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Nouveau Post</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; }
        .post-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bordure); }
        .publish-btn { color: var(--orange); background: none; border: none; font-weight: 800; font-size: 16px; cursor: pointer; }
        .upload-container { padding: 20px; display: flex; justify-content: center; }
        #preview-container { width: 100%; max-width: 400px; aspect-ratio: 1/1; background: var(--gris); border-radius: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--bordure); }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .caption-area { padding: 20px; }
        textarea { width: 100%; background: none; border: none; color: white; font-size: 16px; outline: none; height: 100px; }
        #file-input { display: none; }
    </style>
</head>
<body>
    <header class="post-header">
        <a href="index.html" style="color:white; text-decoration:none;">Annuler</a>
        <div style="font-weight:900;">Nouveau Post</div>
        <button id="btn-publier" class="publish-btn" onclick="publierPost()">Publier</button>
    </header>

    <div class="upload-container">
        <label id="preview-container" for="file-input">
            <div id="placeholder">📷 Ajouter une photo</div>
            <img id="preview-img" src="#">
        </label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="caption-area">
        <textarea id="caption" placeholder="Ta légende..."></textarea>
    </div>

    <script type="module">
        import { db, storage } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const placeholder = document.getElementById('placeholder');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                previewImg.src = URL.createObjectURL(file);
                previewImg.style.display = 'block';
                placeholder.style.display = 'none';
            }
        };

        window.publierPost = async () => {
            const file = fileInput.files[0];
            if (!file) return alert("Choisis une image !");
            
            document.getElementById('btn-publier').innerText = "Envoi...";
            
            try {
                const imgRef = ref(storage, `posts/${Date.now()}`);
                await uploadBytes(imgRef, file);
                const url = await getDownloadURL(imgRef);

                await addDoc(collection(db, "posts"), {
                    imageUrl: url,
                    caption: document.getElementById('caption').value,
                    username: "User_Floy",
                    createdAt: serverTimestamp(),
                    likes: 0
                });

                window.location.href = "index.html";
            } catch (err) {
                alert("Erreur ! Vérifie tes Rules Firebase.");
                console.error(err);
            }
        };
    </script>
</body>
</html>
