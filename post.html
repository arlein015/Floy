<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Nouveau Post</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cancel { color: white; text-decoration: none; }
        #publish-btn { background: var(--orange); border: none; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        #publish-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .upload-container { background: var(--gris); border-radius: 15px; padding: 20px; text-align: center; border: 2px dashed var(--bordure); margin-bottom: 20px; }
        #preview-img { width: 100%; border-radius: 10px; display: none; margin-bottom: 15px; }
        
        textarea { width: 100%; background: none; border: none; color: white; font-size: 16px; resize: none; outline: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="cancel">Annuler</a>
        <button id="publish-btn">Publier</button>
    </div>

    <div class="upload-container" onclick="document.getElementById('file-input').click()">
        <img id="preview-img" src="" alt="Aperçu">
        <div id="upload-text">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:10px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <p>Cliquez pour ajouter une photo</p>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display: none;">
    <textarea id="caption-box" placeholder="Écris une légende..."></textarea>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const uploadText = document.getElementById('upload-text');
        const publishBtn = document.getElementById('publish-btn');
        const captionBox = document.getElementById('caption-box');

        let selectedFile = null;

        // 1. Gérer l'aperçu de l'image
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImg.src = event.target.result;
                    previewImg.style.display = 'block';
                    uploadText.style.display = 'none';
                };
                reader.readAsDataURL(selectedFile);
            }
        };

        // 2. Publier le post
        publishBtn.onclick = async () => {
            if (!selectedFile) {
                alert("Veuillez choisir une image d'abord !");
                return;
            }

            publishBtn.innerText = "Envoi...";
            publishBtn.disabled = true;

            try {
                // A. Upload vers Cloudinary
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('upload_preset', 'floy_preset'); // Ton preset Cloudinary

                const cloudResponse = await fetch(`https://api.cloudinary.com/v1_1/ds79k3f9g/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!cloudResponse.ok) throw new Error("Échec de l'upload Cloudinary");
                
                const cloudData = await cloudResponse.json();
                const imageFinale = cloudData.secure_url;

                // B. Enregistrement dans Firebase
                await addDoc(collection(db, "posts"), {
                    imageUrl: imageFinale,
                    caption: captionBox.value.trim(),
                    username: "User_Floy", // Tu pourras changer ça plus tard avec le login
                    createdAt: serverTimestamp(),
                    likes: 0
                });

                console.log("Post publié avec succès !");
                window.location.href = "index.html"; // Retour au flux

            } catch (error) {
                console.error("Erreur :", error);
                alert("Erreur lors de la publication : " + error.message);
                
                // On débloque le bouton pour permettre de réessayer
                publishBtn.innerText = "Publier";
                publishBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
