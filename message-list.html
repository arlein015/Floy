<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Messages</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; border-bottom: 1px solid #1a1a1a; font-weight: 900; font-size: 20px; }
        
        /* Conteneur de la liste */
        .chat-container { display: flex; flex-direction: column; }

        /* Bloc de discussion cliquable */
        .chat-row { 
            display: flex; align-items: center; padding: 15px; 
            border-bottom: 1px solid #111; text-decoration: none; color: white;
            cursor: pointer;
        }
        .chat-row:active { background: #111; }

        .img-profile { width: 50px; height: 50px; border-radius: 50%; background: #222; margin-right: 15px; }
        .info { flex: 1; }
        .name { font-weight: bold; display: block; margin-bottom: 2px; }
        .msg-text { font-size: 13px; color: #777; }
    </style>
</head>
<body>

    <div class="header">MESSAGES</div>

    <div class="chat-container">
        <div class="chat-row" onclick="location.href='chat.html'">
            <img src="https://picsum.photos/100?random=1" class="img-profile">
            <div class="info">
                <span class="name">Alexandre Dupont</span>
                <span class="msg-text">On se capte pour le projet ?</span>
            </div>
        </div>

        <div class="chat-row" onclick="location.href='chat-with-admin.html'">
            <img src="https://picsum.photos/100?random=2" class="img-profile">
            <div class="info">
                <span class="name" style="color:var(--orange)">Admin Floy 🛡️</span>
                <span class="msg-text">Bienvenue sur l'application !</span>
            </div>
        </div>

        <div class="chat-row" onclick="location.href='group-chat.html'">
            <img src="https://picsum.photos/100?random=3" class="img-profile">
            <div class="info">
                <span class="name">Groupe Dev Python</span>
                <span class="msg-text">Sami: Quelqu'un a fini le module ?</span>
            </div>
        </div>
    </div>

    <script src="navbar.js"></script>
</body>
</html>
