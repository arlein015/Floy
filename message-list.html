<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        .header { padding: 15px; border-bottom: 1px solid #222; text-align: center; position: sticky; top: 0; background: #000; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; cursor: pointer; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #222; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; display: block; margin-bottom: 4px; }
        .chat-preview { color: #888; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size:18px;">Discussions</h2>
    </div>

    <div id="chats-container">
        <p style="text-align:center; color:#555; margin-top:50px;">Chargement instantané...</p>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (!user) return;

            // Requête SIMPLE (Pas besoin d'index pour array-contains seul)
            const q = query(
                collection(db, "chats"),
                where("users", "array-contains", user.uid)
            );

            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chats-container');
                let allChats = [];

                snapshot.forEach(d => {
                    allChats.push({ id: d.id, ...d.data() });
                });

                // TRI LOCAL : On trie par date nous-mêmes pour gagner en vitesse
                allChats.sort((a, b) => (b.lastUpdate?.seconds || 0) - (a.lastUpdate?.seconds || 0));

                container.innerHTML = "";
                if (allChats.length === 0) {
                    container.innerHTML = "<p style='text-align:center; color:gray; margin-top:50px;'>Aucun message pour le moment.</p>";
                    return;
                }

                allChats.forEach(async (chat) => {
                    const otherId = chat.users.find(id => id !== user.uid);
                    const item = document.createElement('div');
                    item.className = 'chat-item';
                    item.onclick = () => location.href = `chat.html?id=${chat.id}`;
                    
                    item.innerHTML = `
                        <img src="https://via.placeholder.com/100" class="user-avatar" id="img-${chat.id}">
                        <div class="chat-info">
                            <span class="chat-name" id="name-${chat.id}">Chargement...</span>
                            <div class="chat-preview">${chat.lastMessage || "Nouveau message"}</div>
                        </div>
                    `;
                    container.appendChild(item);

                    // Charger le nom et la photo en arrière-plan
                    const uSnap = await getDoc(doc(db, "users", otherId));
                    if (uSnap.exists()) {
                        document.getElementById(`name-${chat.id}`).innerText = uSnap.data().username || "Utilisateur";
                        if (uSnap.data().avatarUrl) document.getElementById(`img-${chat.id}`).src = uSnap.data().avatarUrl;
                    }
                });
            });
        });
    </script>
</body>
</html>
