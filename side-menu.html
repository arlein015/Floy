<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --bg-dark: #000; --card-dark: #121212; }
        body { background: var(--bg-dark); color: white; font-family: -apple-system, sans-serif; margin: 0; }

        /* Header du menu */
        .menu-header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #222; }
        .menu-header i { font-size: 20px; margin-right: 15px; cursor: pointer; }

        /* Liste des options */
        .menu-list { padding: 10px 0; }
        .menu-item { 
            display: flex; align-items: center; padding: 15px 20px; 
            text-decoration: none; color: white; transition: 0.2s; cursor: pointer;
        }
        .menu-item:active { background: #1a1a1a; }
        .menu-item i { width: 30px; font-size: 20px; margin-right: 15px; color: #eee; }
        .menu-item span { font-size: 16px; }

        /* Style spécial pour la déconnexion */
        .logout { color: #ed4956 !important; border-top: 1px solid #222; margin-top: 10px; }
        .logout i { color: #ed4956; }

        /* Footer */
        .menu-footer { position: fixed; bottom: 20px; width: 100%; text-align: center; color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <div class="menu-header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <b>Paramètres</b>
    </div>

    <div class="menu-list">
        <div class="menu-item" onclick="location.href='edit-profil.html'">
            <i class="fas fa-user-edit"></i>
            <span>Modifier le profil</span>
        </div>
        
        <div class="menu-item" onclick="location.href='archive.html'">
            <i class="fas fa-history"></i>
            <span>Archive</span>
        </div>

        <div class="menu-item" onclick="location.href='activity.html'">
            <i class="fas fa-heart"></i>
            <span>Votre activité</span>
        </div>

        <div class="menu-item" onclick="alert('QR Code bientôt disponible')">
            <i class="fas fa-qrcode"></i>
            <span>Code QR</span>
        </div>

        <div class="menu-item" onclick="location.href='saved.html'">
            <i class="far fa-bookmark"></i>
            <span>Enregistré</span>
        </div>

        <div class="menu-item logout" id="btn-logout">
            <i class="fas fa-sign-out-alt"></i>
            <span>Se déconnecter</span>
        </div>
    </div>

    <div class="menu-footer">
        Floy App © 2026<br>Version 1.0.4
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const btnLogout = document.getElementById('btn-logout');

        // Gestion de la déconnexion
        btnLogout.addEventListener('click', () => {
            if(confirm("Es-tu sûr de vouloir te déconnecter ?")) {
                signOut(auth).then(() => {
                    // Rediriger vers la page de connexion (vérifie le nom de ton fichier)
                    location.href = 'connexion.html'; 
                }).catch((error) => {
                    alert("Erreur lors de la déconnexion : " + error.message);
                });
            }
        });
    </script>
</body>
</html>
