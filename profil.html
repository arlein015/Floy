<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Floy | Profil Élite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .orange-text { color: #FF6B00; }
        .bg-orange { background-color: #FF6B00; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* NOUVEAU BADGE : CIRCULAIRE ÉPURÉ */
        .verified-badge {
            color: #fff;
            background-color: #0095f6;
            border-radius: 9999px; /* Cercle parfait */
            padding: 3px;
            box-shadow: 0 0 10px rgba(0, 149, 246, 0.6); /* Éclat bleu */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        
        /* Animation pour l'apparition de la nouvelle story */
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-40 bg-black/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center space-x-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            <h1 class="font-black text-xl tracking-tighter italic">floy_network</h1>
        </div>
        <div class="flex items-center space-x-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto pt-6 px-4">
        
        <header class="flex flex-col items-center md:items-start md:flex-row md:space-x-10 mb-8">
            <div class="w-24 h-24 md:w-32 md:h-32 rounded-full p-[3px] bg-gradient-to-tr from-[#FF6B00] to-[#FF3D00] mb-4 shadow-[0_0_20px_rgba(255,107,0,0.2)]">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=400" class="w-full h-full rounded-full object-cover border-4 border-black">
            </div>

            <div class="flex-1 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start space-x-2.5 mb-4">
                    <h2 class="text-2xl font-black tracking-tight">Floy</h2>
                    
                    <span class="verified-badge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                </div>

                <div class="flex justify-center md:justify-start space-x-10 mb-6 font-bold">
                    <div class="text-center"><span class="block text-xl">12.5k</span><span class="text-[10px] text-gray-500 uppercase tracking-widest">Abonnés</span></div>
                    <div class="text-center"><span class="block text-lg">480</span><span class="text-[10px] text-gray-500 uppercase tracking-widest">Suivis</span></div>
                    <div class="text-center"><span class="block text-lg">85k</span><span class="text-[10px] text-gray-500 uppercase tracking-widest">Likes</span></div>
                </div>

                <div class="flex flex-wrap justify-center md:justify-start gap-3 items-center">
                    <button id="btn-suivre" onclick="toggleSuivre()" class="bg-orange text-black font-black px-12 py-2.5 rounded-xl text-xs uppercase tracking-widest active:scale-95 transition-all">
                        Suivre
                    </button>
                    <button onclick="toggleModal(true)" class="glass px-6 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-white/10 transition">
                        Message
                    </button>
                </div>
            </div>
        </header>

        <section class="mb-8 border-t border-white/5 pt-6">
            <div id="stories-container" class="flex space-x-6 overflow-x-auto no-scrollbar pb-2 px-2">
                <div class="flex flex-col items-center space-y-2 flex-shrink-0">
                    <div class="w-16 h-16 rounded-full p-[2px] border-2 border-[#FF6B00] bg-black">
                        <img src="https://picsum.photos/200/200?random=2" class="w-full h-full rounded-full object-cover">
                    </div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Projets</span>
                </div>

                <div onclick="triggerGallery()" class="flex flex-col items-center space-y-2 flex-shrink-0 cursor-pointer">
                    <div class="w-16 h-16 rounded-full border-2 border-dashed border-gray-600 flex items-center justify-center hover:border-[#FF6B00] transition">
                        <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase">New</span>
                    <input type="file" id="gallery-input" accept="image/*" class="hidden" onchange="uploadStory(event)">
                </div>
            </div>
        </section>

        <div class="grid grid-cols-3 gap-1 md:gap-2 pb-24 mt-1 border-t border-white/10 pt-4">
            <div class="aspect-square bg-gray-900 overflow-hidden"><img src="https://picsum.photos/600/600?random=1" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-900 overflow-hidden"><img src="https://picsum.photos/600/600?random=2" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-900 overflow-hidden"><img src="https://picsum.photos/600/600?random=3" class="w-full h-full object-cover"></div>
        </div>

    </main>

    <div id="modal-msg" class="modal px-6" onclick="toggleModal(false)">
        <div class="glass w-full max-w-sm p-8 rounded-3xl" onclick="event.stopPropagation()">
            <h3 class="font-black text-xl mb-6 orange-text uppercase text-center tracking-tighter">Nouveau Message</h3>
            <textarea placeholder="Votre message..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 h-32 outline-none focus:border-[#FF6B00] mb-4 text-sm"></textarea>
            <button class="w-full bg-white text-black font-black py-4 rounded-xl uppercase text-sm" onclick="toggleModal(false)">Envoyer</button>
        </div>
    </div>

    <script>
        // 1. Bouton Suivre Actif
        function toggleSuivre() {
            const btn = document.getElementById('btn-suivre');
            const estSuivi = btn.classList.contains('bg-orange');
            if (estSuivi) {
                btn.classList.replace('bg-orange', 'glass');
                btn.classList.replace('text-black', 'text-white');
                btn.innerText = 'Suivi';
            } else {
                btn.classList.replace('glass', 'bg-orange');
                btn.classList.replace('text-white', 'text-black');
                btn.innerText = 'Suivre';
            }
        }

        // 2. Modale Message
        function toggleModal(show) { document.getElementById('modal-msg').classList.toggle('active', show); }

        // 3. Gestion de la nouvelle story via Galerie (ACTIVE)
        function triggerGallery() { document.getElementById('gallery-input').click(); }

        function uploadStory(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const container = document.getElementById('stories-container');
                    
                    // Création de la story dynamique
                    const newStory = document.createElement('div');
                    newStory.className = "flex flex-col items-center space-y-2 flex-shrink-0 fade-in";
                    newStory.innerHTML = `
                        <div class="w-16 h-16 rounded-full p-[2px] border-2 border-dashed border-[#FF6B00] bg-black">
                            <img src="${e.target.result}" class="w-full h-full rounded-full object-cover">
                        </div>
                        <span class="text-[10px] font-black text-white uppercase tracking-tighter">New</span>
                    `;
                    
                    // Insertion au début de la liste
                    container.insertBefore(newStory, container.firstChild);
                    
                    // LOGIQUE : Ici, tu appelles ton backend Python pour sauvegarder
                    console.log("Image envoyée vers le serveur...");
                };
                reader.readAsDataURL(file);
            }
        }
    </script>

</body>
</html>
