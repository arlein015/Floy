<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ user.username }} | Network Orange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Palette de couleurs personnalisée */
        :root {
            --orange-main: #FF6B00;
            --orange-hover: #E65F00;
            --black-bg: #0A0A0A;
            --black-card: #141414;
        }

        body { 
            background-color: var(--black-bg); 
            color: #FFFFFF; 
            font-family: 'Inter', sans-serif;
        }

        /* Effet de glassmorphism orange pour les éléments actifs */
        .orange-glass {
            background: rgba(255, 107, 0, 0.05);
            border: 1px solid rgba(255, 107, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .aspect-square { aspect-ratio: 1 / 1; }
        
        /* Animation subtile sur les photos */
        .post-zoom:hover img {
            transform: scale(1.05);
            transition: transform 0.4s ease;
        }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 bg-black/90 border-b border-[#FF6B00]/20 px-6 py-4 flex justify-between items-center md:hidden">
        <h1 class="text-[#FF6B00] font-black text-xl tracking-tighter">ORANGE<span class="text-white">.</span></h1>
        <div class="flex space-x-4">
            <svg class="w-6 h-6 text-[#FF6B00]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto pt-8 pb-24 px-4">
        
        <header class="flex flex-col md:flex-row items-center md:items-start space-y-6 md:space-y-0 md:space-x-16 mb-12">
            
            <div class="relative group">
                <div class="w-32 h-32 md:w-44 md:h-44 rounded-full p-[3px] bg-gradient-to-tr from-[#FF6B00] to-[#FF9E00] shadow-[0_0_20px_rgba(255,107,0,0.3)]">
                    <img src="{{ user.profile_pic or '/static/default.png' }}" 
                         class="w-full h-full rounded-full object-cover border-4 border-[#0A0A0A]">
                </div>
                <div class="absolute -bottom-2 -right-2 bg-[#FF6B00] p-1.5 rounded-full border-4 border-[#0A0A0A]">
                    <svg class="w-4 h-4 text-black" fill="currentColor" viewBox="0 0 20 20"><path d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"></path></svg>
                </div>
            </div>

            <div class="flex-1 text-center md:text-left">
                <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-6 mb-6">
                    <h2 class="text-3xl font-bold tracking-tight">{{ user.username }}</h2>
                    
                    {% if is_verified %}
                    <span class="text-[#FF6B00]">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>
                    </span>
                    {% endif %}

                    <div class="flex space-x-3">
                        <button class="bg-[#FF6B00] hover:bg-[#E65F00] text-black font-extrabold px-8 py-2 rounded-full transition transform active:scale-95">
                            SUIVRE
                        </button>
                        <button class="bg-transparent border-2 border-white/20 hover:border-[#FF6B00] px-6 py-2 rounded-full font-bold transition">
                            MESSAGE
                        </button>
                    </div>
                </div>

                <div class="flex justify-center md:justify-start space-x-10 mb-8 font-medium">
                    <div class="text-center md:text-left"><span class="text-[#FF6B00] font-black text-lg">{{ posts|length }}</span> <span class="opacity-50 text-xs block">POSTS</span></div>
                    <div class="text-center md:text-left"><span class="text-[#FF6B00] font-black text-lg">{{ stats.followers }}</span> <span class="opacity-50 text-xs block">ABONNÉS</span></div>
                    <div class="text-center md:text-left"><span class="text-[#FF6B00] font-black text-lg">{{ stats.following }}</span> <span class="opacity-50 text-xs block">SUIVIS</span></div>
                </div>

                <div class="orange-glass p-5 rounded-2xl text-left border-l-4 border-l-[#FF6B00]">
                    <p class="font-bold text-white mb-1">{{ user.full_name }}</p>
                    <p class="text-sm text-gray-400 leading-relaxed">{{ user.bio }}</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-3 gap-2 md:gap-4 mt-10">
            {% for post in posts %}
            <div class="post-zoom relative aspect-square rounded-xl overflow-hidden bg-[#141414] border border-white/5 group cursor-pointer">
                <img src="{{ post.image_url }}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                <div class="absolute inset-0 bg-[#FF6B00]/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                    <span class="bg-black/60 px-3 py-1 rounded-full text-xs font-bold text-[#FF6B00]">VOIR</span>
                </div>
            </div>
            {% endfor %}
        </div>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm orange-glass py-4 px-10 rounded-full flex justify-between items-center z-50">
        <svg class="w-6 h-6 text-[#FF6B00]" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
        <div class="w-10 h-10 bg-[#FF6B00] rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(255,107,0,0.5)]">
            <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
        </div>
        <img src="{{ user.profile_pic }}" class="w-7 h-7 rounded-full border border-[#FF6B00]">
    </nav>

</body>
</html>
