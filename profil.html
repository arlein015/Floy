<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy | Profil Élite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .orange-text { color: #FF6B00; }
        .bg-orange { background-color: #FF6B00; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Badge Officiel Exact (Sceau bleu) */
        .verified-badge {
            color: #0095f6; /* Le bleu officiel */
            display: inline-block;
            vertical-align: middle;
            filter: drop-shadow(0 0 2px rgba(0, 149, 246, 0.3));
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .nav-tab { opacity: 0.3; transition: 0.3s; padding-bottom: 12px; border-bottom: 2px solid transparent; }
        .nav-tab.active { opacity: 1; border-bottom: 2px solid #FF6B00; color: #FF6B00; }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-40 bg-black/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <h1 class="font-black text-2xl tracking-tighter">Floy<span class="orange-text">.</span></h1>
        <div class="flex items-center space-x-6">
            <button><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg></button>
            <button onclick="toggleMenu(true)"><svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M4 8h16M4 16h10"/></svg></button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto pt-6 px-4">
        
        <header class="flex flex-col items-center md:items-start md:flex-row md:space-x-10 mb-8">
            <div class="w-24 h-24 md:w-32 md:h-32 rounded-full p-[3px] bg-gradient-to-tr from-[#FF6B00] to-[#FF3D00] mb-4">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=400" class="w-full h-full rounded-full object-cover border-4 border-black">
            </div>

            <div class="flex-1 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start space-x-2 mb-4">
                    <h2 class="text-2xl font-black">Floy</h2>
                    
                    <span class="verified-badge">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.5 12.5c0-1.58-.8-3.04-2.12-3.88.24-1.58-.16-3.2-.12-4.52s-2.94-1.36-4.52-1.12c-.84-1.32-2.3-2.12-3.88-2.12s-3.04.8-3.88 2.12c-1.58-.24-3.2.16-4.52.12s-1.36 2.94-1.12 4.52c-1.32.84-2.12 2.3-2.12 3.88s.8 3.04 2.12 3.88c-.24 1.58.16 3.2.12 4.52s2.94 1.36 4.52 1.12c.84 1.32 2.3 2.12 3.88 2.12s3.04-.8 3.88-2.12c1.58.24 3.2-.16 4.52-.12s1.36-2.94 1.12-4.52c1.32-.84 2.12-2.3 2.12-3.88zm-11.8 4.6l-3.8-3.8 1.4-1.4 2.4 2.4 5.6-5.6 1.4 1.4-7 7z"></path>
                        </svg>
                    </span>
                </div>

                <div class="flex justify-center md:justify-start space-x-8 mb-6 text-sm">
                    <div class="text-center md:text-left"><span class="block font-black text-lg text-white">12.5k</span><span class="text-gray-500 font-bold uppercase text-[10px] tracking-widest">Followers</span></div>
                    <div class="text-center md:text-left"><span class="block font-black text-lg text-white">480</span><span class="text-gray-500 font-bold uppercase text-[10px] tracking-widest">Suivis</span></div>
                    <div class="text-center md:text-left"><span class="block font-black text-lg text-white">85k</span><span class="text-gray-500 font-bold uppercase text-[10px] tracking-widest">Likes</span></div>
                </div>

                <div class="mb-6">
                    <p class="text-sm font-medium text-gray-200">Entrepreneur & Développeur. Bâtir l'indépendance numérique. 🚀</p>
                    <a href="#" class="text-sm text-blue-400 font-bold hover:underline mt-1 block">www.floy-network.com</a>
                </div>

                <div class="flex flex-wrap justify-center md:justify-start gap-3 items-center">
                    <button class="bg-orange text-black font-black px-10 py-2.5 rounded-xl text-xs uppercase tracking-widest">Suivre</button>
                    <button class="glass px-6 py-2.5 rounded-xl font-bold text-xs uppercase">Message</button>
                </div>
            </div>
        </header>

        <div class="flex border-t border-white/5">
            <button class="nav-tab active flex-1 flex justify-center py-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </div>

        <div id="grid-content" class="grid grid-cols-3 gap-1 md:gap-2 pb-20 mt-2">
            <div class="aspect-square bg-gray-900 overflow-hidden">
                <img src="https://picsum.photos/600/600?random=1" class="w-full h-full object-cover">
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden">
                <img src="https://picsum.photos/600/600?random=2" class="w-full h-full object-cover">
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden">
                <img src="https://picsum.photos/600/600?random=3" class="w-full h-full object-cover">
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden">
                <img src="https://picsum.photos/600/600?random=4" class="w-full h-full object-cover">
            </div>
        </div>

    </main>

    <script>
        // Si tu utilises Jinja2 (Python/Flask) pour ta grille réelle, utilise ce format :
        /*

        grid.innerHTML = `

            <div class="aspect-square bg-gray-900 overflow-hidden">
                <img src="{{ post.image_url }}" class="w-full h-full object-cover" onerror="this.src='/static/img/default.jpg'">
            </div>
            {% endfor %}
        `;
        */
    </script>
</body>
</html>
