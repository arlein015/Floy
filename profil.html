<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOY PRO - OFFICIAL</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --border: #262626;
            --accent: #FF7A1A;
            --insta-blue: #0095f6;
            --text-main: #ffffff;
            --text-dim: #a8a8a8;
            --story-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        /* RESET & BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg); color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* LOADER FLOY - ANIMATION DE DÉPART */
        #floy-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99999;
        }
        .floy-logo {
            font-size: 45px; font-weight: 900; letter-spacing: 15px;
            background: linear-gradient(to right, var(--accent), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: floyPulse 1.2s infinite ease-in-out;
        }
        @keyframes floyPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.92); opacity: 0.7; }
        }
        .progress-box { width: 180px; height: 3px; background: #333; margin-top: 30px; border-radius: 5px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s; }

        /* HEADER SECTION */
        .profile-wrapper { max-width: 935px; margin: 0 auto; padding: 20px 15px; }
        .header-main { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }

        /* AVATAR & STORY RING */
        .avatar-container { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
        .ring-ui {
            position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            background: var(--story-gradient); border-radius: 50%; padding: 2.5px;
            display: none; /* Activé par JS */
        }
        .img-profile {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--bg); position: relative; z-index: 5;
            background: var(--card); cursor: pointer;
        }
        .add-story-icon {
            position: absolute; bottom: 2px; right: 2px; background: var(--insta-blue);
            color: white; width: 25px; height: 25px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--bg); z-index: 10; font-size: 11px; cursor: pointer;
        }

        /* INFOS & STATS */
        .user-details { flex-grow: 1; }
        .top-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .user-title { font-size: 20px; font-weight: 400; margin: 0; }
        .v-badge { color: var(--accent); font-size: 16px; }

        .stats-bar { display: flex; list-style: none; padding: 0; gap: 15px; margin-bottom: 12px; font-size: 14px; }
        .stats-bar b { color: #fff; }

        .bio-box { font-size: 14px; line-height: 1.5; }
        .link-web { color: #e0f1ff; text-decoration: none; font-weight: 600; display: block; margin-top: 4px; }

        /* BOUTONS ACTIONS - FORCE CLIQUE */
        .btn-group { display: flex; gap: 8px; margin-top: 20px; }
        .f-btn {
            flex: 1; background: var(--border); color: #fff; border: none;
            height: 36px; border-radius: 8px; font-weight: 600; font-size: 14px;
            cursor: pointer !important; position: relative; z-index: 50;
            display: flex; align-items: center; justify-content: center;
        }
        .f-btn:active { background: #333; transform: scale(0.98); }

        /* HIGHLIGHTS / COLLECTIONS */
        .collection-scroller {
            display: flex; gap: 15px; padding: 20px 0; overflow-x: auto;
            scrollbar-width: none; border-bottom: 1px solid var(--border);
        }
        .coll-item { display: flex; flex-direction: column; align-items: center; min-width: 72px; cursor: pointer; }
        .coll-circle {
            width: 62px; height: 62px; border-radius: 50%; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; color: var(--text-dim); margin-bottom: 5px;
        }

        /* GRID POSTS */
        .tabs-nav { display: flex; border-top: 1px solid var(--border); }
        .t-btn { flex: 1; padding: 15px; text-align: center; color: var(--text-dim); font-size: 20px; cursor: pointer; }
        .t-btn.active { color: #fff; border-top: 1px solid #fff; margin-top: -1px; }

        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding-bottom: 80px; }
        .post-box { aspect-ratio: 1/1; background: var(--card); position: relative; overflow: hidden; }
        .post-box img, .post-box video { width: 100%; height: 100%; object-fit: cover; }
        .v-icon { position: absolute; top: 8px; right: 8px; color: #fff; font-size: 12px; }

        /* MODALE ÉDITION */
        .edit-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; z-index: 9000;
            align-items: center; justify-content: center;
        }
        .edit-card {
            background: var(--border); width: 95%; max-width: 420px;
            border-radius: 15px; overflow: hidden; animation: animUp 0.3s;
        }
        @keyframes animUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .card-header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #363636; font-weight: 700; }
        .card-body { padding: 20px; }
        .inp-wrap { margin-bottom: 15px; }
        .inp-wrap label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .floy-input {
            width: 100%; background: #000; border: 1px solid #363636;
            padding: 12px; border-radius: 8px; color: #fff; outline: none;
        }
    </style>
</head>
<body>

    <div id="floy-loader">
        <div class="floy-logo">FLOY</div>
        <div class="progress-box"><div id="progress-fill"></div></div>
        <p id="loader-txt" style="color: #666; font-size: 11px; margin-top: 10px;">CHARGEMENT...</p>
    </div>

    <div class="profile-wrapper">
        <div class="header-main">
            <div class="avatar-container">
                <div id="ui-ring" class="ring-ui"></div>
                <img id="ui-pic" src="https://via.placeholder.com/150" class="img-profile" onclick="openGallery('profile')">
                <div class="add-story-icon" onclick="openGallery('story')">
                    <i class="fas fa-plus"></i>
                </div>
            </div>

            <div class="user-details">
                <div class="top-row">
                    <h2 id="ui-name" class="user-title">...</h2>
                    <i id="ui-verified" class="fas fa-check-circle v-badge" style="display:none;"></i>
                </div>
                <ul class="stats-bar">
                    <li><b id="ui-p-count">0</b> publications</li>
                    <li><b id="ui-f-count">0</b> abonnés</li>
                </ul>
                <div class="bio-box">
                    <p id="ui-bio-txt" style="margin:0;"></p>
                    <a id="ui-web" href="#" class="link-web" target="_blank"></a>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="f-btn" onclick="showEdit()">Modifier le profil</button>
            <button class="f-btn" onclick="copyMyUrl()">Partager</button>
        </div>

        <div class="collection-scroller" id="ui-coll-list">
            <div class="coll-item" onclick="newColl()">
                <div class="coll-circle"><i class="fas fa-plus"></i></div>
                <span style="font-size:11px;">Nouveau</span>
            </div>
        </div>

        <div class="tabs-nav">
            <div class="t-btn active"><i class="fas fa-grid-3x3"></i></div>
            <div class="t-btn"><i class="far fa-bookmark"></i></div>
            <div class="t-btn"><i class="far fa-id-badge"></i></div>
        </div>

        <div class="grid-container" id="ui-grid"></div>
        <div id="loader-scroll" style="display:none; text-align:center; padding:20px;">
            <i class="fas fa-spinner fa-spin" style="color:var(--accent)"></i>
        </div>
    </div>

    <div id="ui-modal" class="edit-overlay">
        <div class="edit-card">
            <div class="card-header">
                <span onclick="hideEdit()" style="color:var(--text-dim); cursor:pointer; font-weight:400;">Annuler</span>
                <span>Modifier le profil</span>
                <span onclick="saveFinal()" style="color:var(--insta-blue); cursor:pointer;">Terminé</span>
            </div>
            <div class="card-body">
                <div style="text-align:center; margin-bottom:20px;">
                    <img id="m-preview" src="" style="width:70px; height:70px; border-radius:50%; object-fit:cover;">
                    <p style="color:var(--insta-blue); font-size:13px; margin-top:8px; cursor:pointer;" onclick="openGallery('profile')">Changer la photo</p>
                </div>
                <div class="inp-wrap"><label>Nom d'utilisateur</label><input id="m-user" class="floy-input" type="text"></div>
                <div class="inp-wrap"><label>Bio</label><textarea id="m-bio" class="floy-input" rows="3"></textarea></div>
                <div class="inp-wrap"><label>Lien Web</label><input id="m-link" class="floy-input" type="text"></div>
            </div>
        </div>
    </div>

    <input type="file" id="hid-p" accept="image/*" style="display:none;">
    <input type="file" id="hid-s" accept="image/*" style="display:none;">

    <script type="module">
        import { db, auth, storage } from './firebase-config.js';
        import { doc, onSnapshot, updateDoc, collection, query, where, orderBy, limit, getDocs, startAfter } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        let lastDoc = null;
        let busy = false;

        // FORCE CLIQUE : On attache tout à window
        window.showEdit = () => { document.getElementById('ui-modal').style.display = 'flex'; };
        window.hideEdit = () => { document.getElementById('ui-modal').style.display = 'none'; };
        
        window.openGallery = (type) => {
            if(type === 'profile') document.getElementById('hid-p').click();
            else document.getElementById('hid-s').click();
        };

        const showFloy = (txt) => {
            document.getElementById('loader-txt').innerText = txt.toUpperCase();
            document.getElementById('floy-loader').style.display = 'flex';
        };
        const hideFloy = () => { document.getElementById('floy-loader').style.display = 'none'; };

        // GESTION UPLOAD PHOTO PROFIL
        document.getElementById('hid-p').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            showFloy("Téléchargement...");
            const user = auth.currentUser;
            const sRef = ref(storage, `avatars/${user.uid}`);
            const task = uploadBytesResumable(sRef, file);

            task.on('state_changed', 
                (s) => { let p = (s.bytesTransferred / s.totalBytes) * 100; document.getElementById('progress-fill').style.width = p + '%'; },
                (err) => { alert("Erreur"); hideFloy(); },
                async () => {
                    const url = await getDownloadURL(task.snapshot.ref);
                    await updateDoc(doc(db, "users", user.uid), { avatarUrl: url });
                    hideFloy();
                    hideEdit();
                }
            );
        };

        // GESTION STORY (ACTIVE LE CERCLE)
        document.getElementById('hid-s').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            showFloy("Story en cours...");
            setTimeout(async () => {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { hasStory: true });
                hideFloy();
            }, 2000);
        };

        // SYNCHRO TEMPS RÉEL
        auth.onAuthStateChanged(user => {
            if(user) {
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if(!snap.exists()) return;
                    const d = snap.data();
                    
                    document.getElementById('ui-name').innerText = d.username || "Utilisateur";
                    document.getElementById('ui-bio-txt').innerText = d.bio || "";
                    document.getElementById('ui-web').innerText = d.webLink || "";
                    document.getElementById('ui-web').href = d.webLink || "#";
                    document.getElementById('ui-pic').src = d.avatarUrl || "https://via.placeholder.com/150";
                    document.getElementById('ui-verified').style.display = d.isVerified ? 'inline' : 'none';
                    document.getElementById('ui-ring').style.display = d.hasStory ? 'block' : 'none';
                    document.getElementById('ui-p-count').innerText = d.postsCount || 0;
                    document.getElementById('ui-f-count').innerText = d.followersCount || 0;

                    // Modale
                    document.getElementById('m-preview').src = d.avatarUrl || "https://via.placeholder.com/150";
                    document.getElementById('m-user').value = d.username || "";
                    document.getElementById('m-bio').value = d.bio || "";
                    document.getElementById('m-link').value = d.webLink || "";
                });
                loadPosts(user.uid);
            }
        });

        // SAUVEGARDE BIO ET LIENS
        window.saveFinal = async () => {
            showFloy("Enregistrement...");
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                username: document.getElementById('m-user').value,
                bio: document.getElementById('m-bio').value,
                webLink: document.getElementById('m-link').value
            });
            hideEdit();
            hideFloy();
        };

        // GRILLE INFINIE
        async function loadPosts(uid) {
            if(busy) return;
            busy = true;
            const grid = document.getElementById('ui-grid');
            let q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("createdAt", "desc"), limit(12));
            if(lastDoc) q = query(collection(db, "posts"), where("userId", "==", uid), orderBy("createdAt", "desc"), startAfter(lastDoc), limit(12));

            const snap = await getDocs(q);
            if(!snap.empty) {
                lastDoc = snap.docs[snap.docs.length - 1];
                snap.forEach(d => {
                    const p = d.data();
                    const div = document.createElement('div');
                    div.className = 'post-box';
                    if(p.type === 'video') div.innerHTML = `<video src="${p.url}"></video><i class="fas fa-play v-icon"></i>`;
                    else div.innerHTML = `<img src="${p.url}" loading="lazy">`;
                    grid.appendChild(div);
                });
            }
            busy = false;
        }

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 400) {
                if(auth.currentUser) loadPosts(auth.currentUser.uid);
            }
        };

        window.copyMyUrl = () => { navigator.clipboard.writeText(window.location.href); alert("Lien copié !"); };
        
        window.newColl = () => {
            const n = prompt("Nom de la collection :");
            if(n) {
                const item = document.createElement('div');
                item.className = 'coll-item';
                item.innerHTML = `<div class="coll-circle" style="border-color:#fff;"><img src="https://via.placeholder.com/150" style="width:100%;height:100%;border-radius:50%;"></div><span style="font-size:11px;">${n}</span>`;
                document.getElementById('ui-coll-list').appendChild(item);
            }
        };
    </script>
</body>
</html>
