<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | Floy</title>
    <link rel="stylesheet" href="profil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: #000; margin: 0; color: white;">

    <div id="main-loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; z-index:9999;">
        <div style="width:40px; height:40px; border:4px solid #FF7A1A; border-top:4px solid transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <div class="profile-container">
        <div id="header-module"></div>

        <div id="tabs-module"></div>

        <div id="grid-module"></div>
    </div>

    <nav style="position:fixed; bottom:0; width:100%; background:#000; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid #262626;">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search"></i>
        <div style="background:#FF7A1A; width:35px; height:35px; border-radius:10px; display:flex; justify-content:center; align-items:center;">
            <i class="fas fa-plus" style="color:white;"></i>
        </div>
        <i class="fas fa-comment"></i>
        <i class="fas fa-user" style="color:#FF7A1A;"></i>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Chargement forcé des modules
        async function loadComponent(id, file) {
            const r = await fetch(file + '?v=' + Date.now()); // Date.now évite le cache
            const html = await r.text();
            document.getElementById(id).innerHTML = html;
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }

            const urlParams = new URLSearchParams(window.location.search);
            const profileId = urlParams.get('id') || user.uid;

            await loadComponent('header-module', 'profile_header.html');
            await loadComponent('grid-module', 'profile_grid.html');

            // Initialisation des fonctions globales après chargement
            window.profileId = profileId;
            setupProfileActions(profileId, user.uid);
            
            document.getElementById('main-loader').style.display = 'none';
        });

        // Logique Suivre + Compteur + Partage
        function setupProfileActions(pId, myId) {
            // 1. Bouton Suivre
            window.handleFollowClick = async () => {
                const btn = document.getElementById('follow-btn');
                const countEl = document.getElementById('s-followers');
                let count = parseInt(countEl.innerText);

                if (btn.innerText === "Suivre") {
                    btn.innerText = "Abonné";
                    btn.style.background = "#262626"; // Gris
                    countEl.innerText = count + 1;
                    // Logique Firebase ici (updateDoc...)
                } else {
                    btn.innerText = "Suivre";
                    btn.style.background = "#FF7A1A"; // Orange
                    countEl.innerText = Math.max(0, count - 1);
                }
            };

            // 2. Copier le lien
            window.copyProfileLink = () => {
                navigator.clipboard.writeText(window.location.href);
                alert("Lien du profil copié !");
            };
        }
    </script>
</body>
</html>
