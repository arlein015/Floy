<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Floy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --gray: #1a1a1a; }
        body { background: #000; color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Header & Top Bar */
        .profile-header { padding: 20px 15px; border-bottom: 1px solid #121212; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .username-container { display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 19px; }
        
        /* Stats */
        .user-stats-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; background: #222; object-fit: cover; border: 1px solid #333; }
        .stats-container { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .stat-val { font-weight: bold; font-size: 17px; display: block; }
        .stat-label { font-size: 12px; color: #888; }

        /* Bio & Buttons */
        .profile-bio { padding: 15px; font-size: 14px; }
        .bio-text { margin: 5px 0 15px 0; color: #efefef; line-height: 1.4; }
        
        .action-buttons { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 9px; border-radius: 8px; font-weight: bold; font-size: 14px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-edit { background: var(--gray); color: white; border: 1px solid #333; }
        .btn-follow { background: var(--orange); color: white; }
        .btn-msg { background: var(--gray); color: white; border: 1px solid #333; }
        .btn:active { opacity: 0.7; }

        /* Grid */
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
        .grid-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #050505; }

        /* Nav Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #121212; display: flex; justify-content: space-around; align-items: center; font-size: 22px; z-index: 100; }
        .active-icon { color: var(--orange); }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="top-bar">
            <div class="username-container">
                <span id="header-username">Chargement...</span>
                <i id="verified-badge" class="fas fa-check-circle" style="color: #0095f6; display: none;"></i>
            </div>
            <i class="fas fa-bars" onclick="location.href='side-menu.html'" style="cursor:pointer;"></i>
        </div>

        <div class="user-stats-row">
            <img id="profile-img" class="profile-pic" src="https://via.placeholder.com/150">
            <div class="stats-container">
                <div><span class="stat-val" id="posts-count">0</span><span class="stat-label">Posts</span></div>
                <div><span class="stat-val">0</span><span class="stat-label">Abonnés</span></div>
                <div><span class="stat-val">0</span><span class="stat-label">Suivis</span></div>
            </div>
        </div>
        
        <div class="profile-bio">
            <b id="full-name">Utilisateur Floy</b>
            <p id="user-bio-text" class="bio-text">Chargement de la bio...</p>
            
            <div class="action-buttons">
                <button class="btn btn-edit" onclick="location.href='edit-profil.html'">Modifier</button>
                <button class="btn btn-follow">Suivre</button>
                <button class="btn btn-msg">Message</button>
            </div>
        </div>
    </div>

    <div class="posts-grid" id="grid-container">
        </div>

    <nav class="bottom-nav">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-search"></i>
        <i class="far fa-plus-square" onclick="location.href='create.html'"></i>
        <i class="fas fa-video"></i>
        <i class="fas fa-user-circle active-icon"></i>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, getDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // 1. Récupérer les infos de l'utilisateur dans Firestore
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);

                    if (userSnap.exists()) {
                        const data = userSnap.data();
                        
                        // Affichage du nom et bio
                        document.getElementById('header-username').innerText = data.username || user.displayName || "Profil";
                        document.getElementById('full-name').innerText = data.username || user.displayName || "Utilisateur Floy";
                        document.getElementById('user-bio-text').innerText = data.bio || "Pas encore de bio.";
                        
                        // Photo de profil
                        if (data.avatarUrl) {
                            document.getElementById('profile-img').src = data.avatarUrl;
                        }

                        // BADGE DE CERTIFICATION (si true dans Firebase)
                        if (data.isVerified === true) {
                            document.getElementById('verified-badge').style.display = "inline-block";
                        }
                    }

                    // 2. Charger les posts de l'utilisateur par son ID (userId)
                    // C'est plus sûr que de chercher par le nom !
                    const postsQuery = query(
                        collection(db, "posts"), 
                        where("userId", "==", user.uid), 
                        orderBy("createdAt", "desc")
                    );

                    const snapshot = await getDocs(postsQuery);
                    const grid = document.getElementById('grid-container');
                    grid.innerHTML = "";
                    document.getElementById('posts-count').innerText = snapshot.size;

                    if (snapshot.empty) {
                        grid.innerHTML = `<p style="grid-column: span 3; text-align:center; color:#555; padding: 40px 0;">Aucune photo pour le moment.</p>`;
                    }

                    snapshot.forEach((doc) => {
                        const post = doc.data();
                        grid.innerHTML += `<img src="${post.imageUrl}" class="grid-item">`;
                    });

                } catch (error) {
                    console.error("Erreur de chargement :", error);
                }
            } else {
                location.href = 'connexion.html';
            }
        });
    </script>
</body>
</html>
