<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Profil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #222; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* NAV */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--bordure); }
        .badge-Arlein { width: 18px; height: 18px; margin-left: 5px; vertical-align: middle; }

        /* PROFILE */
        .profile-container { padding: 20px; }
        .avatar-row { display: flex; align-items: center; gap: 20px; }
        #p-avatar { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--orange); object-fit: cover; }
        .stats-row { display: flex; flex-grow: 1; justify-content: space-around; text-align: center; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr 45px; gap: 8px; margin-top: 20px; }
        .btn { background: var(--gris); border: 1px solid var(--bordure); color: white; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-follow { background: var(--orange); border: none; }
        .btn-follow.active { background: #333; }

        /* SIDE MENU */
        #side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: #0a0a0a; z-index: 3000; transition: 0.3s; padding: 25px; border-left: 1px solid #222; box-sizing: border-box; }
        #side-menu.open { right: 0; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2500; }

        /* MODAL */
        #modal-edit { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--noir); z-index: 4000; padding: 20px; box-sizing: border-box; }
        .modal-head { display: flex; justify-content: space-between; padding-bottom: 20px; }
        input, textarea { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; margin-top: 10px; box-sizing: border-box; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--bordure); }
        .bottom-nav svg { width: 26px; height: 26px; fill: #666; }
        .active svg { fill: white !important; }
    </style>
</head>
<body>

    <div id="overlay" onclick="window.toggleMenu()"></div>

    <div id="side-menu">
        <h3 style="color:var(--orange)">Options</h3>
        <p onclick="window.logout()" style="color:red; cursor:pointer; margin-top:30px;"><i class="fas fa-sign-out-alt"></i> Déconnexion</p>
    </div>

    <div class="header">
        <b style="font-size:18px" id="top-user">Chargement...</b>
        <div style="display:flex; gap:20px; font-size:18px">
            <i class="fas fa-share-nodes" onclick="window.copyLink()"></i>
            <i class="fas fa-bars" onclick="window.toggleMenu()"></i>
        </div>
    </div>

    <div class="profile-container">
        <div class="avatar-row">
            <img id="p-avatar" src="https://via.placeholder.com/150">
            <div class="stats-row">
                <div><b>0</b><br><small>Posts</small></div>
                <div><b>0</b><br><small>Abonnés</small></div>
            </div>
        </div>
        
        <div style="margin-top:15px">
            <b id="p-name" style="font-size:16px">Nom Complet</b>
            <span id="p-badge-container"></span>
            <p id="p-bio" style="color:#aaa; font-size:14px; margin-top:5px">en ligne récemment</p>
        </div>

        <div class="action-btns">
            <button class="btn btn-follow" id="btn-follow" onclick="window.handleFollow()">Suivre</button>
            <button class="btn" onclick="location.href='messages.html'">Message</button>
            <button class="btn" onclick="window.openEdit()"><i class="fas fa-user-edit"></i></button>
        </div>
    </div>

    <div id="modal-edit">
        <div class="modal-head">
            <span onclick="window.closeEdit()">Annuler</span>
            <b>Modifier</b>
            <span onclick="window.saveChanges()" style="color:var(--orange); font-weight:bold">OK</span>
        </div>
        <input type="text" id="in-name" placeholder="Nom">
        <textarea id="in-bio" placeholder="Bio"></textarea>
    </div>

    <nav class="bottom-nav">
        <div onclick="location.href='index.html'"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div onclick="location.href='explore.html'"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
        <div style="fill:var(--orange)"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
        <div onclick="location.href='messages.html'"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.54.36 2.98 1 4.28L2.01 22l5.72-1c1.3.64 2.74 1 4.27 1 5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></div>
        <div class="active"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let uid = null;
        const badgeSVG = `<svg class="badge-Arlein" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="black" stroke="#FF7A1A" stroke-width="0.5"/><path d="M10 15.5l-3-3 1.4-1.4 1.6 1.6 4-4 1.4 1.4z" fill="#FF7A1A"/></svg>`;

        onAuthStateChanged(auth, async (user) => {
            if (user) { uid = user.uid; load(); } else { location.href='login.html'; }
        });

        async function load() {
            const snap = await getDoc(doc(db, "users", uid));
            if(snap.exists()) {
                const d = snap.data();
                document.getElementById('top-user').innerText = "@" + d.username;
                document.getElementById('p-name').innerText = d.username;
                document.getElementById('p-badge-container').innerHTML = d.isVerified ? badgeSVG : "";
                document.getElementById('p-avatar').src = d.avatarUrl || "https://via.placeholder.com/150";
                document.getElementById('in-name').value = d.username;
            }
        }

        window.toggleMenu = () => {
            const m = document.getElementById('side-menu');
            m.classList.toggle('open');
            document.getElementById('overlay').style.display = m.classList.contains('open') ? 'block' : 'none';
        };
        window.openEdit = () => document.getElementById('modal-edit').style.display = "block";
        window.closeEdit = () => document.getElementById('modal-edit').style.display = "none";
        window.copyLink = () => { navigator.clipboard.writeText(window.location.href); alert("Lien copié !"); };
        window.handleFollow = () => {
            const b = document.getElementById('btn-follow');
            b.classList.toggle('active');
            b.innerText = b.classList.contains('active') ? "Suivi" : "Suivre";
        };
        window.logout = () => signOut(auth);
        window.saveChanges = async () => {
            await updateDoc(doc(db, "users", uid), {
                username: document.getElementById('in-name').value,
                bio: document.getElementById('in-bio').value
            });
            location.reload();
        };
    </script>
</body>
</html>
