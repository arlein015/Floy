<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy | Network Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .orange-glow {
            box-shadow: 0 0 20px rgba(255, 107, 0, 0.2);
        }
        .glass-nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 107, 0, 0.1);
        }
        .btn-orange {
            background-color: #FF6B00;
            color: #000;
            transition: all 0.3s ease;
        }
        .btn-orange:hover {
            background-color: #ff8533;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 glass-nav px-6 py-4 flex justify-between items-center">
        <h1 class="text-[#FF6B00] font-black text-2xl tracking-tighter">Floy<span class="text-white">.</span></h1>
        <div class="flex space-x-6">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto pt-10 pb-24 px-4">
        
        <header class="flex flex-col md:flex-row items-center md:items-start space-y-6 md:space-y-0 md:space-x-12 mb-12">
            
            <div class="relative">
                <div class="w-32 h-32 md:w-44 md:h-44 rounded-full p-[3px] bg-gradient-to-tr from-[#FF6B00] to-[#ffaa00] orange-glow">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=400" 
                         class="w-full h-full rounded-full object-cover border-4 border-black">
                </div>
            </div>

            <div class="flex-1 text-center md:text-left">
                <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-6 mb-6">
                    <h2 class="text-3xl font-bold tracking-tight">Floy</h2>
                    
                    <span class="text-[#FF6B00]">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>
                    </span>

                    <div class="flex space-x-3">
                        <button class="btn-orange px-10 py-2 rounded-full font-black text-sm tracking-widest uppercase">Suivre</button>
                        <button class="bg-white/10 hover:bg-white/20 border border-white/10 px-6 py-2 rounded-full font-bold transition text-sm">Message</button>
                    </div>
                </div>

                <div class="flex justify-center md:justify-start space-x-12 mb-8">
                    <div class="text-center"><span class="text-white font-bold text-xl block">24</span><span class="text-gray-500 text-[10px] uppercase font-black">Posts</span></div>
                    <div class="text-center"><span class="text-white font-bold text-xl block">15.4K</span><span class="text-gray-500 text-[10px] uppercase font-black">Abonnés</span></div>
                    <div class="text-center"><span class="text-white font-bold text-xl block">482</span><span class="text-gray-500 text-[10px] uppercase font-black">Suivis</span></div>
                </div>

                <div class="bg-white/5 p-4 rounded-xl border-l-4 border-[#FF6B00]">
                    <p class="font-bold text-white">@Floy_Entrepreneur</p>
                    <p class="text-sm text-gray-400 mt-1">Bâtir le réseau de demain. Focus sur l'indépendance et la tech. 🚀</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-3 gap-1 md:gap-4">
            <div class="aspect-square bg-gray-900 overflow-hidden rounded-sm md:rounded-lg group relative cursor-pointer">
                <img src="https://picsum.photos/500/500?random=1" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                    <span class="text-[#FF6B00] font-bold">Voir</span>
                </div>
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden rounded-sm md:rounded-lg group relative cursor-pointer">
                <img src="https://picsum.photos/500/500?random=2" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                    <span class="text-[#FF6B00] font-bold">Voir</span>
                </div>
            </div>
            <div class="aspect-square bg-gray-900 overflow-hidden rounded-sm md:rounded-lg group relative cursor-pointer">
                <img src="https://picsum.photos/500/500?random=3" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                    <span class="text-[#FF6B00] font-bold">Voir</span>
                </div>
            </div>
        </div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-white/5 px-8 py-4 flex justify-between items-center md:hidden">
        <svg class="w-7 h-7 text-[#FF6B00]" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
        <svg class="w-7 h-7 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"/></svg>
        <div class="w-8 h-8 rounded-full border-2 border-[#FF6B00] overflow-hidden">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=400" class="w-full h-full object-cover">
        </div>
    </div>

</body>
</html>
