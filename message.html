<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Messages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #ff8c00 0%, #3a01cc 100%) !important;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif; color: white;
            display: flex; flex-direction: column; height: 100vh;
        }

        .chat-header {
            padding: 15px 20px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px); display: flex; align-items: center; gap: 15px;
        }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* Message Reçu (Noir translucide) */
        .msg-received {
            align-self: flex-start; max-width: 75%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
            padding: 12px 18px; border-radius: 20px 20px 20px 5px;
            border: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px;
        }

        /* Message Envoyé (Orange vibrant) */
        .msg-sent {
            align-self: flex-end; max-width: 75%;
            background: #ff8c00; padding: 12px 18px;
            border-radius: 20px 20px 5px 20px; font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .chat-input-area {
            padding: 20px; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px); display: flex; gap: 10px;
        }

        .chat-input-area input {
            flex: 1; background: rgba(255, 255, 255, 0.1); border: none;
            padding: 12px 20px; border-radius: 25px; color: white; outline: none;
        }

        .btn-send {
            background: #ff8c00; border: none; width: 45px; height: 45px;
            border-radius: 50%; color: white; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="window.history.back()"></i>
        <img src="logo.png" style="width: 40px; height: 40px; border-radius: 50%;">
        <div>
            <div style="font-weight: 700; font-size: 15px;">Support Floy <i class="fas fa-check-circle" style="color: #00e5ff; font-size: 12px;"></i></div>
            <div style="font-size: 10px; opacity: 0.6;">En ligne</div>
        </div>
    </div>

    <div class="chat-container">
        <div class="msg-received">Bienvenue sur Floy ! Comment puis-je vous aider aujourd'hui ?</div>
        <div class="msg-sent">Bonjour, j'adore le nouveau thème sombre et orange !</div>
        <div class="msg-received">Merci ! C'est le mélange "Noir & Dégradé" pour plus d'élégance. 😊</div>
    </div>

    <div class="chat-input-area">
        <input type="text" placeholder="Écrire un message...">
        <button class="btn-send"><i class="fas fa-paper-plane"></i></button>
    </div>
</body>
</html>
