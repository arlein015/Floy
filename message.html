<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: #1a0033; /* Violet Profond de image_014a9f.png */
            font-family: sans-serif;
            color: white;
        }
        .header {
            padding: 50px 20px 15px;
            background: #000;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .chat-list { padding: 20px; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #000; display: flex; justify-content: space-around; align-items: center;
        }
        .plus-btn { background: linear-gradient(to right, #00e5ff, #a456f0); padding: 5px 15px; border-radius: 10px; color: black; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.location.href='feed.html'"></i>
        <b>Floy Messenger</b>
    </div>

    <div class="chat-list">
        <div class="chat-item" onclick="window.location.href='chat.html'">
            <div style="width:50px; height:50px; background:#444; border-radius:50%"></div>
            <div>
                <div style="font-weight:bold">@bouta <i class="fas fa-check-circle" style="color:#00e5ff"></i></div>
                <div style="font-size:12px; opacity:0.6">Test de connexion...</div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <i class="fas fa-home" onclick="window.location.href='feed.html'"></i>
        <i class="fas fa-compass"></i>
        <div class="plus-btn"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment-alt" style="opacity:1"></i>
        <i class="fas fa-user" onclick="window.location.href='profile.html'"></i>
    </nav>
</body>
</html>
