<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Messages Privés</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --floy-bg: linear-gradient(135deg, #ff8c00 0%, #3a01cc 100%);
            --floy-cyan: #00e5ff;
            --dark-glass: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0; background: var(--floy-bg); background-attachment: fixed;
            font-family: 'Poppins', sans-serif; color: white; min-height: 100vh;
            padding-bottom: 90px;
        }

        .header {
            padding: 20px; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px); display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 100;
        }

        /* SECTION STORYS */
        .stories-container {
            display: flex; gap: 15px; padding: 20px; overflow-x: auto;
            background: rgba(0, 0, 0, 0.2); scrollbar-width: none;
        }
        .stories-container::-webkit-scrollbar { display: none; }

        .story-item { text-align: center; min-width: 70px; }
        .story-ring {
            width: 65px; height: 65px; border-radius: 50%;
            padding: 3px; background: linear-gradient(45deg, #ff8c00, #00e5ff);
            margin-bottom: 5px;
        }
        .story-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 2px solid black; background: #222;
        }
        .story-name { font-size: 11px; opacity: 0.8; }

        /* SECTION DISCUSSIONS PRIVÉES */
        .private-tag {
            padding: 10px 20px; font-size: 12px; color: var(--floy-cyan);
            font-weight: 600; display: flex; align-items: center; gap: 8px;
        }

        .chat-list { padding: 0 15px; }

        .chat-item {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            background: var(--dark-glass); border-radius: 22px; margin-bottom: 12px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        .user-avatar { width: 55px; height: 55px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        .chat-info { flex: 1; }
        .user-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 5px; }
        .last-msg { font-size: 13px; opacity: 0.5; margin-top: 2px; }
        
        .badge-cyan { color: var(--floy-cyan); font-size: 12px; }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around; align-items: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; font-size: 20px;">Messages</h2>
        <i class="fas fa-lock" style="color: var(--floy-cyan); font-size: 14px; opacity: 0.7;"> Chiffrement de bout en bout</i>
    </div>

    <div class="stories-container">
        <div class="story-item">
            <div class="story-ring" style="background: #555;"><img src="logo.png" class="story-img"></div>
            <div class="story-name">Votre story</div>
        </div>
        <div class="story-item">
            <div class="story-ring"><img src="logo.png" class="story-img"></div>
            <div class="story-name">Bouta</div>
        </div>
        <div class="story-item">
            <div class="story-ring"><img src="logo.png" class="story-img"></div>
            <div class="story-name">Jean_Dev</div>
        </div>
        <div class="story-item">
            <div class="story-ring"><img src="logo.png" class="story-img"></div>
            <div class="story-name">Floy_Club</div>
        </div>
    </div>

    <div class="private-tag">
        <i class="fas fa-shield-alt"></i> Discussions Privées
    </div>

    <div class="chat-list">
        <div class="chat-item" onclick="window.location.href='chat.html'">
            <img src="logo.png" class="user-avatar">
            <div class="chat-info">
                <div class="user-name">Support Floy <i class="fas fa-check-circle badge-cyan"></i></div>
                <div class="last-msg">Ceci est une conversation privée.</div>
            </div>
            <div style="font-size: 11px; opacity: 0.4;">18:05</div>
        </div>

        <div class="chat-item" onclick="window.location.href='chat.html'">
            <img src="logo.png" class="user-avatar">
            <div class="chat-info">
                <div class="user-name">Bouta</div>
                <div class="last-msg">Salut ! J'ai vu ta nouvelle vidéo.</div>
            </div>
            <div style="width: 10px; height: 10px; background: #ff8c00; border-radius: 50%;"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <i class="fas fa-home" style="opacity: 0.4;" onclick="window.location.href='feed.html'"></i>
        <i class="fas fa-search" style="opacity: 0.4;"></i>
        <i class="fas fa-plus-square" style="font-size: 24px; opacity: 0.4;"></i>
        <i class="fas fa-comment-dots" style="color: white; font-size: 24px;"></i>
        <i class="fas fa-user" style="opacity: 0.4;" onclick="window.location.href='profile.html'"></i>
    </nav>

</body>
</html>
