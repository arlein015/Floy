<style>
    .edit-modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none; align-items: center; justify-content: center;
        z-index: 3000; transition: opacity 0.3s;
    }

    .edit-modal-box {
        background: #262626; width: 95%; max-width: 420px;
        border-radius: 15px; padding: 0; overflow: hidden;
        color: white; font-family: sans-serif;
    }

    .edit-modal-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 15px 20px; border-bottom: 1px solid #363636;
    }

    .edit-modal-header h3 { margin: 0; font-size: 16px; font-weight: 600; }
    .btn-close { cursor: pointer; font-size: 24px; color: #efefef; }

    .edit-modal-body { padding: 20px; }

    .avatar-section { text-align: center; margin-bottom: 25px; }
    #preview-img { 
        width: 85px; height: 85px; border-radius: 50%; 
        object-fit: cover; margin-bottom: 10px; border: 1px solid #363636;
    }
    
    .label-input { display: block; font-size: 12px; color: #a8a8a8; margin-bottom: 5px; margin-top: 15px; }
    
    .edit-field {
        width: 100%; background: #121212; border: 1px solid #363636;
        border-radius: 8px; padding: 12px; color: white;
        font-size: 14px; box-sizing: border-box;
    }

    .edit-field:focus { border-color: #555; outline: none; }

    .edit-modal-footer { padding: 15px 20px; }
    
    .btn-save-profile {
        width: 100%; background: #0095f6; color: white; border: none;
        padding: 12px; border-radius: 8px; font-weight: 600;
        cursor: pointer; transition: background 0.2s;
    }

    .btn-save-profile:active { background: #1877f2; opacity: 0.8; }
</style>

<div id="edit-profile-modal" class="edit-modal-overlay">
    <div class="edit-modal-box">
        <div class="edit-modal-header">
            <span></span> <h3>Modifier le profil</h3>
            <span class="btn-close" onclick="closeEditModal()">&times;</span>
        </div>

        <div class="edit-modal-body">
            <div class="avatar-section">
                <img id="preview-img" src="https://via.placeholder.com/150">
                <input type="text" id="inp-avatar" class="edit-field" placeholder="URL de l'image (https://...)">
            </div>

            <label class="label-input">Nom complet</label>
            <input type="text" id="inp-fullname" class="edit-field" placeholder="Ton nom">

            <label class="label-input">Bio</label>
            <textarea id="inp-bio" class="edit-field" rows="3" placeholder="Parle-nous de toi..."></textarea>
        </div>

        <div class="edit-modal-footer">
            <button class="btn-save-profile" onclick="saveProfileData()">Terminé</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // OUVRE LA MODALE
    window.openEditModal = async () => {
        const user = auth.currentUser;
        if (!user) return;

        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('inp-fullname').value = data.fullName || "";
            document.getElementById('inp-bio').value = data.bio || "";
            document.getElementById('inp-avatar').value = data.avatarUrl || "";
            document.getElementById('preview-img').src = data.avatarUrl || "https://via.placeholder.com/150";
        }
        document.getElementById('edit-profile-modal').style.display = 'flex';
    };

    // FERME LA MODALE
    window.closeEditModal = () => {
        document.getElementById('edit-profile-modal').style.display = 'none';
    };

    // SAUVEGARDE LES DONNÉES
    window.saveProfileData = async () => {
        const user = auth.currentUser;
        const newName = document.getElementById('inp-fullname').value;
        const newBio = document.getElementById('inp-bio').value;
        const newAvatar = document.getElementById('inp-avatar').value;

        try {
            await updateDoc(doc(db, "users", user.uid), {
                fullName: newName,
                bio: newBio,
                avatarUrl: newAvatar
            });
            closeEditModal();
        } catch (error) {
            console.error("Erreur mise à jour:", error);
            alert("Impossible de mettre à jour le profil.");
        }
    };

    // Prévisualisation en direct de l'image
    document.getElementById('inp-avatar').addEventListener('input', (e) => {
        if(e.target.value.startsWith('http')) {
            document.getElementById('preview-img').src = e.target.value;
        }
    });
</script>
