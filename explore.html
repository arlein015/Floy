<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Explorer</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }

        /* BARRE DE RECHERCHE */
        .search-container {
            padding: 15px;
            position: sticky;
            top: 0;
            background: black;
            z-index: 100;
        }
        .search-bar-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-input {
            width: 100%;
            background: #262626;
            border: none;
            padding: 12px 15px 12px 40px;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .search-input:focus { border: 1px solid var(--orange); }
        .search-icon { position: absolute; left: 12px; stroke: #888; }

        /* RÉSULTATS DE RECHERCHE */
        #search-results {
            padding: 0 15px;
            background: black;
        }
        .user-result {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            text-decoration: none;
            color: white;
            border-bottom: 1px solid #111;
        }
        .user-result img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .user-info { flex-grow: 1; }
        .user-name { font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .user-handle { color: #888; font-size: 13px; }
        
        .badge-verify { width: 14px; height: 14px; fill: var(--orange); display: none; }
        .is-verified .badge-verify { display: inline-block; }

        /* GRILLE D'EXPLORATION (SUGGESTIONS) */
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            margin-top: 10px;
        }
        .explore-item { aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .explore-item img { width: 100%; height: 100%; object-fit: cover; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-link { color: white; opacity: 0.6; text-decoration: none; }
        .nav-link.active { opacity: 1; color: var(--orange); }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-bar-wrapper">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="search-input" class="search-input" placeholder="Rechercher un utilisateur...">
        </div>
    </div>

    <div id="search-results"></div>

    <div class="explore-grid" id="explore-grid">
        </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="explore.html" class="nav-link active"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a>
        <a href="post.html" class="nav-link"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"></svg></a>
        <a href="messages.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></a>
        <a href="profil.html" class="nav-link"><img id="mini-avatar" style="width:26px; height:26px; border-radius:50%;" src="https://via.placeholder.com/30"></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, onSnapshot, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const searchInput = document.getElementById('search-input');
        const resultsDiv = document.getElementById('search-results');

        // 1. RECHERCHE D'UTILISATEURS
        searchInput.oninput = async () => {
            const val = searchInput.value.trim();
            if(val.length < 1) {
                resultsDiv.innerHTML = "";
                return;
            }

            // Recherche dans la collection "users"
            const q = query(collection(db, "users"), where("username", ">=", val), where("username", "<=", val + '\uf8ff'));
            const querySnapshot = await getDocs(q);
            
            resultsDiv.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const userLink = document.createElement('a');
                userLink.className = `user-result ${data.isVerified ? 'is-verified' : ''}`;
                userLink.href = `user-profile.html?id=${doc.id}`; // On créera cette page plus tard
                
                userLink.innerHTML = `
                    <img src="${data.avatarUrl || 'https://via.placeholder.com/50'}">
                    <div class="user-info">
                        <div class="user-name">
                            ${data.name || data.username}
                            <svg class="badge-verify" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7L6.4 13l1.5-1.5 2.2 2.2 4.8-4.8 1.5 1.5-6.3 6.3z"/></svg>
                        </div>
                        <div class="user-handle">@${data.username}</div>
                    </div>
                `;
                resultsDiv.appendChild(userLink);
            });
        };

        // 2. GRILLE DE PHOTOS SUGGÉRÉES
        onSnapshot(query(collection(db, "posts"), limit(18)), (snaps) => {
            const grid = document.getElementById('explore-grid');
            grid.innerHTML = "";
            snaps.forEach(d => {
                const item = document.createElement('div');
                item.className = 'explore-item';
                item.innerHTML = `<img src="${d.data().imageUrl}">`;
                grid.appendChild(item);
            });
        });

        // 3. MINI AVATAR NAV
        onSnapshot(doc(db, "users", "User_Floy_Account"), (s) => {
            if(s.exists() && s.data().avatarUrl) document.getElementById('mini-avatar').src = s.data().avatarUrl;
        });
    </script>
</body>
</html>
