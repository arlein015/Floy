<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Boutique Jetons - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        
        .wallet-container { padding: 40px 20px 30px; background: linear-gradient(180deg, #1a1a1a 0%, var(--noir) 100%); border-bottom: 1px solid var(--bordure); text-align: center; }
        .wallet-balance { font-size: 36px; font-weight: 800; color: var(--orange); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .token-icon { width: 30px; height: 30px; background: var(--orange); border-radius: 50%; display: inline-block; }

        .section-title { padding: 25px 20px 15px; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        .token-card { background: var(--gris); margin: 0 20px 15px; padding: 20px; border-radius: 20px; border: 1px solid var(--bordure); display: flex; align-items: center; justify-content: space-between; }
        .token-info { display: flex; align-items: center; gap: 15px; }
        .token-img { font-size: 24px; }
        
        .token-text h3 { margin: 0; font-size: 16px; }
        .token-text p { margin: 5px 0 0; font-size: 12px; color: #aaa; }
        .price-btn { background: var(--orange); color: white; border: none; padding: 10px 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { fill: #666; }
        .nav-item.active { fill: var(--orange); }
    </style>
</head>
<body>

    <div class="wallet-container">
        <div class="wallet-label" style="color:#888; font-size:12px; margin-bottom:10px;">MON SOLDE</div>
        <div class="wallet-balance">
            <div class="token-icon"></div>
            <span>550</span>
        </div>
        <p style="font-size:12px; color:#666; margin-top:10px;">Utilisez vos jetons pour booster vos posts</p>
    </div>

    <div class="section-title">Acheter des Jetons</div>

    <div class="token-card">
        <div class="token-info">
            <div class="token-img">🪙</div>
            <div class="token-text">
                <h3>Petit Pack</h3>
                <p>100 Jetons Floy</p>
            </div>
        </div>
        <button class="price-btn" onclick="window.location.href='./recharge.html'">0.99$</button>
    </div>

    <div class="token-card">
        <div class="token-info">
            <div class="token-img">💰</div>
            <div class="token-text">
                <h3>Pack Moyen</h3>
                <p>500 Jetons Floy</p>
            </div>
        </div>
        <button class="price-btn" onclick="window.location.href='./recharge.html'">4.49$</button>
    </div>

    <div class="token-card">
        <div class="token-info">
            <div class="token-img">💎</div>
            <div class="token-text">
                <h3>Pack Élite</h3>
                <p>1200 Jetons Floy</p>
            </div>
        </div>
        <button class="price-btn" onclick="window.location.href='./recharge.html'">9.99$</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='./index.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item active"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 5h4v2h-4V5zm10 15H4V9h16v11z"/></svg></div>
        <div class="nav-item" onclick="window.location.href='./profil.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>
</body>
</html>
