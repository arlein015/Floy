<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Boutique Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* SOLDE JETONS */
        .balance-card { padding: 40px 20px; background: linear-gradient(180deg, #1a1a1a 0%, var(--noir) 100%); border-bottom: 1px solid var(--bordure); text-align: center; }
        .balance-amount { font-size: 42px; font-weight: 900; color: var(--orange); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .token-symbol { font-size: 24px; background: var(--orange); color: white; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }

        .section-title { padding: 25px 20px 10px; font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; }

        /* PACKS DE JETONS */
        .pack-grid { padding: 0 20px; }
        .pack-item { background: var(--gris); border: 1px solid var(--bordure); padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .pack-info h3 { margin: 0; font-size: 18px; }
        .pack-info p { margin: 5px 0 0; font-size: 12px; color: #888; }
        .price-tag { background: var(--orange); border: none; color: white; padding: 10px 18px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* SERVICES (Certification) */
        .service-card { background: rgba(255, 122, 26, 0.05); border: 1px solid rgba(255, 122, 26, 0.2); margin: 0 20px; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }

        /* NAV BAS */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { fill: #666; cursor: pointer; }
        .nav-item.active { fill: var(--orange); }
    </style>
</head>
<body>

    <div class="balance-card">
        <span style="color:#888; font-size:12px;">VOTRE SOLDE</span>
        <div class="balance-amount">
            <div class="token-symbol">F</div>
            <span>550</span>
        </div>
    </div>

    <div class="section-title">Acheter des Jetons</div>
    <div class="pack-grid">
        <div class="pack-item">
            <div class="pack-info"><h3>100 Jetons</h3><p>Idéal pour 2 Boosts</p></div>
            <button class="price-tag" onclick="window.location.href='./recharge.html?amt=0.99'">0.99$</button>
        </div>
        <div class="pack-item">
            <div class="pack-info"><h3>500 Jetons</h3><p>Pack Populaire</p></div>
            <button class="price-tag" onclick="window.location.href='./recharge.html?amt=4.49'">4.49$</button>
        </div>
        <div class="pack-item">
            <div class="pack-info"><h3>1200 Jetons</h3><p>Meilleure valeur</p></div>
            <button class="price-tag" onclick="window.location.href='./recharge.html?amt=9.99'">9.99$</button>
        </div>
    </div>

    <div class="section-title">Services Spéciaux</div>
    <div class="service-card">
        <div>
            <h3 style="margin:0; font-size:16px;">Badge de Certification</h3>
            <p style="margin:5px 0 0; font-size:12px; color:#888;">Badge VIP + Liens illimités</p>
        </div>
        <button style="background:white; color:black; border:none; padding:10px 15px; border-radius:12px; font-weight:bold; cursor:pointer;" onclick="buyCertif()">1000 F</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='./index.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item active"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 5h4v2h-4V5zm10 15H4V9h16v11z"/></svg></div>
        <div class="nav-item" onclick="window.location.href='./profil.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>

    <script>
        function buyCertif() {
            if(confirm("Voulez-vous acheter la certification pour 1000 jetons ?")) {
                alert("Demande envoyée ! Le badge apparaîtra après validation.");
            }
        }
    </script>
</body>
</html>
