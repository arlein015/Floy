<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Paramètres</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --floy-orange: #ff8c00; --bg-black: #000; }
        body { margin: 0; background: var(--bg-black); color: white; font-family: 'Poppins', sans-serif; }
        
        .header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 0.5px solid #222; }
        
        .settings-list { padding: 10px; }
        .setting-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px; margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.03); /* Effet brillant */
            backdrop-filter: blur(10px);
            border-radius: 15px;
            cursor: pointer;
        }
        .setting-item i { color: var(--floy-orange); font-size: 18px; width: 30px; }
        .setting-item span { flex: 1; font-size: 14px; }
        .setting-item .arrow { color: #444; font-size: 12px; }

        .logout { color: #ff4444 !important; margin-top: 20px; border: 1px solid rgba(255,68,68,0.2); }
    </style>
</head>
<body>
    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.history.back()"></i>
        <h3 style="margin:0;">Paramètres</h3>
    </div>

    <div class="settings-list">
        <div class="setting-item" onclick="window.location.href='edit-video.html'">
            <i class="fas fa-user-edit"></i>
            <span>Compte</span>
            <i class="fas fa-chevron-right arrow"></i>
        </div>
        <div class="setting-item">
            <i class="fas fa-lock"></i>
            <span>Confidentialité</span>
            <i class="fas fa-chevron-right arrow"></i>
        </div>
        <div class="setting-item">
            <i class="fas fa-bell"></i>
            <span>Notifications</span>
            <i class="fas fa-chevron-right arrow"></i>
        </div>
        <div class="setting-item">
            <i class="fas fa-wallet"></i>
            <span>Portefeuille</span>
            <i class="fas fa-chevron-right arrow"></i>
        </div>
        <div class="setting-item logout" onclick="window.location.href='index.html'">
            <i class="fas fa-sign-out-alt"></i>
            <span>Déconnexion</span>
        </div>
    </div>
</body>
</html>
