<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Flux</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        header { height: 60px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #262626; position: sticky; top: 0; background: black; }
        #feed { max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .post { margin-bottom: 20px; border-bottom: 1px solid #262626; }
        .post img { width: 100%; display: block; }
        .post-info { padding: 15px; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; align-items: center; }
        .plus-btn { background: #FF7A1A; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 30px; }
    </style>
</head>
<body>
    <header><b>FLOY</b></header>
    <div id="feed">Chargement...</div>

    <nav class="nav">
        <a href="index.html" style="color:white; text-decoration:none;">🏠</a>
        <a href="post.html" class="plus-btn">+</a>
        <a href="#" style="color:white; text-decoration:none;">👤</a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const feed = document.getElementById('feed');
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            feed.innerHTML = "";
            if (snapshot.empty) feed.innerHTML = "Aucun post pour le moment.";
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <div style="padding:10px;"><b>${data.username}</b></div>
                        <img src="${data.imageUrl}">
                        <div class="post-info">${data.caption || ""}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
