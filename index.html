<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Home</title>
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: sans-serif; margin: 0; }
        .feed-item { border-bottom: 1px solid #111; padding-bottom: 15px; margin-bottom: 15px; }
        .post-img { width: 100%; aspect-ratio: 1/1; background: #111; object-fit: cover; }
        .post-info { padding: 12px; }
        .user-name { font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div style="padding: 15px; font-weight: 900; color: var(--orange-floy); font-size: 20px;">FLOY</div>
    
    <div id="feed">
        <div class="feed-item">
            <div class="post-info"><span class="user-name">alex_dev</span> • Super projet !</div>
            <img src="https://picsum.photos/500?random=11" class="post-img">
        </div>
        <div class="feed-item">
            <div class="post-info"><span class="user-name">lisa_floy</span> • Enfin en ligne 🚀</div>
            <img src="https://picsum.photos/500?random=12" class="post-img">
        </div>
    </div>

    <script src="navbar.js"></script>
</body>
</html>
