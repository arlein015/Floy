<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Inscription</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="auth-card">
            
            <div class="brand-header">
                <div class="t-icon">T</div>
                <h1 class="brand-text">THRENDLY</h1>
            </div>

            <p class="auth-subtitle">Inscrivez-vous pour commencer</p>
            
            <form id="signupForm">
                <div class="input-row">
                    <input type="text" placeholder="Nom" required>
                    <input type="text" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="E-mail ou numéro" required>
                </div>
                
                <div class="input-group">
                    <input type="password" placeholder="Mot de passe" required>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Confirmer mot de passe" required>
                </div>
                
                <button type="submit" class="btn-register">S'inscrire</button>
            </form>

            <div class="or-divider">
                <span>OU</span>
            </div>

            <div class="social-auth">
                <button class="btn-google">
                    <img src="https://authjs.dev/img/providers/google.svg" alt="Google Logo">
                    Continuer avec Google
                </button>
                <button class="btn-facebook">
                    <i class="fab fa-facebook-f"></i> Continuer avec Facebook
                </button>
            </div>
            
            <div class="auth-footer">
                <a href="#" class="forgot-link">Mot de passe oublié ?</a>
                <p>Déjà un compte ? <a href="#" class="login-link">Se connecter</a></p>
            </div>
        </div>
    </div>
</body>
</html>
