<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            
            <h1 class="main-title">TRENDLY</h1>

            <div class="welcome-text">
                <h2>Content de vous revoir</h2>
                <p>Connectez-vous à votre compte</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="text" placeholder="vous@entreprise.com" required>
                </div>
                
                <div class="input-group">
                    <label>Mot de passe</label>
                    <input type="password" placeholder="Entrez votre mot de passe" required>
                </div>
                
                <button type="submit" class="btn-login">Se connecter</button>
            </form>

            <div class="separator"><span>ou</span></div>

            <div class="social-login">
                <button class="btn-google">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google">
                    Continuer avec Google
                </button>
                
                <button class="btn-facebook">
                    <i class="fab fa-facebook-f"></i>
                    Continuer avec Facebook
                </button>
            </div>
            
            <div class="footer-links">
                <a href="#" class="forgot-pwd">Mot de passe oublié ?</a>
                <p>Vous n'avez pas de compte ? <a href="#" class="signup-link">S'inscrire</a></p>
            </div>
        </div>
    </div>
</body>
</html>
