<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Security-Policy" content="img-src 'self' data: https:;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Threndly - Welcome</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        body { 
            margin: 0; background: #000; height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, sans-serif; color: white;
        }
        .loader {
            width: 50px; height: 50px; border: 3px solid #111;
            border-top: 3px solid #2D9CDB; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>

    <script>
        // Intelligence : Redirection automatique
        window.onload = function() {
            if(localStorage.getItem('threndly_id')) {
                window.location.href = "chat.html";
            } else {
                window.location.href = "signup.html";
            }
        };
    </script>

    <script src="script.js"></script>
</body>
</html>
