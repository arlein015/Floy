<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <title>Floy | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .orange-text { color: #FF6B00; }
        .bg-orange { background-color: #FF6B00; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Animation du cercle de story lors de l'ajout */
        .story-ring { padding: 2px; background: linear-gradient(45deg, #FF6B00, #FF3D00, #f62d14); border-radius: 9999px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 bg-black/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <h1 class="font-black text-2xl italic tracking-tighter">Floy<span class="orange-text">.</span></h1>
        <div class="flex items-center space-x-5">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            <div class="relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                <span class="absolute -top-1 -right-1 bg-orange text-black text-[10px] font-black px-1 rounded-full">3</span>
            </div>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto">
        
        <section class="py-6 border-b border-white/5 overflow-hidden">
            <div id="home-stories" class="flex space-x-5 overflow-x-auto no-scrollbar px-6 items-center">
                
                <div onclick="document.getElementById('home-gallery').click()" class="flex flex-col items-center space-y-2 flex-shrink-0 cursor-pointer">
                    <div class="relative w-16 h-16">
                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100" class="w-full h-full rounded-full border-2 border-gray-800 object-cover">
                        <div class="absolute bottom-0 right-0 bg-orange rounded-full p-1 border-2 border-black">
                            <svg class="w-3 h-3 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="4" d="M12 5v14M5 12h14"/></svg>
                        </div>
                    </div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Ma Story</span>
                    <input type="file" id="home-gallery" accept="image/*" class="hidden" onchange="uploadStory(event)">
                </div>

                <div class="flex flex-col items-center space-y-2 flex-shrink-0">
                    <div class="story-ring w-16 h-16">
                        <div class="w-full h-full rounded-full border-2 border-black overflow-hidden">
                            <img src="https://picsum.photos/200/200?random=50" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <span class="text-[10px] font-bold text-gray-400">zoeyiso</span>
                </div>

                <div class="flex flex-col items-center space-y-2 flex-shrink-0">
                    <div class="story-ring w-16 h-16">
                        <div class="w-full h-full rounded-full border-2 border-black overflow-hidden">
                            <img src="https://picsum.photos/200/200?random=51" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <span class="text-[10px] font-bold text-gray-400">dev_king</span>
                </div>
            </div>
        </section>

        <section class="pb-24">
            <div class="p-4 border-b border-white/5">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full bg-orange"></div>
                        <span class="font-bold text-sm">Floy_official</span>
                    </div>
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </div>
                <div class="aspect-video bg-gray-900 rounded-2xl overflow-hidden mb-4">
                    <img src="https://picsum.photos/800/450?random=99" class="w-full h-full object-cover">
                </div>
                <div class="flex space-x-4 mb-2">
                    <svg class="w-6 h-6 orange-text" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863-9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                </div>
                <p class="text-xs text-gray-400 font-bold uppercase">85,230 Likes</p>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 inset-x-0 bg-black/95 backdrop-blur-xl border-t border-white/5 px-8 py-5 flex justify-between items-center z-50">
        <svg class="w-7 h-7 orange-text" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="w-7 h-7 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <div class="w-8 h-8 rounded-full border border-white/20 overflow-hidden" onclick="window.location.href='profile.html'">
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100" class="w-full h-full object-cover">
        </div>
    </nav>

    <script>
        // FONCTION D'UPLOAD ET AFFICHAGE IMMÉDIAT
        function uploadStory(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const container = document.getElementById('home-stories');
                    
                    // Création de la nouvelle story HTML
                    const newStory = document.createElement('div');
                    newStory.className = "flex flex-col items-center space-y-2 flex-shrink-0 fade-in";
                    newStory.innerHTML = `
                        <div class="story-ring w-16 h-16">
                            <div class="w-full h-full rounded-full border-2 border-black overflow-hidden">
                                <img src="${e.target.result}" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <span class="text-[10px] font-black text-white uppercase tracking-tighter">Maintenant</span>
                    `;
                    
                    // Insérer après le bouton "Ma Story"
                    container.insertBefore(newStory, container.children[1]);

                    // LOGIQUE : Ici, tu appelles ton module story.js pour sauvegarder en DB
                    console.log("Envoi du fichier vers le serveur via AJAX...");
                    // fetch('/api/upload_story', { method: 'POST', body: formData });
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
