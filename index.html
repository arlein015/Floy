<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - FLOY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="login-card">
        <div class="logo-area">
            <img src="logo.png" alt="FLOY Logo" class="app-logo">
            <h1 class="brand-name">F<span class="gradient-text">LOY</span></h1>
        </div>

        <h2>Content de vous revoir</h2>
        <p class="subtitle">Connectez-vous à votre compte FLOY</p>
        
        <form>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" placeholder="votre@email.com" required>
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <div class="separator"><span>ou</span></div>

        <div class="social-login">
            <button class="btn-google">Continuer avec Google</button>
            <button class="btn-fb">Continuer avec Facebook</button>
        </div>

        <div class="card-footer">
            <p>Nouveau sur FLOY ? <a href="signup.html">S'inscrire</a></p>
        </div>
    </div>
</body>
</html>
