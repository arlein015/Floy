<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Home</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; --texte-gris: #a8a8a8; }
        body { background: var(--noir); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* HEADER AVEC RECHERCHE */
        header { padding: 10px 15px; border-bottom: 1px solid var(--bordure); background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--orange); font-weight: 900; font-size: 22px; letter-spacing: 1px; }
        .search-btn { color: white; background: none; border: none; cursor: pointer; }

        /* POSTS */
        .feed { max-width: 500px; margin: 0 auto; }
        .post { border-bottom: 1px solid var(--bordure); margin-bottom: 5px; background: black; }
        .post-header { padding: 12px; display: flex; align-items: center; font-weight: 600; font-size: 14px; }
        .avatar { width: 32px; height: 32px; background: linear-gradient(45deg, #444, var(--orange)); border-radius: 50%; margin-right: 10px; }
        .post-img { width: 100%; display: block; }

        /* INTERACTIONS */
        .post-actions { padding: 12px 12px 8px 12px; display: flex; gap: 18px; }
        .action-btn { background: none; border: none; color: white; cursor: pointer; padding: 0; display: flex; align-items: center; }
        .action-btn:hover { color: var(--orange); }
        
        .post-info { padding: 0 12px 15px 12px; }
        .likes-count { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; }
        .username { font-weight: bold; margin-right: 6px; }
        .caption { font-size: 14px; color: #efefef; line-height: 1.4; }

        /* NAV BAR MODERNE */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-link { color: white; text-decoration: none; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
        .nav-link.active { color: var(--orange); }

    </style>
</head>
<body>

    <header>
        <div class="logo">FLOY</div>
        <button class="search-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
    </header>

    <div class="feed" id="post-container">
        </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link active">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </a>
        <a href="explore.html" class="nav-link">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </a>
        <a href="post.html" class="nav-link">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"></svg>
        </a>
        <a href="messages.html" class="nav-link">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </a>
        <a href="profil.html" class="nav-link">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const postContainer = document.getElementById('post-container');

        // On écoute la collection "posts"
        const q = query(collection(db, "posts"));

        onSnapshot(q, (snapshot) => {
            postContainer.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const postHTML = `
                    <div class="post">
                        <div class="post-header">
                            <div class="avatar"></div>
                            <span>${data.username || "Utilisateur"}</span>
                        </div>
                        <img class="post-img" src="${data.imageUrl}" alt="Floy Post">
                        
                        <div class="post-actions">
                            <button class="action-btn">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            </button>
                            <button class="action-btn">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                            </button>
                            <button class="action-btn">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </div>

                        <div class="post-info">
                            <span class="likes-count">${data.likes || 0} J'aime</span>
                            <span class="username">${data.username || "Utilisateur"}</span>
                            <span class="caption">${data.caption || ""}</span>
                        </div>
                    </div>
                `;
                postContainer.innerHTML += postHTML;
            });
        });
    </script>
</body>
</html>
