<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Flux Collage Élite</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }

        /* HEADER */
        header { padding: 15px; border-bottom: 1px solid var(--bordure); position: sticky; top: 0; background: black; z-index: 100; text-align: center; font-weight: bold; color: var(--orange); font-size: 22px; }

        /* DESIGN POST FLOY */
        .post { border-bottom: 1px solid var(--bordure); margin-bottom: 15px; }
        .post-header { padding: 10px 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .post-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--orange); }
        .u-name { font-weight: bold; color: white; }

        /* --- LE COLLAGE (GRID) --- */
        .collage-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* Grille de base 6 colonnes */
            grid-template-rows: repeat(2, 150px); /* 2 lignes de 150px */
            gap: 2px;
            width: 100%;
            cursor: pointer;
        }

        .collage-item { background: #111; position: relative; overflow: hidden; }
        .collage-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .collage-item:hover img { transform: scale(1.03); }

        /* Configuration spécifique pour 5 images */
        /* Image 1 : Grande à gauche (prend 2 lignes, 4 colonnes) */
        .collage-item:nth-child(1) { grid-column: span 4; grid-row: span 2; }
        /* Image 2, 3, 4, 5 : Petites à droite (prennent 2 colonnes chacune) */
        .collage-item:nth-child(2), .collage-item:nth-child(3), 
        .collage-item:nth-child(4), .collage-item:nth-child(5) { grid-column: span 2; }

        /* LE BADGE +X (Plus de photos) */
        .more-photos-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.7);
            color: white; font-size: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s;
        }
        .collage-item:last-child .more-photos-overlay { opacity: 1; } /* Toujours visible sur la dernière */

        /* ACTIONS */
        .post-actions { padding: 12px 15px; display: flex; align-items: center; gap: 20px; }
        .action-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: white; opacity: 0.6; text-decoration: none; }
        .nav-link.active { opacity: 1; color: var(--orange); }
        .nav-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <header>FLOY</header>
    <div id="feed"></div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link active"><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="explore.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a>
        <a href="post.html" class="nav-link"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"></svg></a>
        <a href="profil.html" class="nav-link"><img id="my-nav-pic" class="nav-avatar" src="https://via.placeholder.com/30"></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy, limit, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const MY_ID = "User_Floy_Account";
        const feed = document.getElementById('feed');

        // Charger les posts
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"), limit(20)); 
        onSnapshot(q, (snaps) => {
            feed.innerHTML = "";
            snaps.forEach(pDoc => {
                const p = pDoc.data();
                const postId = pDoc.id;
                
                // On récupère le tableau d'images (sécurité si vide)
                const imagesArr = p.images || []; 
                if(imagesArr.length === 0) return; // Ignore les posts sans image

                const postDiv = document.createElement('div');
                postDiv.className = 'post';

                // --- CONSTRUCTION DU COLLAGE ---
                let collageHTML = `<div class="collage-grid" onclick="window.location.href='album.html?id=${postId}'">`;
                
                // On prend maximum les 5 premières images pour le collage
                const imagesToShow = imagesArr.slice(0, 5);
                
                imagesToShow.forEach((imgUrl, index) => {
                    collageHTML += `<div class="collage-item"><img src="${imgUrl}">`;
                    
                    // Si c'est la 5ème image ET qu'il en reste d'autres
                    if (index === 4 && imagesArr.length > 5) {
                        const remaining = imagesArr.length - 5;
                        collageHTML += `<div class="more-photos-overlay">+${remaining}</div>`;
                    }
                    
                    collageHTML += `</div>`;
                });
                
                collageHTML += `</div>`; // Fin de la grille


                // --- STRUCTURE DU POST ---
                postDiv.innerHTML = `
                    <div class="post-header" onclick="window.location.href='profil.html?id=${p.userId}'">
                        <img src="${p.userPhoto || 'https://via.placeholder.com/50'}" class="post-avatar">
                        <div class="u-name">${p.name || p.username}</div>
                    </div>
                    
                    ${collageHTML} <div class="post-actions">
                        <button class="action-btn">❤️ ${p.likesCount || 0}</button>
                        <button class="action-btn">💬</button>
                    </div>
                `;
                feed.appendChild(postDiv);
            });
        });

        // Photo nav bar
        onSnapshot(doc(db, "users", MY_ID), s => { if(s.exists()) document.getElementById('my-nav-pic').src = s.data().avatarUrl; });
    </script>
</body>
</html>
