<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Fil d'actualité</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        header { padding: 15px; border-bottom: 1px solid var(--bordure); position: sticky; top: 0; background: black; z-index: 100; text-align: center; font-weight: bold; color: var(--orange); font-size: 22px; }
        
        .post { border-bottom: 1px solid var(--bordure); margin-bottom: 10px; }
        .post-header { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .post-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--orange); }
        .post-img { width: 100%; display: block; background: #111; }
        
        .post-actions { padding: 12px; display: flex; align-items: center; gap: 15px; }
        .like-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 5px; color: white; }
        .like-btn.active svg { fill: var(--orange); stroke: var(--orange); }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-link { color: white; opacity: 0.6; text-decoration: none; }
        .nav-link.active { opacity: 1; color: var(--orange); }
        .nav-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <header>FLOY</header>
    <div id="feed"></div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link active"><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="explore.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></a>
        <a href="post.html" class="nav-link"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"></svg></a>
        <a href="profil.html" class="nav-link"><img id="my-nav-pic" class="nav-avatar" src="https://via.placeholder.com/30"></a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy, doc, setDoc, deleteDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const MY_ID = "User_Floy_Account";
        const feed = document.getElementById('feed');

        // Charger les posts
        onSnapshot(query(collection(db, "posts"), orderBy("timestamp", "desc")), (snaps) => {
            feed.innerHTML = "";
            snaps.forEach(postDoc => {
                const p = postDoc.data();
                const postId = postDoc.id;
                const postDiv = document.createElement('div');
                postDiv.className = 'post';
                postDiv.innerHTML = `
                    <div class="post-header" onclick="window.location.href='profil.html?id=${p.userId || MY_ID}'">
                        <img src="${p.userPhoto || 'https://via.placeholder.com/50'}" class="post-avatar">
                        <span style="font-weight:bold">${p.username}</span>
                    </div>
                    <img src="${p.imageUrl}" class="post-img">
                    <div class="post-actions">
                        <button class="like-btn" id="btn-${postId}">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            <span id="count-${postId}">${p.likesCount || 0}</span>
                        </button>
                    </div>
                `;
                feed.appendChild(postDiv);

                // Gérer le clic sur Like
                const lBtn = document.getElementById(`btn-${postId}`);
                lBtn.onclick = async () => {
                    const likeRef = doc(db, "likes", `${MY_ID}_${postId}`);
                    const snap = await getDoc(likeRef);
                    if(snap.exists()){
                        await deleteDoc(likeRef);
                        await updateDoc(doc(db, "posts", postId), { likesCount: increment(-1) });
                    } else {
                        await setDoc(likeRef, { userId: MY_ID });
                        await updateDoc(doc(db, "posts", postId), { likesCount: increment(1) });
                    }
                };
            });
        });

        // Photo nav bar
        onSnapshot(doc(db, "users", MY_ID), s => { if(s.exists()) document.getElementById('my-nav-pic').src = s.data().avatarUrl; });
    </script>
</body>
</html>
