<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <meta http-equiv="Content-Security-Policy" content="img-src 'self' data: https:; script-src 'self' 'unsafe-inline';">
    <title>Floy - Feed</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        
        .app-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bordure); position: sticky; top: 0; background: var(--noir); z-index: 100; }
        .logo-text { color: var(--orange); font-weight: 900; font-size: 24px; letter-spacing: 1px; }

        .post { border-bottom: 1px solid var(--bordure); padding-bottom: 15px; position: relative; }
        .post-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .post-avatar { width: 35px; height: 35px; border-radius: 50%; background: #333; border: 1px solid var(--orange); }
        
        .three-dots { cursor: pointer; fill: #888; }

        .post-media { width: 100%; aspect-ratio: 1/1; background: #1a1a1a; object-fit: cover; }

        .post-actions { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .action-left { display: flex; gap: 18px; fill: white; }
        .action-icon { cursor: pointer; transition: 0.2s; }
        .action-icon:active { transform: scale(0.8); }

        .btn-boost-link { 
            background: rgba(255, 122, 26, 0.15); border: 1px solid var(--orange); color: var(--orange); 
            padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 11px; text-decoration: none;
            display: flex; align-items: center; gap: 5px;
        }

        /* MENU OPTIONS (3 POINTS) */
        .options-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: flex-end; }
        .options-content { background: var(--gris); width: 100%; border-radius: 25px 25px 0 0; padding: 20px 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .option-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; font-size: 16px; cursor: pointer; border-bottom: 1px solid var(--bordure); }
        .option-item:last-child { border: none; color: #ff4444; }

        /* NAV BAS */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { fill: #666; }
        .nav-item.active { fill: var(--orange); }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo-text">FLOY</div>
    </header>

    <div class="feed-container">
        <div class="post">
            <div class="post-header">
                <div class="user-info">
                    <div class="post-avatar"></div>
                    <span style="font-weight:bold; font-size:14px;">Arlein_Dev</span>
                </div>
                <div class="three-dots" onclick="openOptions()">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                </div>
            </div>

            <img src="https://picsum.photos/600/600" class="post-media">

            <div class="post-actions">
                <div class="action-left">
                    <svg class="action-icon" width="26" height="26" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg class="action-icon" width="26" height="26" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <svg class="action-icon" width="26" height="26" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                </div>
                <a href="./boost.html" class="btn-boost-link">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    BOOST
                </a>
            </div>
        </div>
    </div>

    <div id="optionsModal" class="options-modal" onclick="closeOptions()">
        <div class="options-content" onclick="event.stopPropagation()">
            <div class="option-item" onclick="copyLink()">🔗 Copier le lien</div>
            <div class="option-item" onclick="saveImage()">💾 Enregistrer l'image</div>
            <div class="option-item" onclick="closeOptions()">❌ Annuler</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.location.href='./index.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item" onclick="window.location.href='./shop.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 5h4v2h-4V5zm10 15H4V9h16v11z"/></svg></div>
        <div class="nav-item" onclick="window.location.href='./profil.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>

    <script>
        function openOptions() { document.getElementById('optionsModal').style.display = 'flex'; }
        function closeOptions() { document.getElementById('optionsModal').style.display = 'none'; }
        
        function copyLink() {
            alert("Lien copié dans le presse-papier !");
            closeOptions();
        }
        function saveImage() {
            alert("Image enregistrée dans votre galerie !");
            closeOptions();
        }
    </script>
</body>
</html>
