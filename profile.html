<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* HEADER */
        header { padding: 15px; border-bottom: 1px solid var(--bordure); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: black; z-index: 100; }
        .username-top { font-weight: bold; font-size: 18px; }

        /* INFOS PROFIL */
        .profile-info { padding: 20px 15px; }
        .profile-header { display: flex; align-items: center; margin-bottom: 15px; }
        .profile-avatar { width: 85px; height: 85px; background: linear-gradient(45deg, #222, var(--orange)); border-radius: 50%; padding: 3px; }
        .avatar-inner { width: 100%; height: 100%; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .profile-stats { flex-grow: 1; display: flex; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: bold; font-size: 18px; display: block; }
        .stat-label { font-size: 12px; color: #a8a8a8; }

        .profile-bio { padding: 5px; font-size: 14px; line-height: 1.5; }
        .edit-btn { width: 100%; background: #363636; border: none; color: white; padding: 8px; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }

        /* GRILLE DE PHOTOS */
        .grid-tabs { display: flex; border-top: 1px solid var(--bordure); margin-top: 20px; }
        .tab { flex: 1; text-align: center; padding: 12px; color: #a8a8a8; border-bottom: 1px solid transparent; cursor: pointer; }
        .tab.active { color: white; border-bottom: 1px solid white; }

        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .grid-item { aspect-ratio: 1/1; background: #111; position: relative; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* NAV BAR MODERNE */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: black; border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { color: white; opacity: 0.5; text-decoration: none; }
        .nav-link.active { opacity: 1; color: var(--orange); }
    </style>
</head>
<body>

    <header>
        <div style="width: 24px;"></div>
        <div class="username-top">User_Floy</div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
    </header>

    <div class="profile-info">
        <div class="profile-header">
            <div class="profile-avatar">
                <div class="avatar-inner">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="#333"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
            </div>
            <div class="profile-stats">
                <div><span class="stat-num" id="post-count">0</span><span class="stat-label">Posts</span></div>
                <div><span class="stat-num">0</span><span class="stat-label">Abonnés</span></div>
                <div><span class="stat-num">0</span><span class="stat-label">Abonnements</span></div>
            </div>
        </div>
        <div class="profile-bio">
            <div style="font-weight: bold;">Développeur Floy 🚀</div>
            <div style="color: #a8a8a8;">Passionné par le code et le design.</div>
        </div>
        <button class="edit-btn">Modifier le profil</button>
    </div>

    <div class="grid-tabs">
        <div class="tab active">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        </div>
        <div class="tab">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
    </div>

    <div class="photo-grid" id="profile-grid">
        </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </a>
        <a href="explore.html" class="nav-link">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </a>
        <a href="post.html" class="nav-link">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"></svg>
        </a>
        <a href="messages.html" class="nav-link">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </a>
        <a href="profil.html" class="nav-link active">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const profileGrid = document.getElementById('profile-grid');
        const postCount = document.getElementById('post-count');

        // On cherche seulement les posts de "User_Floy"
        const q = query(collection(db, "posts"), where("username", "==", "User_Floy"));

        onSnapshot(q, (snapshot) => {
            profileGrid.innerHTML = "";
            postCount.innerText = snapshot.size;

            if (snapshot.empty) {
                profileGrid.innerHTML = `<div style="grid-column: span 3; text-align: center; padding: 60px; color: #555; font-size: 14px;">Aucune photo pour le moment.</div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.imageUrl) {
                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    item.innerHTML = `<img src="${data.imageUrl}" alt="Post">`;
                    profileGrid.appendChild(item);
                }
            });
        }, (error) => {
            console.error("Erreur Profil :", error);
        });
    </script>
</body>
</html>
