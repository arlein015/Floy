<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --gris: #121212; 
        }
        
        body { 
            background: var(--noir); color: white; 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px;
        }

        /* Barre de navigation haute */
        .nav-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; position: sticky; top: 0; background: var(--noir); z-index: 100;
        }

        /* Photo de Profil */
        .profile-header { text-align: center; padding: 20px 0; }
        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--orange-floy); padding: 3px; margin-bottom: 10px;
        }

        /* Compteurs */
        .stats-bar {
            display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #222; border-bottom: 1px solid #222;
        }
        .stat-item { text-align: center; flex: 1; cursor: pointer; }
        .stat-num { font-weight: 800; font-size: 18px; display: block; }
        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; }

        /* Boutons d'Action */
        .btn-group { display: flex; gap: 10px; padding: 20px; }
        .btn-main {
            flex: 1; background: var(--orange-floy); color: black; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .btn-wallet {
            background: #1a1a1a; color: white; border: 1px solid #333;
            padding: 12px 20px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        /* Grille de photos (Feed) */
        .photo-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px;
        }
        .photo-item {
            aspect-ratio: 1/1; background: #1a1a1a; background-size: cover; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="nav-top">
        <span style="font-weight: 900; letter-spacing: 1px;">@votre_pseudo</span>
        <div style="display: flex; gap: 15px;">
            <div onclick="window.location.href='notifications.html'" style="cursor: pointer; position: relative;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                <div id="notif-dot" style="display:none; position:absolute; top:0; right:0; width:8px; height:8px; background:red; border-radius:50%;"></div>
            </div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </div>
    </div>

    <div class="profile-header">
        <img src="https://via.placeholder.com/150" class="avatar" alt="Profil">
        <div style="font-weight: bold; font-size: 18px;">Nom d'utilisateur</div>
        <div style="font-size: 13px; color: #888; margin-top: 4px;">Passionné de Web & Python 🐍</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-num" id="count-abonnes">0</span>
            <span class="stat-label">Abonnés</span>
        </div>
        <div class="stat-item">
            <span class="stat-num" id="count-abonnements">0</span>
            <span class="stat-label">Abonnements</span>
        </div>
        <div class="stat-item" onclick="hitLike()"> <span class="stat-num" id="count-likes">0</span>
            <span class="stat-label">J'aime</span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-main" id="followBtn" onclick="toggleFollow()">S'ABONNER</button>
        
        <button class="btn-wallet" onclick="window.location.href='withdraw-funds.html'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--orange-floy)"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            Wallet
        </button>
    </div>

    <div class="photo-grid">
        <div class="photo-item" onclick="hitLike()" style="background-image: url('https://picsum.photos/200?random=1');"></div>
        <div class="photo-item" onclick="hitLike()" style="background-image: url('https://picsum.photos/200?random=2');"></div>
        <div class="photo-item" onclick="hitLike()" style="background-image: url('https://picsum.photos/200?random=3');"></div>
    </div>

    <script>
        // Charger les données au démarrage
        window.onload = function() {
            updateDisplay();
            
            // Vérifier si on suit déjà
            if(localStorage.getItem('isFollowing') === 'true') {
                const btn = document.getElementById('followBtn');
                btn.innerText = "ABONNÉ";
                btn.style.background = "#222";
                btn.style.color = "white";
            }
        }

        function updateDisplay() {
            document.getElementById('count-abonnes').innerText = localStorage.getItem('followers') || 0;
            document.getElementById('count-abonnements').innerText = localStorage.getItem('following') || 0;
            document.getElementById('count-likes').innerText = localStorage.getItem('likes') || 0;
        }

        // Fonction S'abonner
        function toggleFollow() {
            let followers = parseInt(localStorage.getItem('followers')) || 0;
            let isFollowing = localStorage.getItem('isFollowing') === 'true';
            const btn = document.getElementById('followBtn');

            if(!isFollowing) {
                followers++;
                localStorage.setItem('isFollowing', 'true');
                btn.innerText = "ABONNÉ";
                btn.style.background = "#222";
                btn.style.color = "white";
            } else {
                followers--;
                localStorage.setItem('isFollowing', 'false');
                btn.innerText = "S'ABONNER";
                btn.style.background = "var(--orange-floy)";
                btn.style.color = "black";
            }

            localStorage.setItem('followers', followers);
            updateDisplay();
        }

        // Fonction Like (simulée quand on clique sur une photo)
        function hitLike() {
            let likes = parseInt(localStorage.getItem('likes')) || 0;
            likes++;
            localStorage.setItem('likes', likes);
            updateDisplay();
        }
    </script>
</body>
</html>
