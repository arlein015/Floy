<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <meta http-equiv="Content-Security-Policy" content="img-src 'self' data: https:; script-src 'self' 'unsafe-inline';">
    
    <title>Profil - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Header Profil */
        .profile-header { padding: 40px 20px 20px; text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--orange); margin-bottom: 15px; object-fit: cover; }
        .username { font-size: 20px; font-weight: bold; margin: 0; }
        .bio { font-size: 14px; color: #aaa; margin: 10px 0; }

        /* Stats */
        .stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 12px; color: #888; }

        /* BOUTON SHOP (Nouveau) */
        .btn-shop { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--orange); color: white; border: none; 
            padding: 12px; border-radius: 12px; font-weight: bold;
            margin: 20px; cursor: pointer; text-decoration: none;
        }

        /* Grille de posts */
        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .post-thumb { aspect-ratio: 1/1; background: #222; overflow: hidden; }
        .post-thumb img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="profile-header">
        <img src="https://picsum.photos/200" alt="Avatar" class="avatar">
        <p class="username">Arlein_Dev</p>
        <p class="bio">Développeur Floy | Passionné par le code 💻</p>
        
        <div class="stats">
            <div class="stat-item"><span class="stat-num">1.2k</span><span class="stat-label">Abonnés</span></div>
            <div class="stat-item"><span class="stat-num">450</span><span class="stat-label">Abonnements</span></div>
        </div>
    </div>

    <a href="./shop.html" class="btn-shop">
        <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 5h4v2h-4V5zm10 15H4V9h16v11z"/></svg>
        BOUTIQUE FLOY
    </a>

    <div class="posts-grid">
        <div class="post-thumb"><img src="https://picsum.photos/300/300?1"></div>
        <div class="post-thumb"><img src="https://picsum.photos/300/300?2"></div>
        <div class="post-thumb"><img src="https://picsum.photos/300/300?3"></div>
    </div>

</body>
</html>
