<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Mon Profil</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --nav-h: 75px; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }

        /* HEADER PROFIL */
        .profile-header { padding: 40px 20px 20px; text-align: center; }
        .profile-pic-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--orange); }
        
        .user-name { font-size: 22px; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .bio { color: #888; font-size: 14px; margin-bottom: 20px; }

        /* COMPTEURS RÉELS */
        .stats-bar { display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-size: 18px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #666; }

        /* BOUTONS ACTIONS */
        .actions { padding: 20px; display: flex; gap: 10px; }
        .btn-edit { flex: 1; background: #222; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; }
        .btn-live { background: var(--orange); color: black; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: none; text-decoration: none; }

        /* NAV BAR SVG */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); border-top: 1px solid #1a1a1a; display: flex; justify-content: space-evenly; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { color: #666; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item.active { color: var(--orange); }
        .nav-item svg { width: 24px; height: 24px; }
        .nav-text { font-size: 10px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="profile-pic-container">
            <img id="myAvatar" src="ma_photo.jpg" class="profile-pic" onerror="this.src='https://ui-avatars.com/api/?name=User&background=333&color=fff'">
        </div>
        <div class="user-name">
            <span id="displayUsername">Utilisateur</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--orange)"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.3-3.3 1.4-1.4 1.9 1.9 5.3-5.3 1.4 1.4-6.7 6.7z"/></svg>
        </div>
        <div class="bio" id="displayBio">En attente de bio...</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-num" id="countPosts">0</span>
            <span class="stat-label">Posts</span>
        </div>
        <div class="stat-item">
            <span class="stat-num" id="countFollowers">1.2k</span>
            <span class="stat-label">Abonnés</span>
        </div>
        <div class="stat-item">
            <span class="stat-num" id="countFollowing">450</span>
            <span class="stat-label">Abonnements</span>
        </div>
    </div>

    <div class="actions">
        <button class="btn-edit" onclick="editProfile()">Modifier le profil</button>
        <a href="live.html" class="btn-live">Go Live</a>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span class="nav-text">Accueil</span>
        </a>
        <a href="explorer.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span class="nav-text">Explorer</span>
        </a>
        <a href="story-creator.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span class="nav-text">Créer</span>
        </a>
        <a href="messages.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span class="nav-text">Messages</span>
        </a>
        <a href="profil.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="nav-text">Profil</span>
        </a>
    </nav>

    <script>
        // Charger les données sauvegardées
        function loadProfileData() {
            const savedName = localStorage.getItem('user_name') || "Utilisateur Floy";
            const savedBio = localStorage.getItem('user_bio') || "Passionné de code & design";
            const savedAvatar = localStorage.getItem('user_story_img'); // On réutilise l'avatar de la story
            
            document.getElementById('displayUsername').textContent = savedName;
            document.getElementById('displayBio').textContent = savedBio;
            if(savedAvatar) document.getElementById('myAvatar').src = savedAvatar;

            // Simuler des nombres d'abonnés liés (on pourrait les rendre modifiables aussi)
            document.getElementById('countFollowers').textContent = localStorage.getItem('count_followers') || "1,240";
        }

        function editProfile() {
            const newName = prompt("Nouveau nom :", document.getElementById('displayUsername').textContent);
            const newBio = prompt("Nouvelle bio :", document.getElementById('displayBio').textContent);
            
            if(newName) {
                localStorage.setItem('user_name', newName);
                document.getElementById('displayUsername').textContent = newName;
            }
            if(newBio) {
                localStorage.setItem('user_bio', newBio);
                document.getElementById('displayBio').textContent = newBio;
            }
        }

        window.onload = loadProfileData;
    </script>
</body>
</html>
