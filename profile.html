<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-violet: #1a0033; /* Violet profond */
            --floy-cyan: #00e5ff; /* Bleu cyan certifié */
            --floy-orange: #ff8c00; /* Orange d'action */
            --nav-black: #000000; /* Noir pur */
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, var(--bg-violet) 0%, #000000 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            color: white;
            padding-bottom: 80px;
        }

        /* En-tête du profil */
        .profile-header {
            text-align: center;
            padding: 50px 20px 20px;
            background: rgba(0, 0, 0, 0.2);
        }

        .profile-pic-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--bg-violet);
            object-fit: cover;
            background: #222;
        }

        .username {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .badge-cyan {
            color: var(--floy-cyan);
            font-size: 16px;
        }

        /* Statistiques */
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.6;
        }

        /* Bouton Edit / Portefeuille */
        .btn-profile {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        /* Grille de vidéos */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }

        .video-thumbnail {
            aspect-ratio: 9/12;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
        }

        /* Barre de navigation basse */
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: var(--nav-black);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-icon {
            color: white;
            font-size: 22px;
            opacity: 0.5;
            cursor: pointer;
        }

        .nav-icon.active {
            opacity: 1;
        }

        .plus-btn-container {
            background: linear-gradient(to right, #00e5ff, #a456f0);
            padding: 5px 15px;
            border-radius: 10px;
            color: black;
        }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="profile-pic-container">
            <img src="logo.png" class="profile-pic" alt="Profile">
        </div>
        <div class="username">
            @bouta <i class="fas fa-check-circle badge-cyan"></i>
        </div>
        <p style="font-size: 13px; opacity: 0.7; margin-top: 8px;">Développeur Threndly | Créateur de contenu</p>

        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-value">150K</div>
                <div class="stat-label">Likes</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">856</div>
                <div class="stat-label">Abonnés</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">124</div>
                <div class="stat-label">Suivis</div>
            </div>
        </div>

        <button class="btn-profile" onclick="window.location.href='wallet.html'">
            <i class="fas fa-wallet" style="color: var(--floy-orange);"></i> Mon Portefeuille
        </button>
    </div>

    <div class="video-grid">
        <div class="video-thumbnail"></div>
        <div class="video-thumbnail"></div>
        <div class="video-thumbnail"></div>
        <div class="video-thumbnail"></div>
        <div class="video-thumbnail"></div>
        <div class="video-thumbnail"></div>
    </div>

    <nav class="footer-nav">
        <i class="fas fa-home nav-icon" onclick="window.location.href='feed.html'"></i>
        <i class="fas fa-compass nav-icon"></i>
        <div class="plus-btn-container" onclick="window.location.href='upload.html'">
            <i class="fas fa-plus"></i>
        </div>
        <i class="fas fa-comment-alt nav-icon" onclick="window.location.href='messages.html'"></i>
        <i class="fas fa-user nav-icon active"></i>
    </nav>

</body>
</html>
