<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:,">
    <title>Profil - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }

        /* ENTÊTE PROFIL */
        .profile-header { padding: 40px 15px 20px; text-align: center; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--orange); padding: 3px; margin-bottom: 10px; object-fit: cover; }
        .username { font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .bio { color: #888; font-size: 14px; margin: 8px 0 20px; }

        /* BOUTONS D'ACTION */
        .actions { display: flex; justify-content: center; gap: 8px; padding: 0 15px 25px; }
        .btn { flex: 1; padding: 8px 0; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; text-decoration: none; text-align: center; }
        .btn-follow { background: var(--orange); color: white; }
        .btn-secondary { background: var(--gris); color: white; border: 1px solid var(--bordure); }

        /* GRILLE DE CONTENU (GRID) */
        .content-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: var(--bordure); }
        .grid-item { aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        /* NAVIGATION SVG MODERNE */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(0,0,0,0.95); border-top: 1px solid var(--bordure); display: flex; justify-content: space-evenly; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-link { color: #666; text-decoration: none; }
        .nav-link.active { color: white; }
        .nav-svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-plus { background: white; border-radius: 8px; padding: 4px 10px; color: black !important; }
    </style>
</head>
<body>

    <div class="profile-header">
        <img src="https://ui-avatars.com/api/?name=Arlein&background=FF7A1A&color=000" class="avatar">
        <div class="username">
            Arlein_Dev 
            <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--orange)"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.3-3.3 1.4-1.4 1.9 1.9 5.3-5.3 1.4 1.4-6.7 6.7z"/></svg>
        </div>
        <p class="bio">Développeur Backend | Floy App Project 🚀</p>
    </div>

    <div class="actions">
        <button class="btn btn-follow">Suivre</button>
        <a href="./messages.html" class="btn btn-secondary">Message</a>
        <button class="btn btn-secondary">Modifier</button>
    </div>

    <div class="content-grid">
        <div class="grid-item"><img src="https://picsum.photos/300/300?sig=1"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?sig=2"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?sig=3"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?sig=4"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?sig=5"></div>
        <div class="grid-item"><img src="https://picsum.photos/300/300?sig=6"></div>
    </div>

    <nav class="nav-bar">
        <a href="./index.html" class="nav-link"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
        <a href="./explorer.html" class="nav-link"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></a>
        <a href="./create.html" class="nav-link nav-plus"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></a>
        <a href="./messages.html" class="nav-link"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></a>
        <a href="./profil.html" class="nav-link active"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></a>
    </nav>

</body>
</html>
