<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOY - Profil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-pic-container">
                <img src="https://via.placeholder.com/100" alt="Photo de profil" class="profile-img">
            </div>
            <h2 class="username">@votre_username <span class="badge-certifie"> <i class="fas fa-check-circle"></i></span></h2>
            <p class="bio">Créateur de contenu sur FLOY 🚀</p>
            
            <div class="profile-stats">
                <div class="stat"><strong>0</strong><span>Abonnements</span></div>
                <div class="stat"><strong>0</strong><span>Abonnés</span></div>
                <div class="stat"><strong>0</strong><span>J'aime</span></div>
            </div>

            <div class="profile-actions">
                <button class="btn-edit">Modifier le profil</button>
                <a href="wallet.html" class="btn-wallet-link"><i class="fas fa-wallet"></i></a>
            </div>
        </div>

        <div class="video-grid-tabs">
            <div class="tab active"><i class="fas fa-th"></i></div>
            <div class="tab"><i class="fas fa-heart"></i></div>
        </div>

        <div class="video-grid">
            <div class="grid-item">
                <img src="https://via.placeholder.com/150x200" alt="Video thumbnail">
                <div class="view-count"><i class="fas fa-play"></i> 0</div>
            </div>
            </div>
    </div>

    <nav class="bottom-nav">
        <a href="feed.html"><i class="fas fa-home"></i></a>
        <a href="explore.html"><i class="fas fa-search"></i></a>
        <a href="upload.html" class="upload-icon"><i class="fas fa-plus"></i></a>
        <a href="message.html"><i class="fas fa-envelope"></i></a>
        <a href="profile.html" class="active-nav"><i class="fas fa-user"></i></a>
    </nav>
</body>
</html>
