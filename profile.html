<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Profil Officiel</title>
    <style>
        :root { 
            --orange-floy: #FF7A1A; 
            --noir: #000; 
            --gris: #121212; 
            --blanc: #fff; 
        }
        
        body, html { 
            margin: 0; padding: 0; 
            background: var(--noir); color: var(--blanc); 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }

        /* --- BARRE DU HAUT --- */
        .top-bar { 
            display: flex; justify-content: flex-end; align-items: center;
            padding: 15px 20px; gap: 20px;
        }
        .icon-btn { cursor: pointer; fill: white; transition: 0.2s; }
        .share-icon { transform: scaleX(-1); } /* Oriente la flèche vers la droite */

        /* --- HEADER PROFIL --- */
        .profile-header { padding: 20px; text-align: center; }
        .profile-pic-container { position: relative; width: 100px; height: 100px; margin: 0 auto 12px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--orange-floy); object-fit: cover; }
        .verified-badge { position: absolute; bottom: 5px; right: 5px; width: 22px; height: 22px; }

        .display-name { font-size: 22px; font-weight: bold; margin-bottom: 2px; }
        .user-handle { font-size: 15px; color: #888; margin-bottom: 15px; }

        .stats-row { display: flex; justify-content: center; gap: 25px; margin-bottom: 20px; }
        .stat-item { text-align: center; cursor: pointer; }
        .stat-val { font-weight: bold; font-size: 18px; display: block; }
        .stat-lab { color: #888; font-size: 12px; }

        /* --- BOUTONS --- */
        .btn-row { display: flex; gap: 10px; width: 90%; margin: 0 auto 25px; }
        .btn-sec { flex: 1; background: var(--gris); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }

        /* --- ONGLETS --- */
        .tabs-selector { display: flex; border-top: 1px solid #222; margin-top: 10px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--blanc); }
        .tab-btn svg { width: 24px; height: 24px; fill: white; }

        /* --- GRILLE VIDÉO + EFFETS --- */
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
        .video-item { aspect-ratio: 3/4; background: #1a1a1a; position: relative; overflow: hidden; cursor: pointer; }
        .video-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .video-item:hover img { transform: scale(1.1); }
        .view-count { position: absolute; bottom: 5px; left: 5px; font-size: 11px; font-weight: bold; z-index: 2; }

        /* --- POPUP PARTAGE --- */
        .share-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 2000; backdrop-filter: blur(5px); }
        .share-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7); width: 280px; background: #111; border: 1px solid #333; border-radius: 25px; padding: 30px 20px; text-align: center; z-index: 2001; opacity: 0; visibility: hidden; transition: 0.3s; }
        .share-popup.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .qr-box { background: white; padding: 10px; border-radius: 15px; display: inline-block; margin: 15px 0; }
        .btn-copy { background: var(--orange-floy); color: black; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* --- NAV BAR --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a1a; z-index: 100; }
        .nav-icon { width: 28px; height: 28px; fill: #666; }
        .nav-icon.active { fill: white; }
    </style>
</head>
<body onload="initProfile()">

    <div class="top-bar">
        <svg class="icon-btn share-icon" onclick="openSharePopup()" width="26" height="26" viewBox="0 0 24 24" fill="white">
            <path d="M12.5 4v3.5C7.3 8.3 4 12.3 4 17.5c2.4-3.4 5.6-5.1 8.5-5.1V16L20 10l-7.5-6z"></path>
        </svg>
    </div>

    <div class="profile-header">
        <div class="profile-pic-container">
            <img src="https://i.pravatar.cc/150?u=Arlein" class="profile-pic">
            <svg class="verified-badge" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#FF7A1A"/><path d="M17 9L11 15L7 11" stroke="white" stroke-width="2.5" fill="none"/></svg>
        </div>
        <div class="display-name">Arlein</div>
        <div class="user-handle">@arlein_off</div>

        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-val counter" id="following-val" data-target="124">0</span>
                <span class="stat-lab">Abonnements</span>
            </div>
            <div class="stat-item">
                <span class="stat-val counter" id="followers-val" data-target="850">0</span>
                <span class="stat-lab">Abonnés</span>
            </div>
            <div class="stat-item">
                <span class="stat-val counter" data-target="12">0</span>
                <span class="stat-lab">J'aime (M)</span>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn-sec" onclick="window.location.href='edit-profile.html'">Modifier le profil</button>
            <button class="btn-sec" onclick="window.location.href='follower-growth.html'">Analytics</button>
        </div>
    </div>

    <div class="tabs-selector">
        <div class="tab-btn active" onclick="switchTab('posts', this)"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zm-11 11h7v7H3v-7zm11 0h7v7h-7v-7z"/></svg></div>
        <div class="tab-btn" onclick="switchTab('likes', this)"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
    </div>

    <div class="video-grid" id="mainGrid">
        <div class="video-item"><img src="https://picsum.photos/seed/1/300/400"><div class="view-count">▶ 12K</div></div>
        <div class="video-item"><img src="https://picsum.photos/seed/2/300/400"><div class="view-count">▶ 8K</div></div>
        <div class="video-item"><img src="https://picsum.photos/seed/3/300/400"><div class="view-count">▶ 45K</div></div>
    </div>

    <div id="shareOverlay" class="share-overlay" onclick="closeSharePopup()"></div>
    <div id="sharePopup" class="share-popup">
        <div class="share-title">Partager le profil</div>
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://floy.app/arlein_off" alt="QR">
        </div>
        <button class="btn-copy" onclick="copyLink()">🔗 Copier le lien</button>
    </div>

    <nav class="nav-bar">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="nav-icon active" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
    </nav>

    <script>
        function initProfile() {
            // Charger les vrais nombres depuis le stockage
            const count = localStorage.getItem('floy_following_count') || "124";
            document.getElementById('following-val').setAttribute('data-target', count);
            animateCounters();
        }

        function animateCounters() {
            document.querySelectorAll('.counter').forEach(c => {
                const target = +c.getAttribute('data-target');
                let cur = 0;
                const update = () => {
                    const speed = target / 30;
                    if(cur < target) {
                        cur += Math.ceil(speed);
                        c.innerText = cur;
                        setTimeout(update, 30);
                    } else { c.innerText = target; }
                };
                update();
            });
        }

        function openSharePopup() {
            document.getElementById('shareOverlay').style.display = 'block';
            setTimeout(() => document.getElementById('sharePopup').classList.add('active'), 10);
        }

        function closeSharePopup() {
            document.getElementById('sharePopup').classList.remove('active');
            setTimeout(() => document.getElementById('shareOverlay').style.display = 'none', 300);
        }

        function copyLink() {
            navigator.clipboard.writeText("https://floy.app/arlein_off").then(() => {
                alert("Lien copié !");
                closeSharePopup();
            });
        }

        function switchTab(type, el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = type === 'likes' ? '<p style="grid-column:1/4;text-align:center;padding:20px;">Aucun like.</p>' : 
            '<div class="video-item"><img src="https://picsum.photos/seed/1/300/400"><div class="view-count">▶ 12K</div></div><div class="video-item"><img src="https://picsum.photos/seed/2/300/400"><div class="view-count">▶ 8K</div></div>';
        }
    </script>
</body>
</html>
