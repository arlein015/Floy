<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:,">
    <title>Profil - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris-fonce: #121212; --gris-bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 90px; }

        /* HEADER & AVATAR */
        .profile-header { padding: 30px 15px 15px; text-align: center; }
        .avatar-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--orange); padding: 3px; object-fit: cover; }
        
        .username { font-size: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .bio { color: #888; font-size: 14px; margin: 10px 0 20px; line-height: 1.4; }

        /* BOUTONS D'ACTION */
        .action-buttons { display: flex; justify-content: center; gap: 10px; padding: 0 15px 25px; }
        .btn { flex: 1; max-width: 150px; padding: 10px 0; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; border: none; text-decoration: none; text-align: center; }
        .btn-follow { background: var(--orange); color: white; }
        .btn-dark { background: var(--gris-fonce); color: white; border: 1px solid var(--gris-bordure); }

        /* GRILLE DE CONTENUS */
        .content-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: var(--gris-bordure); border-top: 1px solid var(--gris-bordure); }
        .grid-item { aspect-ratio: 1/1; background: #111; position: relative; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* BARRE DE NAVIGATION SVG MODERNE */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(5,5,5,0.95); border-top: 1px solid var(--gris-bordure); display: flex; justify-content: space-evenly; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-link { color: #666; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-link.active { color: white; }
        .nav-svg { width: 26px; height: 26px; fill: currentColor; }
        .nav-plus { background: white; border-radius: 10px; padding: 5px 12px; color: black !important; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="avatar-container">
            <img src="https://ui-avatars.com/api/?name=Arlein&background=FF7A1A&color=000" class="avatar">
        </div>
        <div class="username">
            Arlein_Dev 
            <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--orange)"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.3-3.3 1.4-1.4 1.9 1.9 5.3-5.3 1.4 1.4-6.7 6.7z"/></svg>
        </div>
        <p class="bio">Développeur Floy App | Backend & UI/UX Design 🚀</p>
    </div>

    <div class="action-buttons">
        <button class="btn btn-follow">Suivre</button>
        <a href="./messages.html" class="btn btn-dark">Message</a>
        <button class="btn btn-dark">Modifier</button>
    </div>

    <div class="content-grid">
        <div class="grid-item"><img src="https://picsum.photos/400/400?random=1"></div>
        <div class="grid-item"><img src="https://picsum.photos/400/400?random=2"></div>
        <div class="grid-item"><img src="https://picsum.photos/400/400?random=3"></div>
        <div class="grid-item"><img src="https://picsum.photos/400/400?random=4"></div>
        <div class="grid-item"><img src="https://picsum.photos/400/400?random=5"></div>
        <div class="grid-item"><img src="https://picsum.photos/400/400?random=6"></div>
    </div>

    <nav class="nav-bar">
        <a href="./index.html" class="nav-link">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </a>
        <a href="./explorer.html" class="nav-link">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </a>
        <a href="./create.html" class="nav-link nav-plus">
            <svg class="nav-svg" viewBox="0 0 24 24" style="width:20px; height:20px;"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </a>
        <a href="./messages.html" class="nav-link">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-7H6V5h12v2z"/></svg>
        </a>
        <a href="./profil.html" class="nav-link active">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </a>
    </nav>

</body>
</html>
