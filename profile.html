<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Profil - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        
        .profile-header { padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid var(--bordure); }
        .avatar-big { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--orange); margin: 0 auto 15px; background: #333; }
        
        .username { font-size: 20px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .badge-vip { fill: var(--orange); width: 18px; }

        .stats-bar { display: flex; justify-content: center; gap: 30px; padding: 20px; font-size: 14px; color: #888; }
        .stats-bar b { color: white; }

        .menu-list { padding: 10px 20px; }
        .menu-item { padding: 18px 0; border-bottom: 1px solid var(--bordure); display: flex; justify-content: space-between; cursor: pointer; }

        /* MODAL ABONNEMENT */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:1000; }
        .modal-content { background: var(--gris); width: 85%; padding: 30px; border-radius: 25px; border: 1px solid var(--bordure); text-align: center; }
        .sub-status { background: rgba(46, 204, 113, 0.2); color: #2ecc71; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--noir); border-top: 1px solid var(--bordure); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { fill: #666; }
        .nav-item.active { fill: var(--orange); }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="avatar-big"></div>
        <div class="username">
            Arlein_Dev 
            <svg class="badge-vip" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
        </div>
        <p style="color:#666; font-size:14px;">Développeur Backend Floy</p>
    </div>

    <div class="stats-bar">
        <span><b>128</b> Abonnés</span>
        <span><b>45</b> Abonnements</span>
    </div>

    <div class="menu-list">
        <div class="menu-item" onclick="openSub()">
            <span>🌟 Mon Abonnement VIP</span>
            <span style="color:var(--orange)">Gérer ></span>
        </div>
        <div class="menu-item" onclick="window.location.href='./shop.html'">
            <span>💰 Portefeuille (Jetons)</span>
            <span>550 F</span>
        </div>
        <div class="menu-item" style="color:#ff4444;">Déconnexion</div>
    </div>

    <div id="subModal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0 0 10px;">Votre Abonnement</h2>
            <div style="margin-bottom: 20px;"><span class="sub-status">ACTIF</span></div>
            <p style="font-size: 14px; color: #888;">Service : <b>Certification Badge Bleu</b></p>
            <p style="font-size: 14px; color: #888;">Prochain prélèvement : <b>17 Avril 2026</b></p>
            <p style="font-size: 14px; color: #888;">Prix : <b>10.00$ / mois</b></p>
            
            <button onclick="closeSub()" style="width:100%; background:var(--orange); color:white; border:none; padding:15px; border-radius:15px; font-weight:bold; margin-top:20px;">Fermer</button>
            <button onclick="alert('Demande de résiliation envoyée.')" style="background:none; border:none; color:#666; margin-top:15px; font-size:12px;">Résilier l'abonnement</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='./index.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item" onclick="window.location.href='./shop.html'"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM10 5h4v2h-4V5zm10 15H4V9h16v11z"/></svg></div>
        <div class="nav-item active"><svg width="28" height="28" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
    </nav>

    <script>
        function openSub() { document.getElementById('subModal').style.display = 'flex'; }
        function closeSub() { document.getElementById('subModal').style.display = 'none'; }
    </script>
</body>
</html>
