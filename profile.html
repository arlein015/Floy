<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Threndly - Profil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-header { text-align: center; padding: 40px 20px; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; background: var(--threndly-violet); margin: 0 auto 15px; }
        .stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
        .stat-item b { display: block; font-size: 18px; }
        .stat-item span { color: #888; font-size: 13px; }
        .edit-btn {
            background: #222; border: none; color: white;
            padding: 10px 40px; border-radius: 5px; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="profile-header">
        <div class="profile-pic"></div>
        <h3>@createur_floy <i class="fas fa-check-circle badge-verified"></i></h3>
        <div class="stats">
            <div class="stat-item"><b>1.2k</b><span>Abonnés</span></div>
            <div class="stat-item"><b>450</b><span>Abonnements</span></div>
            <div class="stat-item"><b>15k</b><span>Likes</span></div>
        </div>
        <button class="edit-btn" onclick="window.location.href='edit-video.html'">Modifier le profil</button>
    </div>

    <nav class="bottom-nav">
        <i class="fas fa-home nav-icon" onclick="window.location.href='feed.html'"></i>
        <i class="fas fa-search nav-icon" onclick="window.location.href='explore.html'"></i>
        <div style="background:white; color:black; padding:6px 15px; border-radius:10px;"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment nav-icon" onclick="window.location.href='message.html'"></i>
        <i class="fas fa-user nav-icon active"></i>
    </nav>
</body>
</html>
