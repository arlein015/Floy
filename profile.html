<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profil - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* HEADER PROFIL */
        .profile-header { padding: 40px 20px 20px; max-width: 600px; margin: 0 auto; }
        .profile-main { display: flex; align-items: center; gap: 30px; margin-bottom: 20px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; background: var(--gris); border: 2px solid var(--orange); padding: 3px; }
        .profile-pic img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .stats { display: flex; gap: 20px; text-align: center; flex-grow: 1; }
        .stat-item b { display: block; font-size: 18px; }
        .stat-item span { font-size: 12px; color: #888; }

        .profile-bio { margin-bottom: 20px; }
        .username-row { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 900; margin-bottom: 5px; }
        .badge-certif { width: 18px; height: 18px; fill: var(--orange); }
        .bio-text { font-size: 14px; color: #ccc; }

        /* GRILLE DE POSTS */
        .tabs { display: flex; border-top: 1px solid var(--bordure); margin-top: 20px; }
        .tab { flex: 1; text-align: center; padding: 15px; border-bottom: 2px solid transparent; }
        .tab.active { border-bottom: 2px solid white; color: white; }

        #user-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; 
            max-width: 900px; margin: 0 auto; 
        }
        .grid-item { aspect-ratio: 1/1; background: var(--gris); overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* NAV BAR */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: rgba(0,0,0,0.95); border-top: 1px solid var(--bordure);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-btn { color: #555; text-decoration: none; }
        .nav-btn.active { color: white; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="profile-main">
            <div class="profile-pic">
                <img src="https://via.placeholder.com/150" alt="Avatar">
            </div>
            <div class="stats">
                <div class="stat-item"><b id="count-posts">0</b><span>Posts</span></div>
                <div class="stat-item"><b>128</b><span>Fans</span></div>
                <div class="stat-item"><b>42</b><span>Suivis</span></div>
            </div>
        </div>

        <div class="profile-bio">
            <div class="username-row">
                User_Floy
                <svg class="badge-certif" viewBox="0 0 24 24"><path d="M12 21.35l-1.45 1.32-1.94-.37-1.7 1-1.25-1.55-1.95.12-.66-1.85-1.88-.54.02-1.95-1.46-1.3L1.5 12l-1.32-1.45.37-1.94-1-1.7 1.55-1.25-.12-1.95 1.85-.66.54-1.88 1.95.02 1.3-1.46L12 1.5l1.45 1.32 1.94.37 1.7-1 1.25 1.55 1.95-.12.66 1.85 1.88.54-.02 1.95 1.46 1.3L22.5 12l1.32 1.45-.37 1.94 1 1.7-1.55 1.25.12 1.95-1.85.66-.54 1.88-1.95-.02-1.3 1.46L12 22.5l-1.45-1.32z"/></svg>
            </div>
            <div class="bio-text">Développeur sur Floy 🟠🚀 | Bienvenue sur mon profil officiel.</div>
        </div>

        <div class="tabs">
            <div class="tab active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </div>
        </div>
    </div>

    <main id="user-grid">
        </main>

    <nav class="nav-bar">
        <a href="index.html" class="nav-btn">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        </a>
        <a href="post.html" class="nav-btn">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </a>
        <a href="profil.html" class="nav-btn active">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
    </nav>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const grid = document.getElementById('user-grid');
        const countLabel = document.getElementById('count-posts');

        // On récupère uniquement les posts de "User_Floy"
        const q = query(
            collection(db, "posts"), 
            where("username", "==", "User_Floy"),
            orderBy("createdAt", "desc")
        );

        onSnapshot(q, (snapshot) => {
            grid.innerHTML = "";
            countLabel.innerText = snapshot.size; // Met à jour le nombre de posts

            snapshot.forEach((doc) => {
                const post = doc.data();
                const item = `
                    <div class="grid-item">
                        <img src="${post.imageUrl}" alt="Post">
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', item);
            });
        });
    </script>
</body>
</html>
