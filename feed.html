<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Feed</title>
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); color: white; font-family: sans-serif; overflow: hidden; }

        /* Container Vidéo */
        .video-slide { width: 100%; height: 100vh; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }

        /* Barre Latérale */
        .side-bar { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 18px; align-items: center; z-index: 10; }
        
        /* Avatar + Bouton Suivre */
        .avatar-container { position: relative; margin-bottom: 10px; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .follow-btn { 
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--orange-floy); border: none; width: 22px; height: 22px; 
            border-radius: 50%; color: white; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 16px;
        }

        /* Actions */
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .heart-main { font-size: 38px; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        
        /* Barre de Réactions */
        .reaction-bar {
            position: absolute; right: 70px; background: #1a1a1a; padding: 10px; 
            border-radius: 30px; display: none; gap: 12px; border: 1px solid #333; z-index: 100;
        }
        .reaction-bar span { font-size: 30px; cursor: pointer; transition: 0.2s; }

        /* --- ANIMATIONS DES EMOJIS --- */
        @keyframes haha-shake { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3) rotate(10deg); } }
        @keyframes fire-burn { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5); transform: scale(1.2); } }
        @keyframes angry-shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }

        .animate-haha { animation: haha-shake 0.4s 3; }
        .animate-fire { animation: fire-burn 0.5s infinite; }
        .animate-angry { animation: angry-shake 0.1s infinite; }

        /* Disque Rond tournant */
        .music-disc {
            width: 45px; height: 45px; border-radius: 50%;
            background: radial-gradient(circle, #333 20%, #000 100%);
            border: 8px solid #222; animation: rotate 3s linear infinite;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div class="video-slide">
        <div class="side-bar">
            <div class="avatar-container">
                <img src="https://i.pravatar.cc/100" class="user-avatar">
                <button class="follow-btn" onclick="this.innerHTML='✓'; this.style.background='#444'">+</button>
            </div>

            <div class="action-item" style="position: relative;">
                <div class="reaction-bar" id="reactBar">
                    <span onclick="setReaction('😂', 'animate-haha')">😂</span>
                    <span onclick="setReaction('❤️', '')">❤️</span>
                    <span onclick="setReaction('🔥', 'animate-fire')">🔥</span>
                    <span onclick="setReaction('😠', 'animate-angry')">😠</span>
                    <span onclick="setReaction('🤮', '')">🤮</span>
                </div>
                <div class="heart-main" id="mainIcon" 
                     onclick="toggleLike()" 
                     onmousedown="startPress()" onmouseup="endPress()"
                     ontouchstart="startPress()" ontouchend="endPress()">🤍</div>
                <span style="font-size: 12px;">150K</span>
            </div>

            <div class="action-item">
                <span style="font-size: 30px;">💬</span>
                <span style="font-size: 12px;">856</span>
            </div>

            <div class="music-disc">
                <div style="width: 15px; height: 15px; background: var(--orange-floy); border-radius: 50%;"></div>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <span style="color: white; font-size: 24px;">🏠</span>
        <span style="color: #666; font-size: 24px;">🔍</span>
        <div style="background: linear-gradient(to right, #00BFFF, #FF00FF); padding: 5px 15px; border-radius: 10px; font-weight: bold;">+</div>
        <span style="color: #666; font-size: 24px;">✉️</span>
        <span style="color: #666; font-size: 24px;">👤</span>
    </nav>

    <script>
        let pressTimer;
        let liked = false;
        const mainIcon = document.getElementById('mainIcon');
        const reactBar = document.getElementById('reactBar');

        function toggleLike() {
            if(!liked) {
                setReaction('❤️', '');
                liked = true;
            } else {
                mainIcon.innerText = '🤍';
                mainIcon.className = 'heart-main';
                liked = false;
            }
        }

        function setReaction(emoji, animClass) {
            mainIcon.innerText = emoji;
            mainIcon.className = 'heart-main ' + animClass;
            reactBar.style.display = 'none';
            liked = true;
            
            // Arrêter l'animation après un moment si c'est le rire
            if(animClass === 'animate-haha') {
                setTimeout(() => { mainIcon.classList.remove('animate-haha'); }, 2000);
            }
        }

        function startPress() { pressTimer = setTimeout(() => { reactBar.style.display = 'flex'; }, 600); }
        function endPress() { clearTimeout(pressTimer); }

        window.onclick = function(e) { if(!e.target.closest('.action-item')) reactBar.style.display='none'; }
    </script>
</body>
</html>
