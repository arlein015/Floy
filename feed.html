<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Feed</title>
    <link rel="icon" type="image/png" href="F4.png">
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); color: white; font-family: sans-serif; overflow: hidden; }

        /* Container du défilement vertical (Snap Scrolling) */
        .video-container { width: 100%; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-container::-webkit-scrollbar { display: none; }

        /* Chaque vidéo occupe toute l'écran */
        .video-slide { width: 100%; height: 100vh; scroll-snap-align: start; position: relative; background: #111; display: flex; align-items: center; justify-content: center; }

        /* Logo Floy 3D flottant en haut */
        .top-header { position: fixed; top: 15px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        .logo-3d-mini { 
            width: 50px; height: 50px; background: var(--orange-floy); border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 5px 15px rgba(255, 122, 26, 0.5); 
        }
        .logo-3d-mini span { color: black; font-weight: 900; font-size: 14px; }

        /* Barre d'interaction à droite */
        .side-bar { position: absolute; right: 10px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .action-btn i { font-size: 28px; margin-bottom: 5px; }
        .action-btn span { font-size: 12px; font-weight: bold; }
        .btn-active { color: var(--orange-floy) !important; }

        /* Infos de la vidéo en bas à gauche */
        .video-info { position: absolute; bottom: 90px; left: 15px; width: 75%; }
        .video-info h3 { margin: 0; font-size: 16px; color: white; }
        .video-info p { margin: 5px 0; font-size: 14px; color: #ccc; }

        /* Barre de navigation basse */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.9); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { color: #888; text-decoration: none; font-size: 24px; transition: 0.3s; }
        .nav-item.active { color: var(--orange-floy); }
        .upload-btn { background: white; color: black; padding: 5px 15px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="logo-3d-mini"><span>Floy</span></div>
    </div>

    <div class="video-container">
        <div class="video-slide">
            <div style="color: #444;">[ Vidéo en cours de chargement... ]</div>
            <div class="video-info">
                <h3>@arlein_dev</h3>
                <p>Bienvenue sur Floy ! Ma première vidéo. #orange #future</p>
            </div>
            <div class="side-bar">
                <button class="action-btn" onclick="toggleLike(this)"><i>❤️</i><span>1.2k</span></button>
                <button class="action-btn"><i>💬</i><span>45</span></button>
                <button class="action-btn"><i>↪️</i><span>Partager</span></button>
            </div>
        </div>

        <div class="video-slide">
            <div style="color: #444;">[ Vidéo suivante... ]</div>
            <div class="video-info">
                <h3>@floy_official</h3>
                <p>Découvrez la puissance de l'orange. 🚀</p>
            </div>
            <div class="side-bar">
                <button class="action-btn" onclick="toggleLike(this)"><i>❤️</i><span>850</span></button>
                <button class="action-btn"><i>💬</i><span>12</span></button>
                <button class="action-btn"><i>↪️</i><span>Partager</span></button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="feed.html" class="nav-item active">🏠</a>
        <a href="explore.html" class="nav-item">🔍</a>
        <a href="upload.html" class="nav-item upload-btn">+</a>
        <a href="message.html" class="nav-item">💬</a>
        <a href="profile.html" class="nav-item">👤</a>
    </nav>

    <script>
        function toggleLike(btn) {
            btn.classList.toggle('btn-active');
            let icon = btn.querySelector('i');
            if(btn.classList.contains('btn-active')) {
                icon.style.color = "#FF7A1A";
            } else {
                icon.style.color = "white";
            }
        }
    </script>

</body>
</html>
