<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Feed Animé</title>
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; --blanc: #fff; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); color: var(--blanc); font-family: sans-serif; overflow: hidden; }

        /* --- HEADER & NAV (Simplifié pour focus sur animations) --- */
        .header-top { position: fixed; top: 0; width: 100%; z-index: 100; padding: 20px 0; display: flex; justify-content: center; gap: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .tab { opacity: 0.6; font-weight: bold; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--orange-floy); }

        /* --- INTERFACE LATÉRALE --- */
        .side-bar { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        
        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; }
        .main-emoji { font-size: 40px; transition: 0.2s; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }

        /* --- BARRE DE RÉACTIONS --- */
        .reaction-bar {
            position: absolute; right: 60px; background: rgba(20,20,20,0.95); 
            padding: 12px; border-radius: 35px; display: none; gap: 15px; 
            border: 1px solid var(--orange-floy); box-shadow: 0 0 20px rgba(255,122,26,0.3);
        }
        .reaction-bar span { font-size: 30px; transition: 0.3s; cursor: pointer; }
        .reaction-bar span:hover { transform: scale(1.4); }

        /* --- LES ANIMATIONS INTELLIGENTES --- */
        
        /* 1. Haha : Saute et tourne */
        @keyframes anim-haha {
            0%, 100% { transform: translateY(0) rotate(0); }
            25% { transform: translateY(-15px) rotate(-10deg); }
            75% { transform: translateY(-15px) rotate(10deg); }
        }
        .react-haha { animation: anim-haha 0.5s ease-in-out 3; }

        /* 2. Angry : Tremblement rapide */
        @keyframes anim-angry {
            0% { transform: translate(0,0); }
            25% { transform: translate(-3px, 2px); }
            50% { transform: translate(3px, -2px); }
            75% { transform: translate(-3px, -2px); }
            100% { transform: translate(0,0); }
        }
        .react-angry { animation: anim-angry 0.1s infinite; color: #ff4d4d; }

        /* 3. Feu : Pulsation lumineuse */
        @keyframes anim-fire {
            0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 5px orange); }
            50% { transform: scale(1.2); filter: brightness(1.5) drop-shadow(0 0 15px var(--orange-floy)); }
        }
        .react-fire { animation: anim-fire 0.6s infinite; }

        /* 4. Coeur : Battement */
        @keyframes anim-heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .react-heart { animation: anim-heart 0.4s ease-out; }

        /* --- NAVIGATION BASSE --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .btn-plus { background: var(--orange-floy); width: 50px; height: 35px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 22px; box-shadow: 0 0 10px var(--orange-floy); }
    </style>
</head>
<body>

    <header class="header-top">
        <span class="tab">Suivi</span>
        <span class="tab active">Pour toi</span>
    </header>

    <div class="side-bar">
        <div class="action-item">
            <div class="reaction-bar" id="reactBar">
                <span onclick="applyReact('😂', 'react-haha')">😂</span>
                <span onclick="applyReact('❤️', 'react-heart')">❤️</span>
                <span onclick="applyReact('🔥', 'react-fire')">🔥</span>
                <span onclick="applyReact('😠', 'react-angry')">😠</span>
                <span onclick="applyReact('🤮', '')">🤮</span>
            </div>
            
            <div class="main-emoji" id="displayEmoji" 
                 onclick="simpleLike()"
                 onmousedown="startLongPress()" onmouseup="endLongPress()"
                 ontouchstart="startLongPress()" ontouchend="endLongPress()">🤍</div>
            <span style="font-size: 12px; font-weight: bold;">150K</span>
        </div>

        <div class="action-item">
            <span style="font-size:32px">💬</span>
            <span style="font-size:12px">856</span>
        </div>
    </div>

    <nav class="nav-bar">
        <span style="font-size:24px">🏠</span>
        <span style="font-size:24px; color:#555">🔍</span>
        <div class="btn-plus">+</div>
        <span style="font-size:24px; color:#555">✉️</span>
        <span style="font-size:24px; color:#555">👤</span>
    </nav>

    <script>
        let pressTimer;
        let isLiked = false;
        const displayEmoji = document.getElementById('displayEmoji');
        const reactBar = document.getElementById('reactBar');

        // 1. Like simple (clic rapide)
        function simpleLike() {
            if (!isLiked) {
                applyReact('❤️', 'react-heart');
            } else {
                displayEmoji.innerText = '🤍';
                displayEmoji.className = 'main-emoji';
                isLiked = false;
            }
        }

        // 2. Appliquer une réaction avec son animation spécifique
        function applyReact(emoji, animClass) {
            displayEmoji.innerText = emoji;
            displayEmoji.className = 'main-emoji ' + animClass; // Ajoute l'animation
            reactBar.style.display = 'none';
            isLiked = true;

            // Stop l'animation après 2s pour le rire pour ne pas fatiguer l'oeil
            if (animClass === 'react-haha') {
                setTimeout(() => { displayEmoji.classList.remove('react-haha'); }, 2000);
            }
        }

        // 3. Gestion de l'appui long pour ouvrir la barre
        function startLongPress() {
            pressTimer = setTimeout(() => {
                reactBar.style.display = 'flex';
            }, 500);
        }

        function endLongPress() {
            clearTimeout(pressTimer);
        }

        // Fermer la barre si on clique ailleurs
        window.onclick = function(event) {
            if (!event.target.closest('.action-item')) {
                reactBar.style.display = 'none';
            }
        }
    </script>
</body>
</html>
