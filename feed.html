<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Floy Feed</title>
</head>
<body>
    <div class="video-feed">
        <div class="video-card">
            <h2 style="color: grey;">Vidéo en chargement...</h2>
            <div class="side-actions">
                <button class="action-btn like">❤️</button>
                <button class="action-btn">💬</button>
                <button class="action-btn">🔗</button>
            </div>
            <div class="video-info">
                <h3>@Floy_Creator</h3>
                <p>Bienvenue sur le futur de la vidéo ! #Floy #Neon</p>
            </div>
        </div>

        <div class="video-card" style="background: #050505;">
            <h2 style="color: grey;">Deuxième vidéo</h2>
            <div class="side-actions">
                <button class="action-btn like">❤️</button>
                <button class="action-btn">💬</button>
            </div>
        </div>
    </div>
</body>
</html>
