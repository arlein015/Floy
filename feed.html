<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLOY - Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root {
        --floy-violet: #8a2be2;
    }

    body {
        margin: 0;
        background-color: #000;
        color: white;
        font-family: 'Poppins', sans-serif;
        height: 100vh;
        overflow: hidden;
    }

    /* Container plein écran */
    .feed-container {
        position: relative;
        height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
    }

    /* Actions à droite (Like, Com, Share) */
    .action-bar {
        position: absolute;
        right: 15px;
        bottom: 120px; /* Aligné au-dessus de la nav */
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        z-index: 10;
    }

    .action-item {
        text-align: center;
        cursor: pointer;
    }

    .action-item i {
        font-size: 28px;
        display: block;
        margin-bottom: 2px;
    }

    .action-item span {
        font-size: 11px;
        font-weight: 600;
    }

    /* Barre de Navigation Basse */
    .bottom-nav {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 70px;
        background: #000;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding-bottom: env(safe-area-inset-bottom); /* Pour mobile */
        border-top: 0.5px solid #111;
    }

    .nav-icon {
        color: var(--floy-violet); /* Tes icônes violettes */
        font-size: 22px;
        cursor: pointer;
    }

    /* Bouton Plus central blanc */
    .plus-icon {
        background: white;
        color: black;
        padding: 6px 14px;
        border-radius: 10px;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Infos utilisateur en bas à gauche */
    .video-info {
        position: absolute;
        left: 15px;
        bottom: 90px;
        z-index: 10;
        text-align: left;
    }

    .badge-verified {
        color: #1d75bd; /* Bleu officiel */
        font-size: 14px;
        margin-left: 5px;
    }
</style>
</head>
<body>

    <div class="feed-container">
        <div class="video-wrapper">
            <p style="color: #444;">[ Vidéo en lecture ]</p>

            <div class="action-bar">
                <div class="action-item" onclick="toggleLike(this)">
                    <i class="fas fa-heart"></i>
                    <span id="like-count">12.5k</span>
                </div>
                <div class="action-item">
                    <i class="fas fa-comment-dots"></i>
                    <span>850</span>
                </div>
                <div class="action-item" onclick="toggleSave(this)">
                    <i class="fas fa-bookmark"></i>
                    <span>Enregistrer</span>
                </div>
                <div class="action-item" onclick="openShare()">
                    <i class="fas fa-share"></i>
                    <span>Partager</span>
                </div>
                <div class="disc-container">
                    <div class="disc-icon"></div>
                </div>
            </div>

            <div class="video-info">
                <div class="user-name">@createur_floy <i class="fas fa-check-circle badge-verified"></i></div>
                <div class="description">Test de l'animation et du partage sur FLOY ! 🚀</div>
            </div>
        </div>

        <div id="shareModal" class="share-modal">
            <div class="share-header">Partager via</div>
            <div class="share-grid">
                <div class="share-option" onclick="shareTo('whatsapp')"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></div>
                <div class="share-option" onclick="shareTo('messenger')"><i class="fab fa-facebook-messenger"></i><span>Messenger</span></div>
                <div class="share-option" onclick="shareTo('facebook')"><i class="fab fa-facebook"></i><span>Facebook</span></div>
                <div class="share-option" onclick="copyLink()"><i class="fas fa-link"></i><span>Lien</span></div>
            </div>
            <div class="close-share" onclick="closeShare()">Annuler</div>
        </div>

        <nav class="bottom-nav">
            <i class="fas fa-home nav-icon"></i>
            <i class="fas fa-search nav-icon"></i>
            <div class="plus-icon"><i class="fas fa-plus"></i></div>
            <i class="fas fa-comment nav-icon"></i>
            <i class="fas fa-user nav-icon"></i>
        </nav>
    </div>

    <script>
        // Fonction Like
        function toggleLike(element) {
            element.classList.toggle('liked');
            let count = document.getElementById('like-count');
            if(element.classList.contains('liked')) {
                count.innerText = "12.6k";
            } else {
                count.innerText = "12.5k";
            }
        }

        // Fonction Enregistrer sur le profil
       function toggleSave(element) {
    element.classList.toggle('saved');
    
    // On crée un objet pour la vidéo actuelle
    const videoData = {
        id: Date.now(),
        thumbnail: "https://via.placeholder.com/150/8a2be2/ffffff?text=Video", // Image temporaire
        views: "1.2k"
    };

    if(element.classList.contains('saved')) {
        // Récupérer la liste existante ou en créer une nouvelle
        let savedVideos = JSON.parse(localStorage.getItem('threndly_saved')) || [];
        savedVideos.push(videoData);
        localStorage.setItem('threndly_saved', JSON.stringify(savedVideos));
        
        alert("Vidéo enregistrée dans votre profil !");
    }
}

        // Gestion du Partage
        function openShare() { document.getElementById('shareModal').classList.add('active'); }
        function closeShare() { document.getElementById('shareModal').classList.remove('active'); }

        function shareTo(platform) {
            const url = window.location.href;
            let shareUrl = "";
            if(platform === 'whatsapp') shareUrl = `https://wa.me/?text=Regarde cette vidéo sur FLOY : ${url}`;
            if(platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
            if(platform === 'messenger') shareUrl = `fb-messenger://share/?link=${url}`;
            
            window.open(shareUrl, '_blank');
            closeShare();
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Lien copié dans le presse-papier !");
            closeShare();
        }
    </script>
</body>
</html>
