<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Feed</title>
    <style>
        :root { --orange-floy: #FF7A1A; --noir: #000; --blanc: #fff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--noir); color: var(--blanc); font-family: sans-serif; overflow: hidden; }

        /* --- INTERFACE DE BASE --- */
        .video-slide { width: 100%; height: 100vh; position: relative; background: #050505; display: flex; align-items: center; justify-content: center; }
        
        /* Barre Latérale */
        .side-bar { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        
        /* Bouton Suivre Dynamique */
        .avatar-box { position: relative; }
        .user-pic { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--blanc); }
        .btn-follow { 
            position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
            background: var(--orange-floy); border: none; width: 22px; height: 22px; 
            border-radius: 50%; color: white; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .btn-follow.active { background: #444; transform: translateX(-50%) scale(0); opacity: 0; }

        .action-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .svg-icon { width: 35px; height: 35px; fill: white; transition: 0.3s; }
        .action-item:hover .svg-icon { fill: var(--orange-floy); }

        /* --- TIROIR DE COMMENTAIRES (MONTE EN HAUT) --- */
        .comment-section {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: #121212; border-radius: 20px 20px 0 0; z-index: 200;
            transition: bottom 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
            padding: 20px; box-sizing: border-box;
        }
        .comment-section.open { bottom: 0; }
        .comment-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .close-comments { font-size: 24px; cursor: pointer; }

        /* --- POPUP PARTAGER --- */
        #shareToast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--orange-floy); color: black; padding: 10px 20px;
            border-radius: 30px; font-weight: bold; display: none; z-index: 300;
        }
    </style>
</head>
<body>

    <div id="shareToast">Lien copié ! 🔗</div>

    <div class="video-slide">
        <div class="side-bar">
            <div class="avatar-box">
                <img src="https://i.pravatar.cc/100?u=9" class="user-pic">
                <button class="btn-follow" id="followBtn" onclick="followUser()">+</button>
            </div>

            <div class="action-item" onclick="toggleComments()">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span style="font-size:12px">856</span>
            </div>

            <div class="action-item" onclick="shareVideo()">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
                <span style="font-size:12px">Partager</span>
            </div>
        </div>
    </div>

    <div class="comment-section" id="commentBox">
        <div class="comment-header">
            <span>856 commentaires</span>
            <span class="close-comments" onclick="toggleComments()">✕</span>
        </div>
        <div style="margin-top:20px; color:#888;">
            <p><b>@Huarache:</b> Incroyable cette interface ! 🔥</p>
            <p><b>@User2026:</b> Floy va tout casser.</p>
        </div>
    </div>

    <script>
        // Fonction de suivi (Bouton +)
        function followUser() {
            const btn = document.getElementById('followBtn');
            btn.classList.add('active'); // Fait disparaître le bouton avec animation
            // Optionnel: envoyer une notification ici
        }

        // Fonction Tiroir Commentaires
        function toggleComments() {
            document.getElementById('commentBox').classList.toggle('open');
        }

        // Fonction Partager
        function shareVideo() {
            const dummyLink = "https://floy.app/video/123";
            navigator.clipboard.writeText(dummyLink);
            
            const toast = document.getElementById('shareToast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
