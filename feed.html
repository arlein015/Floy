<style>
    /* Style du bouton Pouce */
    .like-btn { 
        background: rgba(255,255,255,0.1); 
        border: none; 
        width: 60px; 
        height: 60px; 
        border-radius: 50%; 
        cursor: pointer; 
        transition: all 0.3s ease; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        -webkit-tap-highlight-color: transparent;
    }

    /* Le SVG du pouce (contour par défaut) */
    .thumb-icon {
        width: 30px;
        height: 30px;
        fill: none; /* Vide au début */
        stroke: white; /* Contour blanc */
        stroke-width: 2;
        transition: all 0.3s ease;
    }

    /* État ACTIF (Simple clic) */
    .like-btn.active-like { 
        background: rgba(0, 191, 255, 0.2); 
        box-shadow: 0 0 20px rgba(0, 191, 255, 0.4);
    }

    .like-btn.active-like .thumb-icon {
        fill: var(--bleu-floy); /* Se remplit de bleu */
        stroke: var(--bleu-floy); /* Contour devient bleu */
        transform: scale(1.2) rotate(-10deg); /* Petit effet de rebond */
    }
</style>

<div class="action-container">
    <div class="reaction-bar" id="reactionBar">
        </div>

    <button class="like-btn" id="likeBtn" 
            onclick="toggleSimpleLike()" 
            onmousedown="startPress()" 
            onmouseup="endPress()" 
            ontouchstart="startPress()" 
            ontouchend="endPress()">
        <svg class="thumb-icon" viewBox="0 0 24 24" id="thumbSvg">
            <path d="M23.5 10c0-1.1-.9-2-2-2h-6.1l.9-4.3c.1-.4 0-.8-.2-1.1-.2-.3-.5-.6-.9-.6H13c-.4 0-.8.2-1.1.5L7.4 8H2c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h17.1c.9 0 1.7-.6 1.9-1.5l2.5-9c.1-.1.1-.3.1-.5z"/>
        </svg>
    </button>
    <span id="likeCount" style="font-size: 12px; margin-top: 5px; font-weight: bold;">1.4k</span>
</div>

<script>
    function toggleSimpleLike() {
        if (!checkAuth()) return; // Vérifie si l'utilisateur est connecté

        const btn = document.getElementById('likeBtn');
        const svg = document.getElementById('thumbSvg');

        if (currentReaction === 'like') {
            // Si déjà bleu, on remet à vide
            btn.classList.remove('active-like');
            svg.style.fill = "none";
            svg.style.stroke = "white";
            currentReaction = 'none';
        } else {
            // Si vide, on le rend bleu
            btn.className = 'like-btn active-like';
            svg.style.fill = "#00BFFF";
            svg.style.stroke = "#00BFFF";
            currentReaction = 'like';
            
            // Petit effet sonore ou vibration si tu veux plus tard
        }
    }

    // Garde tes fonctions selectReaction pour les emojis (haha, feu, vomi, etc.)
    // Elles changeront le contenu du SVG par l'emoji choisi comme on l'a fait avant !
</script>
