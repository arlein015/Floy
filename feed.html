<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy Feed</title>
    <style>
        /* DESIGN OFFICIEL FLOY */
        :root {
            --fond: #000000;
            --violet: #8A2BE2;
            --bleu: #00BFFF;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--fond);
            color: white;
            font-family: sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .video-feed {
            height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
        }

        .video-card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-bottom: 1px solid #111;
        }

        /* Barre d'actions style TikTok */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 150px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        .action-btn {
            background: rgba(40, 40, 40, 0.5);
            border: none;
            color: white;
            font-size: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .action-btn.like:active {
            color: var(--violet);
            transform: scale(1.2);
        }

        /* Infos vidéo en bas */
        .video-info {
            position: absolute;
            left: 15px;
            bottom: 100px;
            z-index: 10;
        }

        .video-info h3 { margin: 0; color: var(--bleu); font-size: 18px; }
        .video-info p { margin: 5px 0 0; font-size: 14px; color: #ccc; }

        /* Navigation du bas */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
        }

        .nav-item { color: white; text-decoration: none; font-size: 24px; }
        .plus-btn { background: white; color: black; padding: 5px 15px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="video-feed">
        <div class="video-card">
            <div style="color: #444; text-align: center;">
                <div style="font-size: 50px;">🎬</div>
                <p>Vidéo en chargement...</p>
            </div>
            
            <div class="side-actions">
                <button class="action-btn" onclick="this.style.color='#8A2BE2'">❤️</button>
                <button class="action-btn">💬</button>
                <button class="action-btn">🔗</button>
            </div>

            <div class="video-info">
                <h3>@Floy_Creator</h3>
                <p>Bienvenue sur le futur de la vidéo ! #Floy #Neon</p>
            </div>
        </div>

        <div class="video-card">
             <div style="color: #444; text-align: center;">
                <div style="font-size: 50px;">🎞️</div>
                <p>Deuxième vidéo</p>
            </div>
            
            <div class="side-actions">
                <button class="action-btn" onclick="this.style.color='#8A2BE2'">❤️</button>
                <button class="action-btn">💬</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">🏠</a>
        <a href="explore.html" class="nav-item">🔍</a>
        <a href="upload.html" class="nav-item plus-btn">+</a>
        <a href="message.html" class="nav-item">💬</a>
        <a href="profile.html" class="nav-item">👤</a>
    </nav>

</body>
</html>
