<div style="display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; text-align: center;">
    <div><b id="s-posts" style="display:block;">0</b><span style="color:#888; font-size:12px;">Posts</span></div>
    <div><b id="s-followers" style="display:block;">0</b><span style="color:#888; font-size:12px;">Abonnés</span></div>
    <div><b id="s-following" style="display:block;">0</b><span style="color:#888; font-size:12px;">Abonnements</span></div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadStats = (uid) => {
        onSnapshot(query(collection(db, "posts"), where("userId", "==", uid)), s => document.getElementById('s-posts').innerText = s.size);
        onSnapshot(query(collection(db, "followers"), where("followingId", "==", uid)), s => document.getElementById('s-followers').innerText = s.size);
        onSnapshot(query(collection(db, "followers"), where("followerId", "==", uid)), s => document.getElementById('s-following').innerText = s.size);
    };
</script>
