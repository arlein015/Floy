<div class="border-t border-gray-200 mt-2">
    <div class="flex justify-center space-x-12 uppercase tracking-widest text-xs font-semibold">
        <div class="border-t border-black py-4 flex items-center cursor-pointer">
            <svg class="w-3 h-3 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
            </svg>
            Publications
        </div>
        <div class="py-4 flex items-center text-gray-400 cursor-pointer hover:text-black transition">
            <svg class="w-3 h-3 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path>
            </svg>
            Reels
        </div>
    </div>
</div>

<div class="grid grid-cols-3 gap-1 md:gap-8">
    {% for post in posts %}
    <div class="relative group cursor-pointer aspect-square overflow-hidden bg-gray-100">
        <img src="{{ post.image_url }}" 
             alt="Post de {{ user.username }}" 
             class="w-full h-full object-cover transition duration-300 group-hover:brightness-75">
        
        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-200 text-white font-bold space-x-6 bg-black/20">
            <div class="flex items-center">
                <svg class="w-6 h-6 mr-1" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"></path>
                </svg>
                <span>{{ post.likes_count }}</span>
            </div>
            <div class="flex items-center">
                <svg class="w-6 h-6 mr-1" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"></path>
                </svg>
                <span>{{ post.comments_count }}</span>
            </div>
        </div>

        {% if post.is_boosted %}
        <div class="absolute top-2 right-2 bg-yellow-400 text-black text-[10px] px-1.5 py-0.5 rounded font-bold shadow-sm">
            BOOSTÉ
        </div>
        {% endif %}
    </div>
    {% endfor %}
</div>

{% if not posts %}
<div class="text-center py-20">
    <div class="flex justify-center mb-4 text-gray-300">
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
            <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
    </div>
    <p class="text-xl font-light text-gray-500">Aucune publication pour le moment</p>
</div>
{% endif %}
