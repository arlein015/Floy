<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Threndly - Commentaires</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .comm-header { padding: 20px; border-bottom: 1px solid #111; text-align: center; }
        .comm-list { padding: 15px; height: calc(100vh - 160px); overflow-y: auto; }
        .comm-item { display: flex; gap: 12px; margin-bottom: 20px; }
        .user-pic { width: 40px; height: 40px; border-radius: 50%; background: var(--threndly-blue); }
        .comm-txt b { font-size: 14px; }
        .comm-txt p { margin: 2px 0; font-size: 13px; color: #ccc; }
    </style>
</head>
<body>
    <div class="comm-header">Commentaires (850)</div>
    <div class="comm-list">
        <div class="comm-item">
            <div class="user-pic"></div>
            <div class="comm-txt"><b>Arlein <i class="fas fa-check-circle badge-verified"></i></b><p>Toujours au top ! 🔥</p></div>
        </div>
    </div>
</body>
</html>
