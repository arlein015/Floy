<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commentaires - Floy</title>
    <style>
        :root { --fond: #0b0b0b; --violet: #8A2BE2; }
        body { background: var(--fond); color: white; font-family: sans-serif; margin: 0; }
        .comment-header { padding: 15px; text-align: center; border-bottom: 1px solid #222; font-weight: bold; }
        .comment-list { height: calc(100vh - 120px); overflow-y: auto; padding: 15px; }
        .comment-item { display: flex; gap: 10px; margin-bottom: 20px; }
        .avatar-mini { width: 35px; height: 35px; border-radius: 50%; background: #333; flex-shrink: 0; }
        .comment-content h5 { margin: 0; color: #888; font-size: 12px; }
        .comment-content p { margin: 5px 0; font-size: 14px; }
        .comment-input-area { position: fixed; bottom: 0; width: 100%; padding: 10px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: none; color: white; padding: 10px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>
    <div class="comment-header">256 Commentaires</div>
    <div class="comment-list">
        <div class="comment-item">
            <div class="avatar-mini" style="background: var(--violet);"></div>
            <div class="comment-content">
                <h5>@fan_de_floy</h5>
                <p>Incroyable cette vidéo ! Le mode néon est trop stylé 🔥</p>
            </div>
        </div>
    </div>
    <div class="comment-input-area">
        <input type="text" placeholder="Ajouter un commentaire...">
    </div>
</body>
</html>
