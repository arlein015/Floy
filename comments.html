<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>Commentaires - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --bordure: #262626; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER FIXE */
        .header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid var(--bordure); background: var(--noir); z-index: 10; }
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; }

        /* ZONE DE DÉFILEMENT */
        .comments-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .comment-item { display: flex; gap: 12px; align-items: flex-start; }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: #333; border: 1.5px solid var(--orange); flex-shrink: 0; }
        .comment-bubble { background: var(--gris); padding: 12px 15px; border-radius: 18px; max-width: 75%; border: 1px solid var(--bordure); }
        .user-name { font-size: 13px; font-weight: bold; color: var(--orange); margin-bottom: 4px; display: block; }
        .comment-text { font-size: 14px; line-height: 1.4; color: #eee; }

        /* BARRE DE SAISIE FIXÉE EN BAS */
        .input-container { padding: 15px 20px; background: var(--noir); border-top: 1px solid var(--bordure); display: flex; align-items: center; gap: 12px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .comment-input { flex: 1; background: var(--gris); border: 1px solid var(--bordure); border-radius: 25px; padding: 12px 18px; color: white; font-size: 14px; outline: none; }
        .comment-input:focus { border-color: var(--orange); }
        .send-btn { background: none; border: none; color: var(--orange); font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='./index.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <span style="font-weight: bold; font-size: 18px;">Commentaires</span>
    </div>

    <div class="comments-list" id="commentsBox">
        <div class="comment-item">
            <div class="comment-avatar"></div>
            <div class="comment-bubble">
                <span class="user-name">Arlein_Dev</span>
                <span class="comment-text">N'oubliez pas de booster vos posts pour plus de visibilité ! ⚡🟠</span>
            </div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="newComment" class="comment-input" placeholder="Ton message...">
        <button class="send-btn" onclick="addComment()">Envoyer</button>
    </div>

    <script>
        function addComment() {
            const input = document.getElementById('newComment');
            const box = document.getElementById('commentsBox');
            
            if(input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <div class="comment-avatar"></div>
                    <div class="comment-bubble">
                        <span class="user-name">Moi</span>
                        <span class="comment-text">${input.value}</span>
                    </div>
                `;
                box.appendChild(div);
                input.value = "";
                box.scrollTop = box.scrollHeight;
            }
        }
    </script>

</body>
</html>
