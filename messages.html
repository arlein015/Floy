<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Floy - Messages & Navigation</title>
    <script src="db.js"></script>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --nav-h: 70px; }
        * { box-sizing: border-box; }
        
        body { 
            background: var(--noir); color: white; font-family: -apple-system, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* HEADER */
        .header { padding: 15px 20px 5px; flex-shrink: 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .search-container { background: #1a1a1a; border-radius: 12px; padding: 10px; display: flex; align-items: center; }
        .search-container input { background: transparent; border: none; color: white; margin-left: 10px; outline: none; width: 100%; }

        /* STORY UNIQUE (Logique de remplacement) */
        .story-bar { display: flex; gap: 15px; padding: 15px 20px; border-bottom: 1px solid #111; overflow-x: auto; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; cursor: pointer; }
        .story-circle { 
            width: 65px; height: 65px; border-radius: 50%; padding: 2px; 
            border: 2px solid #444; background: var(--noir);
        }
        .has-story { border-color: var(--orange) !important; }
        .story-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .plus-badge { 
            position: absolute; bottom: 18px; right: 0; background: var(--orange); 
            width: 20px; height: 20px; border-radius: 50%; border: 2px solid black; 
            display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 14px;
        }

        /* LISTE CHAT */
        .chat-list { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; text-decoration: none; color: white; border-bottom: 0.5px solid #0a0a0a; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; background: #222; }
        .chat-info { flex: 1; min-width: 0; }
        .user-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 5px; }
        .last-msg { font-size: 14px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* BARRE DE NAVIGATION (FIXE EN BAS) */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); 
            background: #050505; border-top: 1px solid #1a1a1a; 
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px;
        }
        .nav-item { color: #555; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        .nav-item.active { color: white; }
        .nav-item svg { margin-bottom: 4px; }

        /* BOUTON GROUPE */
        .fab { 
            position: fixed; bottom: 90px; right: 20px; background: var(--orange); 
            width: 55px; height: 55px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <h1 style="margin:0">Messages</h1>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Rechercher..." oninput="refreshUI(this.value)">
        </div>
    </div>

    <div class="story-bar">
        <div class="story-item" onclick="document.getElementById('stIn').click()">
            <div id="myStoryCircle" class="story-circle">
                <img id="myStoryImg" src="ma_photo.jpg" class="story-img" onerror="this.src='https://ui-avatars.com/api/?name=Moi&background=333&color=fff'">
                <div class="plus-badge">+</div>
            </div>
            <span class="story-name">Ta story</span>
        </div>
        <input type="file" id="stIn" hidden accept="image/*" onchange="updateMyStory(this)">
        
        <div class="story-item"><div class="story-circle has-story"><img src="https://i.pravatar.cc/150?u=9" class="story-img"></div><span class="story-name">Sarah</span></div>
    </div>

    <div class="chat-list" id="chatList"></div>

    <button class="fab" onclick="showGroupMenu()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="black"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    </button>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            Accueil
        </a>
        <a href="explorer.html" class="nav-item">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            Explorer
        </a>
        <a href="messages.html" class="nav-item active">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            Messages
        </a>
        <a href="profil.html" class="nav-item">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            Profil
        </a>
    </nav>

    <script>
        const baseContacts = [
            { id: "u1", name: "Alexandre", img: "https://i.pravatar.cc/150?u=1" },
            { id: "u2", name: "Julie Martin", img: "https://i.pravatar.cc/150?u=2" }
        ];

        // 1. LOGIQUE STORY : Remplace l'image et ajoute le cercle orange
        function updateMyStory(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('myStoryImg').src = e.target.result;
                    document.getElementById('myStoryCircle').classList.add('has-story');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 2. CRÉATION GROUPE MULTI-MEMBRES
        function showGroupMenu() {
            const name = prompt("Nom du groupe :");
            if (!name) return;
            
            const participants = prompt("Inviter qui ? (Ex: Alexandre, Julie)");
            if (participants) {
                const groups = JSON.parse(localStorage.getItem('floy_groups') || "[]");
                const newG = { 
                    id: "grp_" + Date.now(), 
                    name: name, 
                    isGroup: true, 
                    members: participants,
                    img: "https://ui-avatars.com/api/?name=" + name + "&background=FF7A1A&color=000" 
                };
                groups.unshift(newG);
                localStorage.setItem('floy_groups', JSON.stringify(groups));
                refreshUI();
            }
        }

        // 3. AFFICHAGE DES MESSAGES
        async function refreshUI(query = "") {
            const container = document.getElementById('chatList');
            const groups = JSON.parse(localStorage.getItem('floy_groups') || "[]");
            const all = [...groups, ...baseContacts];
            
            let html = "";
            for (let c of all) {
                if (query && !c.name.toLowerCase().includes(query.toLowerCase())) continue;
                
                let lastText = c.isGroup ? "Groupe avec : " + c.members : "Démarrer un chat";
                try {
                    const msgs = await DBModule.getMessages(c.id);
                    if (msgs.length > 0) lastText = msgs[msgs.length - 1].content;
                } catch(e) {}

                html += `
                    <a href="chat.html?id=${c.id}" class="chat-item">
                        <img src="${c.img}" class="avatar">
                        <div class="chat-info">
                            <div class="user-name">${c.name}</div>
                            <div class="last-msg">${lastText}</div>
                        </div>
                    </a>`;
            }
            container.innerHTML = html;
        }

        window.onload = refreshUI;
    </script>
</body>
</html>
