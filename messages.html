<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Floy - Messages Permanents</title>
    <script src="db.js"></script>
    <style>
        :root { --orange: #FF7A1A; --noir: #000; --gris: #121212; --nav-h: 70px; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { padding: 15px 20px 5px; flex-shrink: 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .search-container { background: #1a1a1a; border-radius: 12px; padding: 10px; display: flex; align-items: center; }
        .search-container input { background: transparent; border: none; color: white; margin-left: 10px; outline: none; width: 100%; }

        /* STORY PERMANENTE */
        .story-bar { display: flex; gap: 15px; padding: 15px 20px; border-bottom: 1px solid #111; overflow-x: auto; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; cursor: pointer; }
        .story-circle { width: 65px; height: 65px; border-radius: 50%; padding: 2px; border: 2px solid #444; transition: 0.3s; }
        .story-circle.active { border-color: var(--orange); }
        .story-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #222; }
        .plus-badge { position: absolute; bottom: 18px; right: 0; background: var(--orange); width: 20px; height: 20px; border-radius: 50%; border: 2px solid black; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }

        /* LISTE CHAT */
        .chat-list { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .chat-item { display: flex; align-items: center; padding: 15px 20px; text-decoration: none; color: white; border-bottom: 0.5px solid #0a0a0a; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; background: #222; object-fit: cover; }
        .chat-info { flex: 1; min-width: 0; }
        .user-name { font-weight: bold; font-size: 16px; }
        .last-msg { font-size: 14px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: #050505; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { color: #555; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        .nav-item.active { color: white; }

        .fab { position: fixed; bottom: 90px; right: 20px; background: var(--orange); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top"><h1>Messages</h1></div>
        <div class="search-container"><input type="text" placeholder="Rechercher..." oninput="refreshUI(this.value)"></div>
    </div>

    <div class="story-bar">
        <div class="story-item" onclick="document.getElementById('stIn').click()">
            <div id="myStoryCircle" class="story-circle">
                <img id="myStoryImg" src="ma_photo.jpg" class="story-img" onerror="this.src='https://ui-avatars.com/api/?name=Me'">
                <div class="plus-badge">+</div>
            </div>
            <span class="story-name">Ta story</span>
        </div>
        <input type="file" id="stIn" hidden accept="image/*" onchange="saveStory(this)">
    </div>

    <div class="chat-list" id="chatList"></div>

    <button class="fab" onclick="createGroup()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="black"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    </button>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">Accueil</a>
        <a href="messages.html" class="nav-item active">Messages</a>
        <a href="profil.html" class="nav-item">Profil</a>
    </nav>

    <script>
        const baseContacts = [
            { id: "u1", name: "Alexandre", img: "https://i.pravatar.cc/150?u=1" },
            { id: "u2", name: "Julie Martin", img: "https://i.pravatar.cc/150?u=2" }
        ];

        // --- SAUVEGARDE STORY ---
        function saveStory(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const imgData = e.target.result;
                    document.getElementById('myStoryImg').src = imgData;
                    document.getElementById('myStoryCircle').classList.add('active');
                    // On enregistre l'image et l'état orange
                    localStorage.setItem('user_story_img', imgData);
                    localStorage.setItem('user_story_active', 'true');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // --- CHARGEMENT STORY AU RÉVEIL ---
        function loadStory() {
            const savedImg = localStorage.getItem('user_story_img');
            const isActive = localStorage.getItem('user_story_active');
            if (savedImg) document.getElementById('myStoryImg').src = savedImg;
            if (isActive === 'true') document.getElementById('myStoryCircle').classList.add('active');
        }

        // --- CRÉATION GROUPE ---
        function createGroup() {
            const name = prompt("Nom du groupe :");
            if (!name) return;
            const participants = prompt("Membres (Alex, Julie...) :");
            
            const groups = JSON.parse(localStorage.getItem('floy_groups') || "[]");
            const newG = { id: "grp_" + Date.now(), name: name, isGroup: true, members: participants, img: "https://ui-avatars.com/api/?name="+name+"&background=FF7A1A" };
            groups.unshift(newG);
            localStorage.setItem('floy_groups', JSON.stringify(groups));
            refreshUI();
        }

        async function refreshUI(query = "") {
            const container = document.getElementById('chatList');
            const groups = JSON.parse(localStorage.getItem('floy_groups') || "[]");
            const all = [...groups, ...baseContacts];
            
            let html = "";
            for (let c of all) {
                if (query && !c.name.toLowerCase().includes(query.toLowerCase())) continue;
                let lastText = c.isGroup ? "Membres: " + c.members : "Démarrer un chat";
                try {
                    const msgs = await DBModule.getMessages(c.id);
                    if (msgs.length > 0) lastText = msgs[msgs.length - 1].content;
                } catch(e) {}

                html += `
                    <a href="chat.html?id=${c.id}" class="chat-item">
                        <img src="${c.img}" class="avatar">
                        <div class="chat-info">
                            <div class="user-name">${c.name}</div>
                            <div class="last-msg">${lastText}</div>
                        </div>
                    </a>`;
            }
            container.innerHTML = html;
        }

        window.onload = () => {
            loadStory();
            refreshUI();
        };
    </script>
</body>
</html>
