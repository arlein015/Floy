<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threndly - Créer un compte</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="main-container">
        <div class="signup-card">
            
            <div class="brand-logo-container">
                <div class="brand-logo-icon">T</div>
                <span class="brand-name">THRENDLY</span>
            </div>

            <h1>Créer un compte</h1>
            <p class="subtitle">Inscrivez-vous pour commencer</p>
            
            <form id="signupForm">
                <div class="input-group">
                    <label for="fullname">Nom complet</label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="vous@domaine.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-submit">S'inscrire</button>
            </form>
            
            <p class="footer-text">Déjà un compte ? <a href="index.html">Se connecter</a></p>
        </div>
    </div>
</body>
</html>
