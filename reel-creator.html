<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Créer un Reel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100vh; }

        .header-reel { position: fixed; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .btn-share { background: var(--orange); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; display: none; cursor: pointer;}

        .video-container { width: 100vw; height: 100vh; background: #050505; display: flex; align-items: center; justify-content: center; }
        #preview-vid { width: 100%; height: 100%; object-fit: cover; display: none; }

        .footer-reel { position: fixed; bottom: 80px; width: 100%; padding: 20px; z-index: 100; display: none; }
        textarea { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; resize: none; }

        /* BOTTOM NAV AVEC BRILLANCE */
        .creation-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 1000;}
        .nav-create-item { font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; cursor: pointer; opacity: 0.5; }
        .nav-create-item.active { color: #ffffff; opacity: 1; text-shadow: 0 0 10px white; }
    </style>
</head>
<body>

    <div class="header-reel">
        <i class="fas fa-times" onclick="location.href='index.html'"></i>
        <b>Nouveau Reel</b>
        <button class="btn-share" id="btn-share" onclick="window.uploadReel()">Partager</button>
    </div>

    <div class="video-container" onclick="document.getElementById('file-reel').click()">
        <div id="placeholder" style="text-align:center"><i class="fas fa-video" style="font-size:50px; color:var(--orange)"></i><p>Choisir une vidéo</p></div>
        <video id="preview-vid" loop muted playsinline></video>
    </div>

    <div class="footer-reel" id="caption-box">
        <textarea id="caption" placeholder="Légende du reel..."></textarea>
    </div>

    <input type="file" id="file-reel" accept="video/*" style="display:none" onchange="window.previewReel()">

    <nav class="creation-nav">
        <div class="nav-create-item" onclick="location.href='create.html'">Publier</div>
        <div class="nav-create-item" onclick="location.href='story-creator.html'">Story</div>
        <div class="nav-create-item active">Reel</div>
    </nav>

    <script>
        window.previewReel = () => {
            const file = document.getElementById('file-reel').files[0];
            if(file) {
                const vid = document.getElementById('preview-vid');
                vid.src = URL.createObjectURL(file);
                vid.style.display = 'block';
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('btn-share').style.display = 'block';
                document.getElementById('caption-box').style.display = 'block';
                vid.play();
            }
        };
    </script>
</body>
</html>
