<style>
    .header-wrapper {
        padding: 20px 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        background-color: #000;
    }

    .header-top {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .profile-pic-container {
        position: relative;
        width: 85px;
        height: 85px;
        border-radius: 50%;
        background: linear-gradient(45deg, #FF7A1A, #ff9d4d);
        padding: 3px; /* Effet de bordure orange Floy */
    }

    .profile-pic-container img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #000;
    }

    .user-text-info {
        flex: 1;
    }

    .username-badge-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    #p-username {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        color: #fff;
    }

    #p-email {
        margin: 2px 0;
        font-size: 13px;
        color: #FF7A1A; /* Email en Orange Floy */
        font-weight: 500;
    }

    #p-bio {
        margin-top: 8px;
        font-size: 14px;
        line-height: 1.4;
        color: #efefef;
        white-space: pre-wrap; /* Respecte les retours à la ligne de la bio */
    }

    /* Badge de vérification Floy */
    .verification-badge {
        color: #FF7A1A;
        font-size: 16px;
    }
</style>

<div class="header-wrapper">
    <div class="header-top">
        <div class="profile-pic-container">
            <img id="p-img" src="https://via.placeholder.com/150" alt="Photo de profil">
        </div>
        
        <div class="user-text-info">
            <div class="username-badge-row">
                <h2 id="p-username">Chargement...</h2>
                <div id="badge-container"></div>
            </div>
            <p id="p-email"></p>
        </div>
    </div>

    <div class="header-bio-section">
        <p id="p-bio">Chargement de la biographie...</p>
    </div>
</div>

<script type="module">
    import { auth, db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Fonction pour remplir les données du header
    window.loadHeader = (uid, currentUid) => {
        if (!uid) return;

        const userRef = doc(db, "users", uid);
        
        // Écoute en temps réel des changements du profil
        onSnapshot(userRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // Injection du Nom, Email et Bio
                document.getElementById('p-username').innerText = data.username || "Utilisateur";
                document.getElementById('p-email').innerText = data.email || "";
                document.getElementById('p-bio').innerText = data.bio || "Bienvenue sur mon profil Floy !";
                
                // Photo de profil
                if (data.avatarUrl) {
                    document.getElementById('p-img').src = data.avatarUrl;
                }

                // Affichage du badge si vérifié
                const badgeBox = document.getElementById('badge-container');
                if (data.isVerified) {
                    badgeBox.innerHTML = '<i class="fas fa-check-circle verification-badge"></i>';
                } else {
                    badgeBox.innerHTML = '';
                }
            }
        });
    };
</script>
