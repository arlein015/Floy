<style>
    .profile-header { padding: 20px 15px; color: white; background: #000; }
    .header-top { display: flex; align-items: center; gap: 20px; }
    
    /* Conteneur Photo avec le bouton + */
    .avatar-wrapper { position: relative; width: 85px; height: 85px; cursor: pointer; }
    .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid #262626; }
    .story-plus { 
        position: absolute; bottom: 0; right: 0; background: #0095f6; 
        color: white; border-radius: 50%; width: 24px; height: 24px; 
        display: flex; align-items: center; justify-content: center; 
        border: 2px solid black; font-size: 12px; 
    }

    .btn-row { display: flex; gap: 8px; margin-top: 15px; }
    .btn-f { 
        flex: 1; height: 34px; border: none; border-radius: 8px; 
        font-weight: 600; font-size: 14px; cursor: pointer; 
    }
    .btn-orange { background: #FF7A1A; color: white; }
    .btn-gray { background: #363636; color: white; }
    .icon-settings { font-size: 20px; color: white; cursor: pointer; padding: 5px; }
</style>

<div class="profile-header">
    <div class="header-top">
        <div class="avatar-wrapper" onclick="location.href='add_story.html'">
            <img id="h-avatar" src="https://via.placeholder.com/150" class="avatar-img">
            <div class="story-plus" id="h-plus-icon"><i class="fas fa-plus"></i></div>
        </div>

        <div style="flex: 1;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <h2 id="h-username" style="margin:0; font-size: 20px; font-weight: 400;">...</h2>
                <div id="h-badge"></div>
                <i class="fas fa-cog icon-settings" id="h-settings" onclick="openEditModal()" style="display:none;"></i>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 10px; font-size: 14px;">
                <span><b id="c-posts">0</b> publications</span>
                <span><b id="c-followers">0</b> followers</span>
            </div>
        </div>
    </div>

    <div style="margin-top: 15px;">
        <span id="h-fullname" style="font-weight: 600; font-size: 14px;">...</span>
        <p id="h-bio" style="margin: 3px 0; font-size: 14px;"></p>
    </div>

    <div id="h-btn-zone" class="btn-row"></div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadHeader = (profileId, myId) => {
        onSnapshot(doc(db, "users", profileId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            
            document.getElementById('h-username').innerText = data.username || "user";
            document.getElementById('h-fullname').innerText = data.fullName || "";
            document.getElementById('h-bio').innerText = data.bio || "";
            if(data.avatarUrl) document.getElementById('h-avatar').src = data.avatarUrl;

            // Affichage du Badge
            const badge = document.getElementById('h-badge');
            badge.innerHTML = data.isVerified ? `<i class="fas fa-check-circle" style="color:#FF7A1A;"></i>` : '';

            const btnZone = document.getElementById('h-btn-zone');
            const settingsIcon = document.getElementById('h-settings');
            const plusIcon = document.getElementById('h-plus-icon');

            if (profileId === myId) {
                // MON PROFIL
                settingsIcon.style.display = 'block';
                plusIcon.style.display = 'flex'; // Je peux ajouter une story
                btnZone.innerHTML = `
                    <button onclick="openEditModal()" class="btn-f btn-gray">Modifier le profil</button>
                    <button class="btn-f btn-gray">Partager le profil</button>
                `;
            } else {
                // PROFIL DES AUTRES
                settingsIcon.style.display = 'none';
                plusIcon.style.display = 'none'; // On ne peut pas ajouter de story chez les autres
                btnZone.innerHTML = `
                    <button class="btn-f btn-orange">Suivre</button>
                    <button onclick="openQuickChat('${profileId}')" class="btn-f btn-gray">Contacter</button>
                `;
            }
        });
    };
</script>
