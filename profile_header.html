<style>
    .profile-header { padding: 20px 15px; color: white; background: #000; }
    .header-top { display: flex; align-items: center; gap: 20px; }
    
    /* Photo avec le + Story */
    .avatar-wrapper { position: relative; width: 85px; height: 85px; cursor: pointer; }
    .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid #262626; }
    .story-plus { 
        position: absolute; bottom: 0; right: 0; background: #0095f6; 
        color: white; border-radius: 50%; width: 22px; height: 22px; 
        display: flex; align-items: center; justify-content: center; 
        border: 2px solid black; font-size: 11px; 
    }

    /* Stats et Nom */
    .stats-text { display: flex; gap: 15px; font-size: 13px; margin-top: 5px; }
    .stats-text b { color: white; }
    .stats-text span { color: #aaa; }

    /* Boutons de profil */
    .btn-row { display: flex; gap: 8px; margin-top: 15px; }
    .btn-f { 
        flex: 1; height: 36px; border: none; border-radius: 8px; 
        font-weight: 600; font-size: 14px; cursor: pointer; 
        display: flex; align-items: center; justify-content: center;
    }
    .btn-orange { background: #FF7A1A; color: white; } /* Bouton Suivre */
    .btn-gray { background: #262626; color: white; }   /* Bouton Message / Modifier */
</style>

<div class="profile-header">
    <div class="header-top">
        <div class="avatar-wrapper" id="p-avatar-click">
            <img id="h-avatar" src="https://via.placeholder.com/150" class="avatar-img">
            <div class="story-plus" id="h-plus-icon"><i class="fas fa-plus"></i></div>
        </div>

        <div style="flex: 1;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <h2 id="h-username" style="margin:0; font-size: 20px; font-weight: 500;">...</h2>
                <div id="h-badge"></div> </div>
            
            <div class="stats-text">
                <div><b id="c-posts">0</b> <span>publications</span></div>
                <div><b id="c-followers">0</b> <span>followers</span></div>
            </div>
        </div>
    </div>

    <div style="margin-top: 15px;">
        <span id="h-fullname" style="font-weight: 600; font-size: 14px; display: block;">...</span>
        <p id="h-bio" style="margin: 3px 0; font-size: 14px; color: #efefef;"></p>
    </div>

    <div id="h-btn-zone" class="btn-row"></div>
</div>

<script type="module">
    import { db } from './firebase-config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.loadHeader = (profileId, myId) => {
        onSnapshot(doc(db, "users", profileId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            
            document.getElementById('h-username').innerText = data.username || "user";
            document.getElementById('h-fullname').innerText = data.fullName || "";
            document.getElementById('h-bio').innerText = data.bio || "";
            if(data.avatarUrl) document.getElementById('h-avatar').src = data.avatarUrl;

            // Badge Orange Floy
            const badge = document.getElementById('h-badge');
            badge.innerHTML = data.isVerified ? `<i class="fas fa-check-circle" style="color:#FF7A1A; font-size:16px;"></i>` : '';

            const btnZone = document.getElementById('h-btn-zone');
            const plusIcon = document.getElementById('h-plus-icon');

            if (profileId === myId) {
                // --- VUE MON PROFIL (Toi) ---
                plusIcon.style.display = 'flex'; // Tu vois le +
                btnZone.innerHTML = `
                    <button onclick="openEditModal()" class="btn-f btn-gray">Modifier le profil</button>
                    <button class="btn-f btn-gray">Partager le profil</button>
                `;
            } else {
                // --- VUE VISITEUR (Les autres) ---
                plusIcon.style.display = 'none'; // Pas de + pour les autres
                btnZone.innerHTML = `
                    <button class="btn-f btn-orange">Suivre</button>
                    <button onclick="openQuickChat('${profileId}')" class="btn-f btn-gray">Message</button>
                `;
            }
        });
    };
</script>
