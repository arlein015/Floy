<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Dépôt</title>
    <style>
        :root { --orange-floy: #FF7A1A; --binance-yellow: #F3BA2F; --noir: #000; --gris: #121212; }
        body { background: var(--noir); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { font-size: 24px; color: white; text-decoration: none; margin-right: 20px; }

        .section-title { font-size: 14px; color: #666; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }

        /* Input Montant */
        .amount-container {
            background: var(--gris); border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 25px;
        }
        .amount-input {
            background: transparent; border: none; color: var(--orange-floy); font-size: 32px; font-weight: bold; text-align: center; width: 100%; outline: none;
        }

        /* Méthodes de Paiement */
        .payment-method {
            background: #0a0a0a; border: 1px solid #222; padding: 18px; border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; cursor: pointer;
            transition: 0.3s;
        }
        .payment-method.active { border-color: var(--orange-floy); background: rgba(255,122,26,0.05); }
        .method-info { display: flex; align-items: center; gap: 15px; }
        .method-info svg { width: 24px; height: 24px; }

        .btn-pay {
            width: 100%; background: var(--orange-floy); color: black; border: none; padding: 18px;
            border-radius: 15px; font-weight: 800; font-size: 16px; margin-top: 30px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="withdraw-funds.html" class="back-btn">‹</a>
        <span style="font-weight:bold;">RECHARGER LE COMPTE</span>
    </div>

    <div class="amount-container">
        <div style="font-size: 11px; color: #555; margin-bottom: 5px;">MONTANT À DÉPOSER (EUR)</div>
        <input type="number" class="amount-input" placeholder="0.00" id="depAmount">
    </div>

    <div class="section-title">Choisir une méthode</div>

    <div class="payment-method active" onclick="select(this)">
        <div class="method-info">
            <svg viewBox="0 0 24 24" fill="white"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
            <div>
                <div style="font-weight: bold; font-size: 14px;">Carte Bancaire</div>
                <div style="font-size: 11px; color: #555;">Visa, Mastercard, Maestro</div>
            </div>
        </div>
        <div style="width:18px; height:18px; border-radius:50%; border:2px solid var(--orange-floy); background: var(--orange-floy);"></div>
    </div>

    <div class="payment-method" onclick="select(this)">
        <div class="method-info">
            <svg viewBox="0 0 24 24" fill="var(--binance-yellow)"><path d="M12 0L8.12 3.88L12 7.76L15.88 3.88L12 0Z"/><path d="M24 12L20.12 8.12L16.24 12L20.12 15.88L24 12Z"/><path d="M12 24L15.88 20.12L12 16.24L8.12 20.12L12 24Z"/><path d="M0 12L3.88 15.88L7.76 12L3.88 8.12L0 12Z"/><path d="M12 11.23L12.77 12L12 12.77L11.23 12L12 11.23Z"/><path d="M8.53 12L12 8.53L15.47 12L12 15.47L8.53 12Z"/></svg>
            <div>
                <div style="font-weight: bold; font-size: 14px;">Binance Pay</div>
                <div style="font-size: 11px; color: #555;">Paiement Crypto instantané</div>
            </div>
        </div>
        <div style="width:18px; height:18px; border-radius:50%; border:2px solid #333;"></div>
    </div>

    <button class="btn-pay" onclick="confirmDeposit()">PROCÉDER AU PAIEMENT</button>

    <script>
        function select(el) {
            document.querySelectorAll('.payment-method').forEach(m => {
                m.classList.remove('active');
                m.querySelector('div:last-child').style.background = 'transparent';
                m.querySelector('div:last-child').style.borderColor = '#333';
            });
            el.classList.add('active');
            el.querySelector('div:last-child').style.background = 'var(--orange-floy)';
            el.querySelector('div:last-child').style.borderColor = 'var(--orange-floy)';
        }

        function confirmDeposit() {
            const amt = document.getElementById('depAmount').value;
            if(!amt || amt <= 0) return alert("Entrez un montant");
            alert("Redirection vers la passerelle sécurisée...");
        }
    </script>
</body>
</html>
