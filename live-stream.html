<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎥</text></svg>">
    <title>Live Stream - Floy</title>
    <style>
        :root { --orange: #FF7A1A; --rouge: #FF0000; }
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* ARRIÈRE-PLAN VIDÉO (EFFET GRADIENT) */
        .video-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f0f0f 0%, #222 100%); display: flex; align-items: center; justify-content: center; z-index: 1; }
        .video-canvas::after { content: "Connexion à la caméra..."; color: #444; font-size: 14px; letter-spacing: 1px; }

        /* INTERFACE LIVE */
        .live-ui { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 40%, rgba(0,0,0,0.8) 100%); }

        /* HAUT DU LIVE */
        .top-info { display: flex; justify-content: space-between; align-items: flex-start; padding-top: env(safe-area-inset-top); }
        .live-tags { display: flex; flex-direction: column; gap: 8px; }
        .badge-live { background: var(--rouge); color: white; padding: 4px 10px; border-radius: 5px; font-weight: 900; font-size: 12px; width: fit-content; animation: blink 1s infinite; }
        .viewers { background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 5px; font-size: 12px; backdrop-filter: blur(5px); }

        .close-live { background: rgba(255,255,255,0.2); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; cursor: pointer; backdrop-filter: blur(10px); }

        /* COMMENTAIRES QUI MONTENT */
        .chat-overlay { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; gap: 10px; margin-bottom: 20px; overflow: hidden; }
        .msg-bubble { background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 15px; font-size: 14px; width: fit-content; max-width: 85%; animation: bubbleUp 0.4s ease-out; border-left: 3px solid var(--orange); }
        .msg-bubble b { color: var(--orange); display: block; font-size: 11px; margin-bottom: 2px; }

        /* BARRE D'ACTION */
        .action-bar { display: flex; gap: 12px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .input-box { flex: 1; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; padding: 12px 18px; color: white; outline: none; backdrop-filter: blur(15px); }
        .btn-send { background: var(--orange); border: none; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes bubbleUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="video-canvas"></div>

    <div class="live-ui">
        <div class="top-info">
            <div class="live-tags">
                <div class="badge-live">LIVE</div>
                <div class="viewers">👁 2,431 spectateurs</div>
            </div>
            <button class="close-live" onclick="window.location.href='profil.html'">✕</button>
        </div>

        <div class="chat-overlay" id="chatStream">
            <div class="msg-bubble"><b>Système</b> Bienvenue dans le live ! Restez respectueux.</div>
        </div>

        <div class="action-bar">
            <input type="text" id="chatInput" class="input-box" placeholder="Envoyer un message..." onkeypress="if(event.key==='Enter') postChat()">
            <button class="btn-send" onclick="postChat()">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        function postChat() {
            const input = document.getElementById('chatInput');
            const stream = document.getElementById('chatStream');
            if (!input.value.trim()) return;

            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.innerHTML = `<b>Moi</b> ${input.value}`;
            stream.appendChild(div);
            
            input.value = "";
            stream.scrollTop = stream.scrollHeight;
            if (stream.children.length > 7) stream.removeChild(stream.firstChild);
        }

        // Simulation de spectateurs qui parlent
        const names = ["Jordan", "Lina_Code", "Sam_Floy", "User99", "TechGuru"];
        const texts = ["Incroyable ce projet !", "Le badge orange est trop stylé", "Tuto disponible ?", "Floy > Instagram", "C'est propre !"];
        
        setInterval(() => {
            const stream = document.getElementById('chatStream');
            const name = names[Math.floor(Math.random()*names.length)];
            const text = texts[Math.floor(Math.random()*texts.length)];
            
            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.innerHTML = `<b>${name}</b> ${text}`;
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
            if (stream.children.length > 7) stream.removeChild(stream.firstChild);
        }, 3500);
    </script>
</body>
</html>
