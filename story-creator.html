<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Floy - Créer Story</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --orange: #FF7A1A; --noir: #000; }
        body { background: var(--noir); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* UI OVERLAY */
        .story-ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; padding: 25px; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent 20%, transparent 80%, rgba(0,0,0,0.5)); }
        
        /* PREVIEW AREA */
        #preview-container { width: 100vw; height: 100vh; position: absolute; top:0; left:0; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden;}
        #preview-img, #preview-vid { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; }

        /* BUTTONS */
        .btn-send { background: white; color: black; border: none; padding: 14px 28px; border-radius: 30px; font-weight: bold; cursor: pointer; align-self: flex-end; display: none; font-size: 16px;}
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top: 3px solid var(--orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">Publication de la Story...</p>
    </div>

    <div class="story-ui">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <i class="fas fa-times" onclick="location.href='create.html'" style="font-size:24px; cursor: pointer;"></i>
            <b style="font-size:16px;">Nouvelle Story</b>
            <i></i> </div>
        
        <div id="upload-prompt" style="text-align:center; cursor: pointer;" onclick="document.getElementById('file-in').click()">
            <i class="fas fa-camera" style="font-size:50px; color:var(--orange);"></i>
            <p style="margin-top:15px; font-weight: bold;">Ajouter une photo ou vidéo</p>
        </div>

        <button class="btn-send" id="btn-send" onclick="window.uploadStoryReal()">Partager <i class="fas fa-paper-plane" style="margin-left:5px;"></i></button>
    </div>

    <div id="preview-container">
        <img id="preview-img">
        <video id="preview-vid" autoplay loop muted playsinline></video>
    </div>

    <input type="file" id="file-in" accept="image/*,video/*" style="display:none;" onchange="window.handlePreviewReal()">

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURATION CLOUDINARY (🔥 REMPLACE ICI)
        const CLOUD_NAME = "TON_CLOUD_NAME";
        const UPLOAD_PRESET = "floy_unsigned"; // Ton preset non signé

        let selectedFile = null;
        let userData = null;

        // 🛡️ Vérification de la connexion
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                userData = snap.data();
            } else { location.href = 'login.html'; }
        });

        // 🖼️ Prévisualisation Réelle
        window.handlePreviewReal = () => {
            const file = document.getElementById('file-in').files[0];
            if (file) {
                selectedFile = file;
                const url = URL.createObjectURL(file);
                document.getElementById('upload-prompt').style.display = 'none';
                document.getElementById('btn-send').style.display = 'block';
                
                if (file.type.startsWith('image/')) {
                    document.getElementById('preview-img').src = url;
                    document.getElementById('preview-img').style.display = 'block';
                    document.getElementById('preview-vid').style.display = 'none';
                } else {
                    document.getElementById('preview-vid').src = url;
                    document.getElementById('preview-vid').style.display = 'block';
                    document.getElementById('preview-img').style.display = 'none';
                }
            }
        };

        // ☁️ Publication Réelle (Cloudinary + Firebase)
        window.uploadStoryReal = async () => {
            if (!selectedFile || !userData) return;
            document.getElementById('loader').style.display = 'flex';
            
            try {
                // 1. Upload vers Cloudinary (auto détecte image/vidéo)
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('upload_preset', UPLOAD_PRESET);

                const cloudinaryUrl = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;
                
                const res = await fetch(cloudinaryUrl, { method: 'POST', body: formData });
                const cloudData = await res.json();
                
                if (!cloudData.secure_url) throw new Error("Erreur Cloudinary");

                // 2. Enregistrement dans Firebase (Collection 'stories')
                await addDoc(collection(db, "stories"), {
                    userId: auth.currentUser.uid,
                    username: userData.username,
                    userAvatar: userData.avatarUrl || "",
                    isVerified: userData.isVerified || false, // Ton badge orange
                    mediaUrl: cloudData.secure_url,
                    type: selectedFile.type.startsWith('image/') ? 'image' : 'video',
                    createdAt: serverTimestamp(),
                    expiresAt: Date.now() + (24 * 60 * 60 * 1000) // Expire automatiquement dans 24h
                });

                location.href = 'index.html'; // Retour à l'accueil pour voir la bulle
            } catch (error) {
                alert("Erreur lors de la publication : " + error.message);
                document.getElementById('loader').style.display = 'none';
            }
        };
    </script>
</body>
</html>
