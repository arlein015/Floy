<style>
    body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
    .card { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid #FF7A1A; }
    .chart { display: flex; align-items: flex-end; gap: 5px; height: 100px; margin-top: 15px; }
    .bar { flex: 1; background: #FF7A1A; opacity: 0.8; border-radius: 3px 3px 0 0; }
</style>

<div class="card">
    <h3>Croissance</h3>
    <p id="total">Chargement...</p>
    <div class="chart">
        <div class="bar" style="height:30%"></div>
        <div class="bar" style="height:60%"></div>
        <div class="bar" style="height:45%"></div>
        <div class="bar" style="height:90%"></div>
    </div>
</div>

<script>
    const count = localStorage.getItem('floy_followers_count') || 0;
    document.getElementById('total').innerText = count + " nouveaux abonnés cette semaine";
</script>
