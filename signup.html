<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire - Floy</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        /* LOGO 3D MINI */
        .logo-3d-mini { width: 60px; height: 60px; background: #FF7A1A; border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(255, 122, 26, 0.3); margin-bottom: 20px; }
        .logo-3d-mini span { color: black; font-weight: 900; font-size: 20px; }

        input { width: 100%; max-width: 320px; background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn-finish { width: 100%; max-width: 320px; background: #FF7A1A; color: black; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="logo-3d-mini"><span>Floy</span></div>
    <h2>Créer un compte</h2>
    <input type="text" placeholder="Nom complet">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Mot de passe">
    <button class="btn-finish" onclick="saveAndGo()">TERMINER L'INSCRIPTION</button>

    <script>
        function saveAndGo() {
            localStorage.setItem('floy_isLoggedIn', 'true');
            window.location.href = 'verify.html';
        }
        import { auth, db } from './firebase-config.js';
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

async function registerUser(email, password, username, fullName) {
    try {
        // 1. Création du compte dans Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Création AUTOMATIQUE du profil dans Firestore
        await setDoc(doc(db, "users", user.uid), {
            uid: user.uid,
            email: email,
            username: username.toLowerCase().replace(/\s/g, ''), // Nettoie le pseudo
            name: fullName,
            bio: "Bienvenue sur mon profil Floy !",
            avatarUrl: "https://via.placeholder.com/150", // Photo par défaut
            followersCount: 0,
            followingCount: 0,
            postsCount: 0,
            isVerified: false, // Pas de badge au début
            createdAt: new Date()
        });

        alert("Compte Floy créé avec succès !");
        window.location.href = "index.html";

    } catch (error) {
        console.error("Erreur d'inscription :", error.message);
        alert("Erreur : " + error.message);
    }
}
    </script>
</body>
</html>
