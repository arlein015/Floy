<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - FLOY</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #007bff, #8a2be2); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>F<span style="color:#8a2be2">LOY</span></h2>
        <form id="signupForm">
            <input type="text" id="userName" placeholder="Nom complet" required>
            <input type="email" id="userEmail" placeholder="Email" required>
            <button type="submit" id="btn">Continuer</button>
        </form>
    </div>

    <script>
        emailjs.init("ZMBJ1MUAvq-i9OTaG");

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const otp = Math.floor(100000 + Math.random() * 900000).toString();
            
            btn.disabled = true;
            btn.innerText = "Envoi...";

            localStorage.setItem('validOTP', otp);
            localStorage.setItem('otpExpiration', Date.now() + 60000);

            const params = {
                user_name: document.getElementById('userName').value,
                otp_code: otp,
                to_email: document.getElementById('userEmail').value,
                time: new Date().toLocaleTimeString()
            };

            // Utilisation de tes IDs confirmés
            emailjs.send('service_8hszhsz', 'template_3ehh52a', params)
                .then(() => {
                    window.location.href = 'verify.html';
                }, (err) => {
                    alert("Erreur: " + JSON.stringify(err));
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
