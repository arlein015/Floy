<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Floy - Inscription</title>
</head>
<body style="padding: 20px;">
    <a href="index.html" style="color: white; text-decoration: none;">← Retour</a>
    <h2 style="margin-top: 40px; color: var(--violet);">Créer un compte</h2>
    <form style="display: flex; flex-direction: column; gap: 20px; margin-top: 30px;">
        <input type="text" placeholder="Nom d'utilisateur" style="background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px;">
        <input type="email" placeholder="Email" style="background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px;">
        <input type="password" placeholder="Mot de passe" style="background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px;">
        <button type="submit" style="background: var(--violet); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">Continuer</button>
    </form>
</body>
</html>
