<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire - FLOY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --floy-gradient: linear-gradient(135deg, #007bff 0%, #8a2be2 100%);
            --floy-blue: #007bff;
            --bg-light: #f4f7f6;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .signup-card {
            background: white;
            padding: 35px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .brand-name { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
        .gradient-text {
            background: var(--floy-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 { font-size: 20px; color: #333; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #555; }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .input-group input:focus { outline: none; border-color: var(--floy-blue); }

        .btn-signup {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--floy-gradient);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.2);
        }

        .btn-signup:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        .footer-text { margin-top: 20px; font-size: 13px; color: #888; }
        .footer-text a { color: var(--floy-blue); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="signup-card">
        <h1 class="brand-name">F<span class="gradient-text">LOY</span></h1>
        <h2>Créer un compte</h2>

        <form id="signupForm">
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" id="userName" placeholder="Ex: Jean Dupont" required>
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="userEmail" placeholder="nom@exemple.com" required>
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-signup">Continuer</button>
        </form>

        <p class="footer-text">
            Déjà sur FLOY ? <a href="index.html">Se connecter</a>
        </p>
    </div>

   <script>
    // 1. Initialisation avec ta clé publique
    (function() {
        emailjs.init("ZMBJ1MUAvq-i9OTaG"); 
    })();

    // 2. Fonction pour générer le code de 6 chiffres
    function generateOTP() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    document.getElementById('signupForm').addEventListener('submit', function(event) {
        event.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const name = document.getElementById('userName').value;
        const email = document.getElementById('userEmail').value;
        
        // On change l'état du bouton
        submitBtn.disabled = true;
        submitBtn.innerText = "Envoi du code...";

        const otpCode = generateOTP();
        const expiration = Date.now() + 60000; // Expire dans 60 secondes

        // Sauvegarde pour la page de vérification
        localStorage.setItem('validOTP', otpCode);
        localStorage.setItem('otpExpiration', expiration);

        // 3. Préparation des paramètres pour ton template
        const templateParams = {
            user_name: name,         // Remplit {{user_name}}
            otp_code: otpCode,       // Remplit {{otp_code}}
            to_email: email,         // Adresse de l'utilisateur
            time: new Date().toLocaleTimeString() // Remplit {{time}}
        };

        // 4. Envoi réel avec tes IDs
        emailjs.send('service_8hszhsz', 'template_3ehh52a', templateParams)
            .then(function() {
                console.log("Mail envoyé ! Code : " + otpCode);
                window.location.href = 'verify.html';
            }, function(error) {
                alert("Erreur d'envoi : " + JSON.stringify(error));
                submitBtn.disabled = false;
                submitBtn.innerText = "Continuer";
            });
    });
</script>
