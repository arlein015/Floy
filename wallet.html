<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Floy</title>
    <style>
        :root { --fond: #000; --violet: #8A2BE2; --bleu: #00BFFF; }
        body { background: var(--fond); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .balance-card { 
            background: linear-gradient(135deg, var(--violet), #4b0082); 
            margin: 20px; 
            padding: 40px 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
        }
        .amount { font-size: 40px; font-weight: bold; margin: 10px 0; }
        .currency { font-size: 14px; opacity: 0.8; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .btn-wallet { 
            background: #1a1a1a; color: white; border: 1px solid #333; 
            padding: 15px; border-radius: 15px; font-weight: bold; 
        }
        .history { text-align: left; padding: 20px; }
        .history h4 { border-bottom: 1px solid #111; padding-bottom: 10px; }
    </style>
</head>
<body>
    <header style="padding: 15px; text-align: left;">
        <a href="settings.html" style="color: white; text-decoration: none;">← Retour</a>
    </header>

    <div class="balance-card">
        <span class="currency">Solde Floy</span>
        <div class="amount">0,00 FCFA</div>
        <span class="currency">0 Diamants 💎</span>
    </div>

    <div class="actions">
        <button class="btn-wallet" style="border-color: var(--bleu)">Recharger</button>
        <button class="btn-wallet" style="border-color: var(--violet)">Retirer</button>
    </div>

    <div class="history">
        <h4>Historique des transactions</h4>
        <p style="color: #444; text-align: center;">Aucune transaction pour le moment.</p>
    </div>
</body>
</html>
