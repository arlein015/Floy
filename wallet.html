<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floy - Portefeuille</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root {
            --floy-gradient: linear-gradient(135deg, #3a55d1 0%, #a456f0 100%);
            --floy-orange: #ff5e3a;
            --floy-cyan: #00e5ff; /* Ta nouvelle couleur de badge */
        }

        body { 
            margin: 0; background: var(--floy-gradient); background-attachment: fixed;
            color: white; font-family: 'Poppins', sans-serif; padding: 20px;
        }

        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }

        /* Carte de solde brillante */
        .balance-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .balance-label { font-size: 14px; opacity: 0.8; }
        .balance-amount { font-size: 42px; font-weight: 700; margin: 10px 0; }
        .cyan-text { color: var(--floy-cyan); }

        /* Bouton de retrait orange */
        .btn-withdraw {
            width: 100%; background: var(--floy-orange); color: white; border: none;
            padding: 16px; border-radius: 15px; font-weight: 700; font-size: 16px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(255, 94, 58, 0.3);
        }

        /* Historique */
        .history-section { margin-top: 40px; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.05); padding: 15px;
            border-radius: 15px; margin-bottom: 10px; font-size: 14px;
        }
        
        .badge-mini { color: var(--floy-cyan); font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="window.history.back()"></i>
        <h3 style="margin:0;">Mon Portefeuille</h3>
    </div>

    <div class="balance-card">
        <span class="balance-label">Solde disponible</span>
        <div class="balance-amount">1 250,00 <span style="font-size: 20px;">€</span></div>
        <div style="font-size: 13px;">
            Compte vérifié <i class="fas fa-check-circle badge-mini"></i>
        </div>
    </div>

    <button class="btn-withdraw" onclick="handleWithdraw()">Retirer mes gains</button>

    <div class="history-section">
        <h4 style="margin-bottom: 15px;">Dernières transactions</h4>
        <div class="history-item">
            <span>Revenus vidéos (Mars)</span>
            <span style="color: #44ff44; font-weight: 600;">+ 450,00 €</span>
        </div>
        <div class="history-item">
            <span>Cadeaux Live</span>
            <span style="color: #44ff44; font-weight: 600;">+ 12,50 €</span>
        </div>
    </div>

    <script>
        function handleWithdraw() {
            alert("Demande de retrait envoyée ! Vous recevrez vos fonds sous 24h.");
        }
    </script>
</body>
</html>
